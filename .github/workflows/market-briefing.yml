name: Market Briefing → Notion

on:
  workflow_dispatch:
    inputs:
      slot:
        description: Briefing slot
        required: true
        default: us_premarket
        type: choice
        options:
          - morning
          - midday
          - kr_close
          - us_premarket
  schedule:
    - cron: "30 23 * * 0-4"   # Mon-Fri 07:30 UTC+8
    - cron: "0 3 * * 1-5"     # Mon-Fri 11:00 UTC+8
    - cron: "45 6 * * 1-5"    # Mon-Fri 14:45 UTC+8
    - cron: "0 8 * * 1-5"     # Mon-Fri 16:00 UTC+8

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pick slot
        id: pick
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "${{ github.event.schedule }}" in
            "30 23 * * 0-4") echo "slot=morning" >> "$GITHUB_OUTPUT" ;;
            "0 3 * * 1-5")   echo "slot=midday" >> "$GITHUB_OUTPUT" ;;
            "45 6 * * 1-5")  echo "slot=kr_close" >> "$GITHUB_OUTPUT" ;;
            "0 8 * * 1-5")   echo "slot=us_premarket" >> "$GITHUB_OUTPUT" ;;
            *) echo "slot=skip" >> "$GITHUB_OUTPUT" ;;
          esac

      - uses: actions/setup-python@v5
        if: steps.pick.outputs.slot != 'skip'
        with:
          python-version: "3.11"

      - name: Install deps
        if: steps.pick.outputs.slot != 'skip'
        run: pip install -r scripts/requirements-briefing.txt

      - name: Run briefing
        if: steps.pick.outputs.slot != 'skip'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: python scripts/market_briefing.py "${{ steps.pick.outputs.slot }}"
