<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Paul 관리자</title>
<meta name="theme-color" content="#050419">
<style>
  :root {
    --bg: #050419; --bg-soft: #0b0a26; --ink: #edebe6; --muted: #8a879c;
    --faint: #4a4860; --accent: #d4a24e; --line: rgba(237,235,230,0.09);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--ink); font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
    line-height: 1.6; padding-bottom: 80px;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 24px 18px; }
  header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 18px; border-bottom: 1px solid var(--line); margin-bottom: 24px; }
  .brand { font-size: 12px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; }
  h1 { font-size: 22px; font-weight: 700; margin-top: 6px; }
  .logout { background: none; border: 1px solid var(--line); color: var(--muted); font-family: inherit; font-size: 12px; padding: 8px 14px; border-radius: 8px; cursor: pointer; }
  nav { display: flex; gap: 6px; margin-bottom: 22px; flex-wrap: wrap; }
  nav button {
    background: var(--bg-soft); border: 1px solid var(--line); color: var(--muted); font-family: inherit;
    font-size: 13px; padding: 9px 14px; border-radius: 20px; cursor: pointer; transition: all 0.2s;
  }
  nav button.on { border-color: var(--accent); color: var(--accent); background: rgba(212,162,78,0.1); }
  section { display: none; }
  section.on { display: block; }

  .card { background: var(--bg-soft); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
  .card h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  label { display: block; font-size: 11px; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; margin: 12px 0 6px; }
  label:first-of-type { margin-top: 0; }
  textarea, input[type=text] {
    width: 100%; background: var(--bg); border: 1px solid var(--line); border-radius: 9px; color: var(--ink);
    font-family: inherit; font-size: 14.5px; padding: 11px; resize: vertical;
  }
  textarea:focus, input:focus { outline: none; border-color: var(--accent); }
  input[type=file] { font-size: 13px; color: var(--muted); }
  .thumb { width: 100%; max-height: 200px; object-fit: cover; border-radius: 9px; margin-top: 10px; display: none; }
  .btn {
    background: var(--accent); color: var(--bg); border: none; border-radius: 9px; font-family: inherit;
    font-weight: 700; font-size: 14px; padding: 12px 18px; cursor: pointer; margin-top: 14px;
  }
  .btn:disabled { opacity: 0.5; }
  .btn.ghost { background: none; border: 1px solid var(--line); color: var(--muted); font-weight: 500; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .pcard { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: var(--bg); }
  .pcard img { width: 100%; height: 110px; object-fit: cover; display: block; }
  .pcard .body { padding: 8px 10px; }
  .pcard .cap { font-size: 12px; color: var(--ink); }
  .pcard .tg { font-size: 10.5px; color: var(--faint); margin-top: 4px; }
  .pcard .row { display: flex; gap: 6px; margin-top: 8px; }
  .pcard .row button { flex: 1; font-size: 11px; padding: 6px 4px; background: none; border: 1px solid var(--line); color: var(--muted); border-radius: 6px; cursor: pointer; }
  .pcard.draft { opacity: 0.5; }

  .tlist { display: flex; flex-direction: column; gap: 10px; }
  .titem { border-left: 2px solid var(--accent); padding: 10px 0 10px 14px; }
  .titem .tx { font-size: 14px; }
  .titem img { max-width: 160px; border-radius: 8px; margin-top: 8px; display: block; }
  .titem .meta { font-size: 11px; color: var(--faint); margin-top: 6px; }
  .titem .row { display: flex; gap: 6px; margin-top: 8px; }
  .titem .row button { font-size: 11px; padding: 5px 10px; background: none; border: 1px solid var(--line); color: var(--muted); border-radius: 6px; cursor: pointer; }

  .batch { border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .batch .when { font-size: 11px; color: var(--faint); margin-bottom: 8px; }
  .batch .qa { margin-bottom: 8px; }
  .batch .qa .qq { font-size: 12px; color: var(--muted); }
  .batch .qa .aa { font-size: 14px; margin-top: 2px; }

  .empty { color: var(--faint); font-size: 13px; padding: 20px 0; text-align: center; }
  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(10px);
    background: var(--ink); color: var(--bg); font-size: 13px; font-weight: 600; padding: 11px 18px;
    border-radius: 22px; opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 20;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #offlineBar {
    display: none; position: sticky; top: 0; z-index: 40; background: #3a2a10; color: #e8c37a;
    font-size: 12.5px; font-weight: 600; text-align: center; padding: 9px 14px; letter-spacing: 0.02em;
  }
  #offlineBar.show { display: block; }
</style>
</head>
<body>
<div id="offlineBar">📡 오프라인 — 마지막으로 받아온 데이터를 보여주고 있어요. 새 작업은 연결 후 가능해요</div>
<div class="wrap">
  <header>
    <div><div class="brand">Fragments of Thought</div><h1>관리자</h1></div>
    <div style="display:flex; gap:8px;">
      <a href="interview.html" class="logout" style="text-decoration:none; display:inline-flex; align-items:center;">인터뷰 노트</a>
      <button class="logout" id="logoutBtn">로그아웃</button>
    </div>
  </header>

  <nav>
    <button data-s="capture" class="on">빠른 기록</button>
    <button data-s="photos">사진</button>
    <button data-s="thoughts">기록 목록</button>
    <button data-s="interview">인터뷰 답변</button>
  </nav>

  <section id="s-capture" class="on">
    <div class="card">
      <h3>지금 생각 + 사진</h3>
      <label>생각</label>
      <textarea id="capText" rows="3" placeholder="지금 떠오른 생각…"></textarea>
      <label>사진 (선택)</label>
      <input type="file" id="capFile" accept="image/*" />
      <img class="thumb" id="capThumb" />
      <label>관련 단어 (쉼표로, 예: 자전거, 자유)</label>
      <input type="text" id="capTags" placeholder="자전거, 자유" />
      <button class="btn" id="capSave">기록하기</button>
    </div>
  </section>

  <section id="s-photos">
    <div class="card">
      <h3>사진 업로드</h3>
      <label>사진</label>
      <input type="file" id="pFile" accept="image/*" />
      <img class="thumb" id="pThumb" />
      <label>설명</label>
      <input type="text" id="pCaption" placeholder="이 사진에 대해…" />
      <label>관련 단어 (쉼표로)</label>
      <input type="text" id="pTags" placeholder="파키스탄, 이슬람" />
      <button class="btn" id="pSave">업로드</button>
    </div>
    <div class="card">
      <h3>사진 라이브러리</h3>
      <div class="grid" id="pGrid"><div class="empty">불러오는 중…</div></div>
    </div>
  </section>

  <section id="s-thoughts">
    <div class="card">
      <h3>기록된 생각들</h3>
      <div class="tlist" id="tList"><div class="empty">불러오는 중…</div></div>
    </div>
  </section>

  <section id="s-interview">
    <div class="card">
      <h3>인터뷰 답변 (폰 앱에서 저장된 것)</h3>
      <div id="ivList"><div class="empty">불러오는 중…</div></div>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2400);
  }

  function setOnlineBar(ok) { document.getElementById('offlineBar').classList.toggle('show', !ok); }
  window.addEventListener('online', () => { setOnlineBar(true); toast('연결됐어요'); });
  window.addEventListener('offline', () => setOnlineBar(false));
  setOnlineBar(navigator.onLine);

  function resizeImage(file, maxDim, quality) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const reader = new FileReader();
      reader.onload = e => { img.src = e.target.result; };
      reader.onerror = reject;
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
        else if (height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
        const c = document.createElement('canvas'); c.width = width; c.height = height;
        c.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ---- nav ----
  document.querySelectorAll('nav button').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('nav button').forEach(x => x.classList.remove('on'));
      document.querySelectorAll('section').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      document.getElementById('s-' + b.dataset.s).classList.add('on');
      if (b.dataset.s === 'photos') loadPhotos();
      if (b.dataset.s === 'thoughts') loadThoughts();
      if (b.dataset.s === 'interview') loadInterview();
    });
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/admin-session', { method: 'DELETE' });
    location.href = '/admin-login.html';
  });

  // ---- quick capture ----
  let capDataUrl = null;
  document.getElementById('capFile').addEventListener('change', async e => {
    const f = e.target.files[0]; if (!f) return;
    capDataUrl = await resizeImage(f, 1600, 0.82);
    const t = document.getElementById('capThumb'); t.src = capDataUrl; t.style.display = 'block';
  });
  document.getElementById('capSave').addEventListener('click', async () => {
    const text = document.getElementById('capText').value.trim();
    if (!text) { toast('내용을 입력해주세요'); return; }
    const tags = document.getElementById('capTags').value.split(',').map(s => s.trim()).filter(Boolean);
    const btn = document.getElementById('capSave'); btn.disabled = true; btn.textContent = '저장 중…';
    try {
      const r = await fetch('/api/thoughts', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, dataUrl: capDataUrl, tags }),
      });
      if (!r.ok) throw new Error((await r.json()).error || '실패');
      document.getElementById('capText').value = '';
      document.getElementById('capTags').value = '';
      document.getElementById('capFile').value = '';
      document.getElementById('capThumb').style.display = 'none';
      capDataUrl = null;
      toast('기록했어요');
      setOnlineBar(true);
    } catch (e) {
      if (e instanceof TypeError) { setOnlineBar(false); toast('오프라인이에요 — 인터뷰 앱에서 기록하면 자동으로 재전송돼요'); }
      else toast(e.message);
    }
    btn.disabled = false; btn.textContent = '기록하기';
  });

  // ---- photo upload ----
  let pDataUrl = null;
  document.getElementById('pFile').addEventListener('change', async e => {
    const f = e.target.files[0]; if (!f) return;
    pDataUrl = await resizeImage(f, 1800, 0.85);
    const t = document.getElementById('pThumb'); t.src = pDataUrl; t.style.display = 'block';
  });
  document.getElementById('pSave').addEventListener('click', async () => {
    if (!pDataUrl) { toast('사진을 선택해주세요'); return; }
    const caption = document.getElementById('pCaption').value.trim();
    const tags = document.getElementById('pTags').value.split(',').map(s => s.trim()).filter(Boolean);
    const btn = document.getElementById('pSave'); btn.disabled = true; btn.textContent = '업로드 중…';
    try {
      const r = await fetch('/api/photos', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dataUrl: pDataUrl, caption, tags }),
      });
      if (!r.ok) throw new Error((await r.json()).error || '실패');
      document.getElementById('pCaption').value = '';
      document.getElementById('pTags').value = '';
      document.getElementById('pFile').value = '';
      document.getElementById('pThumb').style.display = 'none';
      pDataUrl = null;
      toast('업로드했어요');
      setOnlineBar(true);
      loadPhotos();
    } catch (e) {
      if (e instanceof TypeError) { setOnlineBar(false); toast('오프라인이에요 — 연결 후 다시 업로드해주세요'); }
      else toast(e.message);
    }
    btn.disabled = false; btn.textContent = '업로드';
  });

  async function loadPhotos() {
    const grid = document.getElementById('pGrid');
    grid.innerHTML = '<div class="empty">불러오는 중…</div>';
    let d;
    try {
      const r = await fetch('/api/photos');
      d = await r.json();
      if (!r.ok) {
        if (r.status === 401) { grid.innerHTML = '<div class="empty">로그인이 풀렸어요 — <a href="/admin-login.html" style="color:var(--accent);">다시 로그인</a>해주세요.</div>'; return; }
        grid.innerHTML = '<div class="empty">불러오지 못했어요: ' + (d.error || r.status) + '</div>';
        return;
      }
      setOnlineBar(true);
    } catch (e) {
      // TypeError는 진짜 네트워크 단절(요청 자체가 안 나감). 그 외(응답은 왔는데 JSON이 아니었던 경우 등)는
      // 실제로는 온라인인데 서버 쪽 문제인 것 — "오프라인"이라고 잘못 표시하지 않는다.
      if (e instanceof TypeError) {
        setOnlineBar(false);
        grid.innerHTML = '<div class="empty">오프라인이라 새로 불러올 수 없어요. 연결 후 다시 시도해주세요.</div>';
      } else {
        grid.innerHTML = '<div class="empty">서버에 일시적인 문제가 있어요. 잠시 후 새로고침해주세요.</div>';
      }
      return;
    }
    if (!d.photos || !d.photos.length) { grid.innerHTML = '<div class="empty">아직 사진이 없어요.</div>'; return; }
    grid.innerHTML = '';
    d.photos.forEach(p => {
      const el = document.createElement('div');
      el.className = 'pcard' + (p.published === false ? ' draft' : '');
      el.innerHTML =
        '<img src="' + p.url + '" />' +
        '<div class="body"><div class="cap">' + (p.caption || '(설명 없음)') + '</div>' +
        '<div class="tg">' + (p.tags || []).join(' · ') + '</div>' +
        '<div class="row"><button data-act="pub">' + (p.published === false ? '공개하기' : '비공개') + '</button>' +
        '<button data-act="del">삭제</button></div></div>';
      el.querySelector('[data-act="pub"]').addEventListener('click', async () => {
        try {
          await fetch('/api/photos', { method: 'PATCH', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: p.id, published: p.published === false }) });
          loadPhotos();
        } catch (e) { toast('오프라인 — 연결 후 다시 시도해주세요'); }
      });
      el.querySelector('[data-act="del"]').addEventListener('click', async () => {
        if (!confirm('이 사진을 삭제할까요?')) return;
        try {
          await fetch('/api/photos', { method: 'DELETE', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: p.id }) });
          loadPhotos();
        } catch (e) { toast('오프라인 — 연결 후 다시 시도해주세요'); }
      });
      grid.appendChild(el);
    });
  }

  async function loadThoughts() {
    const list = document.getElementById('tList');
    list.innerHTML = '<div class="empty">불러오는 중…</div>';
    let d;
    try {
      const r = await fetch('/api/thoughts');
      d = await r.json();
      if (!r.ok) {
        if (r.status === 401) { list.innerHTML = '<div class="empty">로그인이 풀렸어요 — <a href="/admin-login.html" style="color:var(--accent);">다시 로그인</a>해주세요.</div>'; return; }
        list.innerHTML = '<div class="empty">불러오지 못했어요: ' + (d.error || r.status) + '</div>';
        return;
      }
      setOnlineBar(true);
    } catch (e) {
      if (e instanceof TypeError) {
        setOnlineBar(false);
        list.innerHTML = '<div class="empty">오프라인이라 새로 불러올 수 없어요. 연결 후 다시 시도해주세요.</div>';
      } else {
        list.innerHTML = '<div class="empty">서버에 일시적인 문제가 있어요. 잠시 후 새로고침해주세요.</div>';
      }
      return;
    }
    if (!d.thoughts || !d.thoughts.length) { list.innerHTML = '<div class="empty">아직 기록이 없어요.</div>'; return; }
    list.innerHTML = '';
    d.thoughts.forEach(t => {
      const el = document.createElement('div');
      el.className = 'titem';
      const isTri = t.text && typeof t.text === 'object';
      const shownText = isTri ? (t.text.ko || t.text.en || t.text.zh || '') : (t.text || '');
      el.innerHTML =
        '<div class="tx">' + shownText + (isTri ? ' <span style="color:var(--faint); font-size:11px;">🌐 3개 언어</span>' : '') + '</div>' +
        (t.photoUrl ? '<img src="' + t.photoUrl + '" />' : '') +
        '<div class="meta">' + new Date(t.createdAt).toLocaleString('ko-KR') + ' · ' + (t.tags || []).join(' · ') + (t.published === false ? ' · 비공개' : '') + '</div>' +
        '<div class="row"><button data-act="pub">' + (t.published === false ? '공개하기' : '비공개') + '</button>' +
        '<button data-act="del">삭제</button></div>';
      el.querySelector('[data-act="pub"]').addEventListener('click', async () => {
        try {
          await fetch('/api/thoughts', { method: 'PATCH', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: t.id, published: t.published === false }) });
          loadThoughts();
        } catch (e) { toast('오프라인 — 연결 후 다시 시도해주세요'); }
      });
      el.querySelector('[data-act="del"]').addEventListener('click', async () => {
        if (!confirm('이 기록을 삭제할까요?')) return;
        try {
          await fetch('/api/thoughts', { method: 'DELETE', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: t.id }) });
          loadThoughts();
        } catch (e) { toast('오프라인 — 연결 후 다시 시도해주세요'); }
      });
      list.appendChild(el);
    });
  }

  async function loadInterview() {
    const el = document.getElementById('ivList');
    el.innerHTML = '<div class="empty">불러오는 중…</div>';
    let d;
    try {
      const r = await fetch('/api/interview-list');
      d = await r.json();
      if (!r.ok) {
        if (r.status === 401) { el.innerHTML = '<div class="empty">로그인이 풀렸어요 — <a href="/admin-login.html" style="color:var(--accent);">다시 로그인</a>해주세요.</div>'; return; }
        el.innerHTML = '<div class="empty">불러오지 못했어요: ' + (d.error || r.status) + '</div>';
        return;
      }
      setOnlineBar(true);
    } catch (e) {
      if (e instanceof TypeError) {
        setOnlineBar(false);
        el.innerHTML = '<div class="empty">오프라인이라 새로 불러올 수 없어요. 연결 후 다시 시도해주세요.</div>';
      } else {
        el.innerHTML = '<div class="empty">서버에 일시적인 문제가 있어요. 잠시 후 새로고침해주세요.</div>';
      }
      return;
    }
    if (!d.batches || !d.batches.length) { el.innerHTML = '<div class="empty">아직 저장된 답변이 없어요.</div>'; return; }
    el.innerHTML = '';
    d.batches.forEach(b => {
      const box = document.createElement('div');
      box.className = 'batch';
      const head = document.createElement('div');
      head.style.cssText = 'display:flex; justify-content:space-between; align-items:center;';
      const when = document.createElement('div'); when.className = 'when'; when.textContent = new Date(b.savedAt).toLocaleString('ko-KR');
      const delBtn = document.createElement('button');
      delBtn.textContent = '삭제';
      delBtn.style.cssText = 'background:none;border:1px solid var(--line);color:var(--muted);font-family:inherit;font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;';
      delBtn.addEventListener('click', async () => {
        if (!confirm('이 답변을 삭제할까요?')) return;
        try {
          await fetch('/api/interview-list', { method: 'DELETE', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ savedAt: b.savedAt }) });
          loadInterview();
        } catch (e) { toast('오프라인 — 연결 후 다시 시도해주세요'); }
      });
      head.appendChild(when); head.appendChild(delBtn);
      box.appendChild(head);
      b.items.forEach(it => box.appendChild(buildQA(it)));
      el.appendChild(box);
    });
  }

  // 인터뷰 답변 한 개. 요즘 저장된 건 자동으로 다듬어져 이미 공개 피드에 올라가 있음(autoPublished) —
  // 그럴 땐 상태 표시 + 원탭 비공개 전환만 보여준다. 이 기능 이전에 쌓인 백로그는 수동 "올리기" 버튼 유지.
  function buildQA(it) {
    const qa = document.createElement('div');
    qa.className = 'qa';
    const qq = document.createElement('div'); qq.className = 'qq'; qq.textContent = '[' + (it.node || '') + '] ' + (it.question || '');
    const aa = document.createElement('div'); aa.className = 'aa'; aa.textContent = it.answer || '';
    const row = document.createElement('div'); row.style.cssText = 'margin-top:8px; display:flex; align-items:center; gap:8px;';
    qa.appendChild(qq); qa.appendChild(aa); qa.appendChild(row);

    if (it.autoPublished && it.thoughtId) {
      const badge = document.createElement('span');
      badge.textContent = '✓ 자동으로 사이트에 올라갔어요';
      badge.style.cssText = 'color:var(--accent); font-size:11px;';
      const hideBtn = document.createElement('button');
      hideBtn.textContent = '비공개로 전환';
      hideBtn.style.cssText = 'background:none;border:1px solid var(--line);color:var(--muted);font-family:inherit;font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;';
      hideBtn.addEventListener('click', async () => {
        hideBtn.disabled = true;
        try {
          const r = await fetch('/api/thoughts', { method: 'PATCH', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: it.thoughtId, published: false }) });
          if (!r.ok) throw new Error('bad status');
          badge.textContent = '🔒 비공개로 돌렸어요 — 사이트에서 안 보여요';
          hideBtn.remove();
        } catch (e) { toast('오프라인 — 연결 후 다시 시도해주세요'); hideBtn.disabled = false; }
      });
      row.appendChild(badge); row.appendChild(hideBtn);
    } else {
      const pubBtn = document.createElement('button');
      pubBtn.textContent = '✦ 사이트에 올리기';
      pubBtn.style.cssText = 'background:none;border:1px solid var(--accent);color:var(--accent);font-family:inherit;font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;';
      row.appendChild(pubBtn);
      pubBtn.addEventListener('click', () => startPublish(it, qa, pubBtn, row));
    }
    return qa;
  }

  async function startPublish(it, qa, pubBtn, row) {
    pubBtn.disabled = true; pubBtn.textContent = '다듬는 중…';
    let polished;
    try {
      const r = await fetch('/api/polish-thought', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: it.question, answer: it.answer, node: it.node }),
      });
      if (r.status === 401) { toast('로그인이 풀렸어요 — 다시 로그인해주세요'); pubBtn.disabled = false; pubBtn.textContent = '✦ 사이트에 올리기'; return; }
      const d = await r.json();
      const raw = it.answer || '';
      polished = d.polished || { text: { ko: raw, en: raw, zh: raw }, tags: it.node ? [it.node] : [] };
    } catch (e) {
      toast('오프라인 — 연결 후 다시 시도해주세요'); pubBtn.disabled = false; pubBtn.textContent = '✦ 사이트에 올리기'; return;
    }

    const editor = document.createElement('div');
    editor.style.cssText = 'margin-top:8px; display:flex; flex-direction:column; gap:6px;';
    const langs = [['ko', '한국어'], ['en', 'English'], ['zh', '中文']];
    const tas = {};
    langs.forEach(([code, label]) => {
      const wrap = document.createElement('div');
      const cap = document.createElement('div');
      cap.textContent = label;
      cap.style.cssText = 'font-size:10.5px; color:var(--faint); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:3px;';
      const ta = document.createElement('textarea');
      ta.value = (polished.text && polished.text[code]) || '';
      ta.style.cssText = 'width:100%; min-height:56px; background:var(--bg); border:1px solid var(--line); border-radius:8px; color:var(--ink); font-family:inherit; font-size:13px; padding:9px; resize:vertical; box-sizing:border-box;';
      wrap.appendChild(cap); wrap.appendChild(ta);
      editor.appendChild(wrap);
      tas[code] = ta;
    });
    const tagsIn = document.createElement('input');
    tagsIn.value = (polished.tags || []).join(', ');
    tagsIn.placeholder = '관련 키워드 (쉼표 구분 — 성좌에 반영)';
    tagsIn.style.cssText = 'width:100%; background:var(--bg); border:1px solid var(--line); border-radius:8px; color:var(--ink); font-family:inherit; font-size:13px; padding:9px 10px; box-sizing:border-box;';
    const btnRow = document.createElement('div'); btnRow.style.cssText = 'display:flex; gap:6px;';
    const okBtn = document.createElement('button'); okBtn.textContent = '올리기';
    okBtn.style.cssText = 'background:var(--accent);color:#1a1712;border:none;font-family:inherit;font-weight:700;font-size:12px;padding:7px 16px;border-radius:6px;cursor:pointer;';
    const cancelBtn = document.createElement('button'); cancelBtn.textContent = '취소';
    cancelBtn.style.cssText = 'background:none;border:1px solid var(--line);color:var(--muted);font-family:inherit;font-size:12px;padding:7px 14px;border-radius:6px;cursor:pointer;';
    btnRow.appendChild(okBtn); btnRow.appendChild(cancelBtn);
    editor.appendChild(tagsIn); editor.appendChild(btnRow);
    row.style.display = 'none';
    qa.appendChild(editor);

    cancelBtn.addEventListener('click', () => {
      editor.remove(); row.style.display = ''; pubBtn.disabled = false; pubBtn.textContent = '✦ 사이트에 올리기';
    });
    okBtn.addEventListener('click', async () => {
      const text = { ko: tas.ko.value.trim(), en: tas.en.value.trim(), zh: tas.zh.value.trim() };
      if (!text.ko && !text.en && !text.zh) { toast('내용이 비어 있어요'); return; }
      const tags = tagsIn.value.split(',').map(s => s.trim()).filter(Boolean);
      okBtn.disabled = true; okBtn.textContent = '올리는 중…';
      try {
        const r = await fetch('/api/thoughts', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, tags, tagLabels: polished.tagLabels || {}, source: 'interview' }),
        });
        const d = await r.json().catch(() => ({}));
        if (r.ok && d.ok) {
          editor.remove();
          row.innerHTML = '';
          const done = document.createElement('span');
          done.textContent = '✓ 사이트에 올렸어요 — 공개 페이지 "최근의 생각들"에 바로 보여요';
          done.style.cssText = 'color:var(--accent); font-size:12px;';
          row.appendChild(done); row.style.display = '';
        } else {
          toast('발행 실패: ' + (d.error || r.status)); okBtn.disabled = false; okBtn.textContent = '올리기';
        }
      } catch (e) { toast('오프라인 — 연결 후 다시 시도해주세요'); okBtn.disabled = false; okBtn.textContent = '올리기'; }
    });
  }

  loadPhotos();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
})();
</script>
</body>
</html>
