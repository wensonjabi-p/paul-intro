<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>PM Map — TOPIK Coach (Paul)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/hub.css">

<body>
  <header class="site-header">
    <a href="../" class="logo">← Hub</a>
    <div class="lang-toggle">
      <button type="button" class="lang-btn active" data-lang="en">EN</button>
      <button type="button" class="lang-btn" data-lang="ko">KO</button>
    </div>
  </header>

  <div class="ops-wrap">
    <section class="ops-intro hero-block" style="padding-top:0">
      <p class="eyebrow">Paul only · noindex</p>
      <h1 data-i18n="opsTitle">PM map &amp; links</h1>
      <p class="lead" data-i18n="opsLead">Goals, progress, and one-click jumps to Notion, Google, Canva, GitHub, and deploy. Sync URLs in <code>hub/config/ops-links.json</code> with your Notion Map rows.</p>
    </section>

    <nav class="ops-global" id="primary-cta" aria-label="Primary"></nav>

    <p class="ops-section-title" data-i18n="opsGlobal">Workspace shortcuts</p>
    <nav class="ops-global" id="global-links" aria-label="Global links"></nav>

    <p class="ops-section-title" data-i18n="opsMilestones">Milestones (schedule)</p>
    <div id="milestones"></div>

    <p class="ops-section-title" data-i18n="opsItems">Work items (progress)</p>
    <div id="items"></div>
  </div>

  <footer class="site-footer">
    <p><a href="https://github.com/wensonjabi-p/paul-intro/blob/main/docs/ops-paul-workflow.md">Setup guide (Notion DB schema)</a></p>
  </footer>

  <script>
    window.HubI18nExtra = {

        opsTitle: "PM map & links",
        opsLead: "Goals and shortcuts. Read review first, then Notion daily.",

        opsMilestones: "Milestones (schedule)",
        opsItems: "Work items (progress)",
        opsReviewCta: "Review summary (read first)",
        opsNotionCta: "Open Notion",

      ko: {

        opsItems: "작업 항목 (진행)",
        opsReviewCta: "지금까지 정리 확인 (먼저 읽기)",
        opsNotionCta: "Notion 열기",
