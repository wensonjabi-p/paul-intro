<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paul Bhang — 생각의 파편들</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #201f1d;
    --bg-soft: #2b2926;
    --ink: #e8e5dd;
    --muted: #b0aca1;
    --faint: #7c786d;
    --accent: #c9a45c;
    --accent-dim: rgba(201, 164, 92, 0.5);
    --place: #cdbe9e;
    --line: rgba(232, 229, 221, 0.09);
    --font-display: 'Archivo Black', 'Pretendard', -apple-system, sans-serif;
    --font-mono: 'Space Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
    line-height: 1.7;
    overflow-x: hidden;
  }
  ::selection { background: var(--accent); color: var(--bg); }

  #bgTexture { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: -1; }

  /* ---------- HERO ---------- */
  .hero { min-height: 100vh; display: flex; flex-direction: column; position: relative; }
  .hero-top {
    display: flex; justify-content: space-between; align-items: center;
    padding: 28px 5vw; font-size: 13px; letter-spacing: 0.12em; color: var(--muted);
    max-width: 1100px; margin: 0 auto; width: 100%;
  }
  .hero-top .brand { color: var(--ink); font-weight: 600; letter-spacing: 0.18em; }
  .lang-toggle { display: flex; gap: 4px; }
  .lang-btn {
    background: none; border: 1px solid var(--line); color: var(--muted);
    font-family: inherit; font-size: 11px; letter-spacing: 0.08em; padding: 4px 10px;
    border-radius: 12px; cursor: pointer; transition: all 0.2s;
  }
  .lang-btn:hover { border-color: var(--accent-dim); color: var(--ink); }
  .lang-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 600; }
  .hero-head { padding: 4vh 5vw 0; max-width: 1100px; margin: 0 auto; width: 100%; }
  .hero-head .eyebrow {
    font-size: 13px; letter-spacing: 0.25em; color: var(--accent);
    text-transform: uppercase; margin-bottom: 18px;
  }
  .hero-head h1 {
    font-family: var(--font-display); font-size: clamp(34px, 6.2vw, 76px); font-weight: 700; line-height: 1.15; letter-spacing: -0.02em;
    text-shadow: 0 3px 26px rgba(0,0,0,0.55);
  }
  .hero-head h1 .dim { color: var(--faint); }
  .hero-head .sub {
    margin-top: 22px; font-size: clamp(14px, 1.6vw, 17px); color: var(--muted); max-width: 600px;
    text-shadow: 0 1px 10px rgba(0,0,0,0.4);
  }
  .hero-head .sub b { color: var(--ink); font-weight: 600; }
  .identity-line {
    margin-top: 16px; font-size: 12px; letter-spacing: 0.22em; color: var(--faint); text-transform: uppercase;
  }

  /* ---------- LEGEND ---------- */
  .legend {
    display: flex; flex-wrap: wrap; gap: 16px; padding: 20px 5vw 0; font-size: 12px; color: var(--muted);
    max-width: 1100px; margin: 0 auto; width: 100%;
  }
  .legend .item { display: flex; align-items: center; gap: 7px; letter-spacing: 0.04em; }
  .legend .swatch { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .sw-core { background: var(--accent); }
  .sw-place { background: var(--place); box-shadow: 0 0 0 3px rgba(205,190,158,0.22); }
  .sw-assoc { background: rgba(237,235,230,0.5); }
  .sw-wild { background: rgba(237,235,230,0.28); }

  /* ---------- CONSTELLATION ---------- */
  .sky-toolbar {
    display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
    gap: 10px 16px; padding: 3vh 5vw 0; margin-top: 2vh;
  }
  .constellation-wrap { position: relative; flex: 1; }
  #sky { display: block; width: 100%; height: 54vh; min-height: 400px; cursor: default; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  .sky-hint {
    font-size: 12.5px; color: var(--muted);
    letter-spacing: 0.08em; pointer-events: none; transition: opacity 0.6s;
  }
  .sky-hint .k { color: var(--accent); }
  .sky-btns { display: flex; gap: 8px; flex-shrink: 0; }
  .sky-btn {
    font-size: 13px; font-weight: 600; padding: 8px 18px; border-radius: 20px; cursor: pointer;
    letter-spacing: 0.04em; transition: all 0.25s; font-family: inherit;
  }
  .sky-btn-gold {
    background: rgba(201,164,92,0.1); border: 1px solid var(--accent-dim); color: var(--accent);
  }
  .sky-btn-gold:hover { background: rgba(201,164,92,0.2); border-color: var(--accent); }
  .sky-btn-ghost {
    background: rgba(232,229,221,0.05); border: 1px solid var(--line); color: var(--ink);
  }
  .sky-btn-ghost:hover { background: rgba(232,229,221,0.1); border-color: var(--muted); }

  /* ---------- SYNTHESIS ---------- */
  .synthesis { padding: 0 5vw 8vh; max-width: 1100px; margin: 0 auto; width: 100%; }
  .synth-empty { color: var(--faint); font-size: 14px; border-top: 1px solid var(--line); padding-top: 28px; }

  .story-single { border-top: 1px solid var(--line); padding-top: 30px; }
  .story-single .badge {
    display: inline-block; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 4px 12px; border-radius: 3px; margin-bottom: 16px;
  }
  .badge.t-core { background: rgba(201,164,92,0.15); color: var(--accent); }
  .badge.t-place { background: rgba(205,190,158,0.16); color: var(--place); }
  .badge.t-associative { background: rgba(237,235,230,0.08); color: var(--muted); }
  .badge.t-wildcard { background: rgba(237,235,230,0.06); color: var(--muted); }
  .story-single .era { font-family: var(--font-mono); font-size: 13px; color: var(--faint); letter-spacing: 0.02em; margin-left: 12px; }
  .story-single .headword {
    font-family: var(--font-display); font-size: clamp(30px, 5vw, 52px); font-weight: 700; line-height: 1.15; letter-spacing: -0.01em;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  .story-single .prose {
    margin-top: 20px; font-size: clamp(16px, 2vw, 20px); line-height: 1.85; color: var(--ink); max-width: 720px;
  }
  .doodle-box { float: right; margin: 0 0 14px 20px; text-align: center; }
  .doodle-box svg { width: 92px; height: 92px; color: var(--ink); opacity: 0.9; display: block; }
  .doodle-redraw {
    display: block; margin: 2px auto 0; background: none; border: none; color: var(--faint);
    font-size: 10px; cursor: pointer; font-family: inherit; letter-spacing: 0.03em; padding: 2px;
  }
  .doodle-redraw:hover { color: var(--accent); }
  .fact-bar { margin-top: 18px; max-width: 420px; }
  .fact-bar-label { display: flex; justify-content: space-between; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .fact-bar-pct { color: var(--accent); font-weight: 600; }
  .fact-bar-track { height: 6px; border-radius: 3px; background: rgba(237,235,230,0.08); overflow: hidden; }
  .fact-bar-fill { height: 100%; background: linear-gradient(90deg, var(--place), var(--accent)); border-radius: 3px; }
  .fact-bar-note { font-size: 11px; color: var(--faint); margin-top: 6px; line-height: 1.5; }
  .ask-ribbon {
    margin-top: 22px; display: inline-flex; align-items: center; gap: 10px;
    background: rgba(201,164,92,0.1); border: 1px solid var(--accent-dim); border-radius: 8px;
    padding: 12px 18px; font-size: 13.5px; color: var(--accent); max-width: 640px; line-height: 1.6;
  }
  .related-row { margin-top: 30px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .related-row .lbl { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--faint); margin-right: 6px; }
  .chip {
    font-size: 13px; color: var(--muted); border: 1px solid var(--line); padding: 5px 13px;
    border-radius: 16px; cursor: pointer; transition: all 0.25s; letter-spacing: 0.03em;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  .card-make-btn {
    margin-top: 22px; background: none; border: 1px solid var(--accent-dim); color: var(--accent);
    font-family: inherit; font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 20px;
    cursor: pointer; letter-spacing: 0.03em; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
  }
  .card-make-btn:hover { background: rgba(201,164,92,0.1); }
  .story-remake-btn {
    margin-top: 22px; margin-right: 10px; background: none; border: 1px solid var(--line); color: var(--muted);
    font-family: inherit; font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 20px;
    cursor: pointer; letter-spacing: 0.03em; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
  }
  .story-remake-btn:hover { border-color: var(--muted); color: var(--ink); }
  .story-remake-btn:disabled { opacity: 0.6; cursor: default; }
  .card-maker {
    margin-top: 26px; border-top: 1px solid var(--line); padding-top: 26px;
  }
  .card-maker .cm-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
  .card-maker .cm-title { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--faint); }
  .card-maker .cm-head-btns { display: flex; align-items: center; gap: 10px; }
  .card-maker .cm-restyle {
    background: rgba(201,164,92,0.1); border: 1px solid var(--accent-dim); color: var(--accent); font-family: inherit;
    font-size: 12px; padding: 7px 14px; border-radius: 16px; cursor: pointer; transition: all 0.2s;
  }
  .card-maker .cm-restyle:hover { background: rgba(201,164,92,0.18); }
  .card-maker .cm-restyle:disabled { opacity: 0.6; cursor: default; }
  .card-maker .cm-dl-selected {
    background: none; border: 1px solid var(--line); color: var(--muted); font-family: inherit;
    font-size: 12px; padding: 7px 14px; border-radius: 16px; cursor: pointer; transition: all 0.2s;
  }
  .card-maker .cm-dl-selected:hover { border-color: var(--muted); color: var(--ink); }
  .card-maker .cm-close {
    background: none; border: none; color: var(--faint); font-size: 13px; cursor: pointer; padding: 4px 8px;
  }
  .card-maker .cm-close:hover { color: var(--ink); }
  .cm-status { color: var(--muted); font-size: 14px; padding: 20px 0; }
  .cm-sets { display: flex; flex-direction: column; gap: 28px; }
  .cm-set-label {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint);
    margin-bottom: 12px; padding-top: 14px; border-top: 1px solid var(--line);
  }
  .cm-set:first-child .cm-set-label { border-top: none; padding-top: 0; }
  .cm-row { display: flex; gap: 18px; overflow-x: auto; padding-bottom: 10px; }
  .cm-card { flex: 0 0 auto; text-align: center; }
  .cm-card canvas {
    width: 220px; height: auto; border-radius: 10px; border: 1px solid var(--line); display: block;
    box-shadow: 0 12px 34px rgba(0,0,0,0.35);
  }
  .cm-card .cm-lang { margin-top: 10px; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--faint); }
  .cm-card .cm-check {
    display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 8px;
    font-size: 11.5px; color: var(--muted); cursor: pointer;
  }
  .cm-card .cm-btns { margin-top: 8px; display: flex; gap: 6px; justify-content: center; }
  .cm-card .cm-btns button {
    background: none; border: 1px solid var(--line); color: var(--muted); font-family: inherit;
    font-size: 11.5px; padding: 6px 11px; border-radius: 14px; cursor: pointer; transition: all 0.2s;
  }
  .cm-card .cm-btns button:hover { border-color: var(--accent-dim); color: var(--accent); }

  .synth-title {
    font-family: var(--font-display); font-size: clamp(22px, 3.2vw, 34px); font-weight: 700; line-height: 1.3;
    border-top: 1px solid var(--line); padding-top: 30px; text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  .synth-title .x { color: var(--accent); font-weight: 400; padding: 0 6px; }
  .synth-lede { margin-top: 12px; color: var(--muted); font-size: 14.5px; max-width: 680px; }
  .synth-grid {
    margin-top: 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px;
  }
  .story-card {
    border: 1px solid var(--line); border-radius: 10px; padding: 20px 22px; background: var(--bg-soft);
    transition: border-color 0.25s;
  }
  .story-card:hover { border-color: var(--accent-dim); }
  .story-card .cap { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 8px; }
  .story-card.t-core .cap { color: var(--accent); }
  .story-card.t-place .cap { color: var(--place); }
  .story-card.t-associative .cap, .story-card.t-wildcard .cap { color: var(--muted); }
  .story-card .hw { font-size: 17px; font-weight: 600; }
  .story-card .tx { font-size: 13.5px; color: var(--muted); margin-top: 10px; line-height: 1.7; }

  .synth-thoughts { margin-top: 34px; }
  .synth-thoughts h4 {
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--faint); margin-bottom: 16px;
  }
  .thought-card { border-left: 2px solid var(--accent); padding: 4px 0 4px 20px; margin-bottom: 20px; }
  .thought-card .txt { font-size: 15px; line-height: 1.75; color: var(--ink); max-width: 720px; }
  .thought-card .meta { font-family: var(--font-mono); font-size: 12px; color: var(--faint); margin-top: 8px; letter-spacing: 0.02em; }

  /* ---------- FEED + ADD ---------- */
  .feed { padding: 10vh 5vw 12vh; max-width: 1100px; margin: 0 auto; border-top: 1px solid var(--line); }
  .feed .eyebrow {
    font-size: 13px; letter-spacing: 0.25em; color: var(--accent); text-transform: uppercase; margin-bottom: 16px;
  }
  .feed h2 { font-family: var(--font-display); font-size: clamp(26px, 4vw, 44px); font-weight: 700; }
  .feed .lede { margin-top: 14px; color: var(--muted); max-width: 620px; font-size: 15px; }
  .feed-list { margin-top: 6vh; }

  /* ---------- GUESTBOOK ---------- */
  .guestbook { padding: 10vh 5vw 4vh; max-width: 1100px; margin: 0 auto; border-top: 1px solid var(--line); }
  .guestbook .eyebrow {
    font-size: 13px; letter-spacing: 0.25em; color: var(--accent); text-transform: uppercase; margin-bottom: 16px;
  }
  .guestbook h2 { font-family: var(--font-display); font-size: clamp(26px, 4vw, 44px); font-weight: 700; }
  .guestbook .lede { margin-top: 14px; color: var(--muted); max-width: 620px; font-size: 15px; }
  .gb-visits { margin-top: 10px; font-family: var(--font-mono); font-size: 12px; color: var(--faint); letter-spacing: 0.03em; }
  .gb-list { margin-top: 5vh; max-width: 720px; }
  .gb-empty { color: var(--faint); font-size: 14px; }
  .gb-item { border-left: 2px solid var(--line); padding: 4px 0 4px 20px; margin-bottom: 22px; }
  .gb-item .gb-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .gb-item .gb-txt { font-size: 15px; line-height: 1.7; color: var(--ink); margin-top: 4px; word-break: break-word; }
  .gb-item .gb-meta { font-family: var(--font-mono); font-size: 11px; color: var(--faint); margin-top: 8px; letter-spacing: 0.02em; }
  .gb-actions { margin-top: 8px; display: flex; gap: 14px; }
  .gb-actions button {
    background: none; border: none; padding: 0; color: var(--muted); font-size: 12px; cursor: pointer;
    letter-spacing: 0.03em; text-decoration: underline; text-underline-offset: 3px;
  }
  .gb-actions button:hover { color: var(--accent); }
  .gb-replies { margin-top: 16px; }
  .gb-replies .gb-item { border-left-color: var(--faint); }
  .gb-reply-form { margin-top: 12px; max-width: 520px; }
  .gb-reply-form textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--line); border-radius: 8px;
    color: var(--ink); font-family: inherit; font-size: 14px; padding: 10px 12px; min-height: 60px; resize: vertical;
  }
  .gb-reply-form textarea:focus { outline: none; border-color: var(--accent); }
  .gb-reply-form .btns { margin-top: 10px; display: flex; gap: 8px; }
  .gb-reply-form .btns button {
    font-size: 12px; padding: 8px 16px; border-radius: 6px; cursor: pointer; letter-spacing: 0.03em;
  }
  .gb-reply-form .btn-gold { background: var(--accent); color: var(--bg); border: none; font-weight: 700; }
  .gb-reply-form .btn-cancel { background: none; border: 1px solid var(--line); color: var(--muted); }

  .form-box {
    margin-top: 7vh; border: 1px solid var(--line); border-radius: 12px; padding: 30px;
    background: var(--bg-soft); max-width: 720px;
  }
  .form-box h4 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .form-box .hint { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
  .form-box label {
    display: block; font-size: 12px; letter-spacing: 0.1em; color: var(--muted);
    margin: 16px 0 6px; text-transform: uppercase;
  }
  .form-box textarea, .form-box input {
    width: 100%; background: var(--bg); border: 1px solid var(--line); border-radius: 8px;
    color: var(--ink); font-family: inherit; font-size: 14px; padding: 12px 14px; transition: border-color 0.25s;
  }
  .form-box textarea { min-height: 90px; resize: vertical; }
  .form-box textarea:focus, .form-box input:focus { outline: none; border-color: var(--accent); }
  .form-box .btns { margin-top: 24px; display: flex; gap: 10px; }
  .btn-gold {
    background: var(--accent); color: var(--bg); border: none; font-weight: 700; font-size: 14px;
    padding: 12px 26px; border-radius: 8px; cursor: pointer; letter-spacing: 0.04em; transition: opacity 0.25s;
  }
  .btn-gold:hover { opacity: 0.85; }
  .btn-ghost {
    background: none; color: var(--muted); border: 1px solid var(--line); font-size: 14px;
    padding: 12px 22px; border-radius: 8px; cursor: pointer; transition: all 0.25s;
  }
  .btn-ghost:hover { color: var(--ink); border-color: var(--muted); }

  /* ---------- FOOTER ---------- */
  .footer {
    border-top: 1px solid var(--line); padding: 10vh 5vw; max-width: 1100px; margin: 0 auto;
  }
  .footer h2 { font-family: var(--font-display); font-size: clamp(24px, 3.5vw, 40px); font-weight: 700; line-height: 1.3; text-shadow: 0 2px 18px rgba(0,0,0,0.4); }
  .footer .contact { margin-top: 20px; font-size: 15px; color: var(--muted); }
  .footer .contact a { color: var(--accent); text-decoration: none; }
  .footer .contact a:hover { text-decoration: underline; }
  .credit { padding: 30px 5vw 10px; font-size: 12px; color: var(--faint); letter-spacing: 0.1em; text-align: center; }

  /* ---------- SHARE ---------- */
  .share-section { max-width: 1100px; margin: 0 auto; padding: 4vh 5vw 6vh; text-align: center; position: relative; }
  .share-btn {
    background: none; border: 1px solid var(--line); color: var(--ink); font-family: inherit;
    font-size: 13px; font-weight: 600; padding: 10px 24px; border-radius: 20px; cursor: pointer;
    letter-spacing: 0.04em; transition: all 0.2s;
  }
  .share-btn:hover { border-color: var(--accent-dim); color: var(--accent); }
  .share-menu {
    position: absolute; left: 50%; bottom: calc(100% + 10px); transform: translateX(-50%);
    background: var(--bg-soft); border: 1px solid var(--line); border-radius: 12px; padding: 8px;
    display: flex; flex-direction: column; gap: 2px; min-width: 200px; box-shadow: 0 12px 40px rgba(0,0,0,0.4); z-index: 5;
  }
  .share-opt {
    display: flex; align-items: center; gap: 10px; background: none; border: none; color: var(--ink);
    font-family: inherit; font-size: 13.5px; padding: 10px 12px; border-radius: 8px; cursor: pointer; text-align: left; width: 100%;
  }
  .share-opt:hover { background: rgba(232,229,221,0.06); }
  .share-opt .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  #share-qr {
    position: absolute; left: 50%; bottom: calc(100% + 10px); transform: translateX(-50%);
    background: #f2ede1; border-radius: 12px; padding: 18px; box-shadow: 0 12px 40px rgba(0,0,0,0.4); z-index: 5;
  }
  #share-qr img { display: block; width: 160px; height: 160px; }
  #share-qr .qr-cap { margin-top: 10px; font-size: 11.5px; color: #4a473f; text-align: center; }

  @media (max-width: 720px) {
    #sky { height: 60vh; }
  }
</style>
</head>
<body>

<canvas id="bgTexture"></canvas>
<script>
(function () {
  // 콘크리트 질감 + 촘촘한 격자 빛 — 한 번만 그리는 정적 배경 (매 프레임 다시 그리지 않음, 리사이즈에만 반응)
  var canvas = document.getElementById('bgTexture');
  var ctx = canvas.getContext('2d');
  var resizeTimer;

  function draw() {
    var DPR = Math.min(window.devicePixelRatio || 1, 2);
    var W = window.innerWidth, H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    var base = ctx.createLinearGradient(0, 0, W, H);
    base.addColorStop(0, '#26241f');
    base.addColorStop(0.55, '#302e29');
    base.addColorStop(1, '#201f1c');
    ctx.fillStyle = base;
    ctx.fillRect(0, 0, W, H);

    var i, x, y, a;
    for (i = 0; i < (W * H) / 900; i++) {
      x = Math.random() * W; y = Math.random() * H; a = Math.random() * 0.045;
      ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,' + a + ')' : 'rgba(0,0,0,' + (a * 1.3) + ')';
      ctx.fillRect(x, y, 1.1, 1.1);
    }

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    var cell = 22, pad = cell * 3, gx, gy;
    for (gx = -pad; gx < W + pad; gx += cell) {
      for (gy = -pad; gy < H + pad; gy += cell) {
        if (Math.random() > 0.68) {
          a = (0.04 + Math.random() * 0.07);
          ctx.fillStyle = 'rgba(232,218,196,' + a + ')';
          ctx.fillRect(gx, gy, cell * 0.6, cell * 0.6);
        }
      }
    }
    ctx.restore();

    [[W * 0.14, H * 0.22, W * 0.32], [W * 0.85, H * 0.68, W * 0.4], [W * 0.5, H * 1.05, W * 0.5]].forEach(function (s) {
      var glow = ctx.createRadialGradient(s[0], s[1], 0, s[0], s[1], s[2]);
      glow.addColorStop(0, 'rgba(232,218,196,0.09)');
      glow.addColorStop(1, 'rgba(232,218,196,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, W, H);
    });

    var vg = ctx.createRadialGradient(W * 0.5, H * 0.35, W * 0.2, W * 0.5, H * 0.5, W * 0.85);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.3)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(draw, 200);
  });
  draw();
})();
</script>

  const LS_KEY = 'paul-intro-user-v2';

  const NOW = Date.now();
  function buildBaseThoughts() {
    return D.thoughts.map(t => ({ id: t.id, text: t.text, tags: t.tags, addedAt: NOW - t.daysAgo * 86400000 }));
  }
  // 서버에서 라이브로 받아오는 발행된 생각들 — 인터뷰/기록에서 올라온 최신 콘텐츠. data.js를 손대지 않아도 여기서 갱신됨.

  const VISIBLE_COUNT = 13; // 한 번에 보이는 단어 수 (10~15 사이)
  // PNG 투자 목록처럼 이야기 빈도가 낮은 키워드 — 가끔만 보이게
  const RARE_IDS = new Set(['noni', 'coffee', 'ebony', 'taekwondo', 'scrap', 'chain', 'subline']);
  function nodeDisplayWeight(n, preferFresh) {
    if (!n) return 0.05;
    let w = 1;
    if (n.status === 'told') w += 2.2;
    else if (n.status === 'seed') w += 0.4;
    const storyLen = (n.story || '').length;
    if (storyLen > 280) w += 1.8;
    else if (storyLen > 160) w += 1;
    else if (storyLen < 90) w *= 0.45;
    const thoughtHits = (D.thoughts || []).filter(t => (t.tags || []).includes(n.id)).length;
    w += thoughtHits * 0.9;
    const comboHits = (D.combos || []).filter(c => (c.ids || []).includes(n.id)).length;
    w += comboHits * 0.7;
    const linkHits = (n.links || []).length;
    w += Math.min(linkHits, 4) * 0.15;
    if (RARE_IDS.has(n.id)) w *= 0.22;
    // 새로고침 시 새 단어(fresh)를 우선적으로
    if (preferFresh && n.fresh) w *= 3.2;
    else if (n.fresh) w *= 1.6;
    // 방금 동적(인터뷰)으로 생긴 단어도 우선
    if (preferFresh && n.type === 'wildcard' && n.status === 'told' && n.fresh && !(DATASETS.ko.nodes || []).some(x => x.id === n.id)) {
      w *= 1.4;
    }
    return Math.max(0.04, w);
  }
  function weightedSample(ids, count, preferFresh) {
    const bag = ids.map(id => ({ id, w: nodeDisplayWeight(nodeById(id) || state.nodes.find(n => n.id === id), preferFresh) }));
    const picked = [];
    while (picked.length < count && bag.length) {
      const total = bag.reduce((s, x) => s + x.w, 0);
      let r = Math.random() * total;
      let idx = 0;
      for (; idx < bag.length; idx++) {
        r -= bag[idx].w;
        if (r <= 0) break;
      }
      idx = Math.min(idx, bag.length - 1);
      picked.push(bag[idx].id);
      bag.splice(idx, 1);
    }
    return picked;
  }
  function pickVisibleSubset(count, keepIds, preferFresh) {
    const keep = keepIds || [];
    const pool = state.nodes.map(n => n.id).filter(id => !keep.includes(id));
    const need = Math.max(0, count - keep.length);
    // 새로고침(다른 단어 보기)일 때 fresh 우선, 첫 로드도 약간 반영
    return [...keep, ...weightedSample(pool, need, preferFresh !== false)];
  }

  const state = {

  // nodeById는 pick 전에 필요 — 임시로 D.nodes 기준

  state.visibleIds = pickVisibleSubset(VISIBLE_COUNT, [], true);
  nodeById = id => state.nodes.find(n => n.id === id);
  const labelOf = id => (nodeById(id) || {}).label || id;
  // 생각의 text는 예전 항목처럼 단순 문자열이거나, 새로 다듬어진 항목처럼 {ko,en,zh}일 수 있다 —
  // 현재 사이트 언어에 맞는 버전을 고른다.

  // 새로 발행된 생각들 중 기존 성좌 노드에 없는 태그는, 그 자체로 클릭 가능한 단어(엉뚱한 갈고리 부류)로
  // 성좌에 편입시킨다 — 안 그러면 새 인터뷰 내용의 키워드가 "최근의 생각들" 피드에만 보이고
  // 성좌에는 영원히 안 나타나게 된다.
  let dynamicByLang = { ko: [], en: [], zh: [] };
  function buildDynamicNodes() {
    const byTag = {};
    remoteThoughts.forEach(t => {
      if (t.source !== 'interview') return; // AI가 다듬고 라벨까지 붙인 인터뷰 답변만 — 빠른 기록의 자유 태그는 제외(품질 관리)
      (t.tags || []).forEach(tag => {
        if (!tag || (DATASETS.ko.nodes || []).some(n => n.id === tag)) return; // 이미 curated 노드로 존재
        if (!byTag[tag]) byTag[tag] = { labels: null, storiesByLang: { ko: [], en: [], zh: [] } };
        const entry = byTag[tag];
        if (!entry.labels && t.tagLabels && t.tagLabels[tag]) entry.labels = t.tagLabels[tag];
        const rawText = t.text;
        ['ko', 'en', 'zh'].forEach(l => {
          const txt = (rawText && typeof rawText === 'object') ? rawText[l] : (l === 'ko' ? rawText : null);
          if (txt && entry.storiesByLang[l].length < 3) entry.storiesByLang[l].push(txt);
        });
      });
    });
    const out = { ko: [], en: [], zh: [] };
    Object.keys(byTag).forEach(tag => {
      const entry = byTag[tag];
      ['ko', 'en', 'zh'].forEach(l => {
        const label = (entry.labels && entry.labels[l]) || tag;
        const story = entry.storiesByLang[l].join(' ') || entry.storiesByLang.ko.join(' ') || tag;
        out[l].push({ id: tag, label, type: 'wildcard', status: 'told', fresh: true, story, links: [] });
      });
    });
    dynamicByLang = out;
  }
  function nodesFor(lang) {
    return ((DATASETS[lang] && DATASETS[lang].nodes) || []).concat(dynamicByLang[lang] || []);
  }

  document.getElementById('lang-toggle').addEventListener('click', e => {

  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
  let particles = [];
  let hovered = null;

  const TYPE = {
    core:        { size: 19, alpha: 0.88, color: '224,187,117', drift: 0.05 },
    place:       { size: 21, alpha: 1,    color: '224,211,180', drift: 0.035 },
    associative: { size: 17, alpha: 0.72, color: '237,235,230', drift: 0.07 },
    wildcard:    { size: 15, alpha: 0.55, color: '237,235,230', drift: 0.11 },
  };

  function initParticles() {
    const prev = particles;
    const visible = state.visibleIds.map(nodeById).filter(Boolean);
    particles = visible.map(n => {
      const ex = prev.find(p => p.id === n.id);
      if (ex) { ex.label = n.label; ex.type = n.type; return ex; }
      const t = TYPE[n.type] || TYPE.core;
      return {
        id: n.id, label: n.label, type: n.type,
        x: 60 + Math.random() * (W - 120),
        y: 44 + Math.random() * (H - 88),
        vx: (Math.random() - 0.5) * t.drift,
        vy: (Math.random() - 0.5) * t.drift,
        w: 0,
        freshMul: n.fresh ? 1.55 : 1,
        pulsePhase: Math.random() * Math.PI * 2,
        pulseSpeed: 0.006 + Math.random() * 0.012,
        pulseAmp: 0.05 + Math.random() * 0.05,
      };
    });
  }

  function scatter(p) {
    const t = TYPE[p.type] || TYPE.core;
    p.x = 60 + Math.random() * (W - 120);
    p.y = 44 + Math.random() * (H - 88);
    p.vx = (Math.random() - 0.5) * t.drift;
    p.vy = (Math.random() - 0.5) * t.drift;
  }

  let prevW = 0, prevH = 0;
  function resize() {
    const rect = canvas.getBoundingClientRect();
    const newW = rect.width, newH = rect.height;
    // 화면 폭이 바뀌면(모바일↔데스크톱 등) 기존 단어 위치를 새 캔버스 크기에 맞춰 비율대로 다시 펼침 — 안 그러면 좁은 화면 때 위치가 넓은 화면에서 한쪽에 뭉쳐 보임
    if (prevW && prevH && particles.length && (prevW !== newW || prevH !== newH)) {
      const rx = newW / prevW, ry = newH / prevH;
      particles.forEach(p => { p.x *= rx; p.y *= ry; });
    }
    W = newW; H = newH;
    canvas.width = W * DPR; canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    if (!particles.length) initParticles();
    particles.forEach(p => {
      p.x = Math.min(Math.max(p.x, 44), W - 44);
      p.y = Math.min(Math.max(p.y, 28), H - 18);
    });
    prevW = W; prevH = H;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(237,235,230,0.05)';
    for (let i = 0; i < 46; i++) ctx.fillRect((i * 97.3) % W, (i * 53.7) % H, 1.1, 1.1);

    const sel = particles.filter(p => state.selected.includes(p.id));
    if (sel.length > 1) {
      ctx.strokeStyle = 'rgba(201,164,92,0.55)'; ctx.lineWidth = 1;
      for (let i = 0; i < sel.length; i++)
        for (let j = i + 1; j < sel.length; j++) {
          ctx.beginPath(); ctx.moveTo(sel[i].x, sel[i].y); ctx.lineTo(sel[j].x, sel[j].y); ctx.stroke();
        }
    }

    // 넓은 화면일수록 단어를 비례해서 키움(모바일 크기를 기준선으로, 최대 1.6배까지)
    const sizeScale = Math.min(1.6, Math.max(1, W / 800));

    particles.forEach(p => {
      const t = TYPE[p.type] || TYPE.core;
      const isSel = state.selected.includes(p.id);
      const isHov = hovered === p.id;
      const comboW = isSel && state.activeCombo && state.activeCombo.weights[p.id];
      const selMul = isSel ? (comboW || 1.25) : 1;
      // 은은하게 숨쉬듯 커졌다 작아졌다 — 단어마다 위상·속도가 달라서 다 같이 움직이지 않는다.
      const pulse = 1 + Math.sin(p.pulsePhase || 0) * (p.pulseAmp || 0);
      const fs = t.size * selMul * p.freshMul * sizeScale * pulse;
      ctx.font = (isSel ? '700 ' : '400 ') + fs + 'px Pretendard, "Malgun Gothic", sans-serif';
      ctx.textAlign = 'center';
      p.w = ctx.measureText(p.label).width;
      p.fs = fs;

      if (p.type === 'place') {
        ctx.beginPath();
        ctx.arc(p.x, p.y - fs * 0.35, 2.4, 0, Math.PI * 2);
        ctx.fillStyle = isSel ? '#cdbe9e' : 'rgba(205,190,158,0.7)';
        ctx.fill();
      }

      let a = isSel ? 1 : (isHov ? Math.min(t.alpha + 0.4, 1) : t.alpha);
      ctx.shadowColor = 'rgba(0,0,0,0.65)';
      ctx.shadowBlur = 6;
      ctx.fillStyle = isSel ? '#c9a45c' : 'rgba(' + t.color + ',' + a + ')';
      ctx.fillText(p.label, p.x, p.y);
      ctx.shadowBlur = 0;

      if (isSel) {
        ctx.beginPath();
        ctx.arc(p.x, p.y + fs * 0.55, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = '#c9a45c'; ctx.fill();
      }
    });
  }

  function stepLoop() {
    particles.forEach(p => {
      p.freshMul += (1 - p.freshMul) * 0.003;
      p.pulsePhase = (p.pulsePhase || 0) + (p.pulseSpeed || 0.008); // 선택된 단어도 계속 은은하게 숨쉬게
      if (state.selected.includes(p.id)) return;

      const t = TYPE[p.type] || TYPE.core;
      // 일직선으로 튕기기만 하지 않도록 매 프레임 살짝 무작위로 방향을 흔들어준다 — 자연스럽게 흘러다니는 느낌.
      p.vx += (Math.random() - 0.5) * t.drift * 0.05;
      p.vy += (Math.random() - 0.5) * t.drift * 0.05;
      const maxSpeed = t.drift * 1.8, minSpeed = t.drift * 0.25;
      const speed = Math.hypot(p.vx, p.vy) || 0.0001;
      if (speed > maxSpeed) { p.vx = p.vx / speed * maxSpeed; p.vy = p.vy / speed * maxSpeed; }
      else if (speed < minSpeed) { p.vx = p.vx / speed * minSpeed; p.vy = p.vy / speed * minSpeed; }

      p.x += p.vx; p.y += p.vy;
      const hw = p.w / 2 + 14;
      if (p.x < hw || p.x > W - hw) p.vx *= -1;
      if (p.y < 32 || p.y > H - 16) p.vy *= -1;
    });
    draw();
    requestAnimationFrame(stepLoop);
  }

  function hitTest(mx, my) {
    for (const p of particles) {
      const hw = Math.max(p.w / 2 + 16, 34);
      const hv = Math.max((p.fs || 16) * 0.9, 28);
      if (mx > p.x - hw && mx < p.x + hw && my > p.y - hv - 8 && my < p.y + hv * 0.6) return p;
    }
    return null;
  }

  canvas.addEventListener('mousemove', e => {

    const p = hitTest(e.clientX - r.left, e.clientY - r.top);
    hovered = p ? p.id : null;
    canvas.style.cursor = p ? 'pointer' : 'default';
  });

  let downPos = null;
  canvas.addEventListener('pointerdown', e => { downPos = { x: e.clientX, y: e.clientY }; });
  canvas.addEventListener('click', e => {
    if (downPos && Math.hypot(e.clientX - downPos.x, e.clientY - downPos.y) > 12) return;
    const r = canvas.getBoundingClientRect();
    const p = hitTest(e.clientX - r.left, e.clientY - r.top);
    if (p) toggleSelect(p.id);
  });

  function toggleSelect(id) {
    const i = state.selected.indexOf(id);
    if (i >= 0) {
      state.selected.splice(i, 1);
    } else {
      if (state.selected.length >= 3) state.selected.shift();
      state.selected.push(id);
      if (!state.visibleIds.includes(id)) {
        state.visibleIds.push(id);
        initParticles();
      }
    }
    state.storyOverride = null; // 선택이 바뀌면 이전 단어의 대체 글은 더 이상 유효하지 않음
    renderSynthesis();
  }

  document.getElementById('sky-reset').addEventListener('click', () => {
    // 선택된 단어는 유지. 새로고침 때는 fresh·이야기 빈도 높은 단어를 우선 섞고,
    // 노니/태권도/고철 등 낮은 빈도 키워드는 가끔만 등장.
    const keep = [...new Set([...state.selected, ...recentTagIds(15, 4)])];
    state.visibleIds = pickVisibleSubset(VISIBLE_COUNT, keep, true);
    initParticles();
    particles.forEach(p => {
      if (keep.includes(p.id)) return;
      scatter(p);

  document.getElementById('sky-deselect').addEventListener('click', () => {

  /* ---------- 손그림 낙서 아이콘 ----------
     완전 랜덤(코드가 뜻 모르고 그리는 추상 낙서) 대신, 자주 나오는 단어는 의미를 아는 내가 뼈대(점 목록)를
     미리 정해두고, 그 뼈대를 매번 손떨림(흔들림+휨)으로 다르게 그려서 손그림 느낌을 낸다. 뼈대가 없는
     단어(주로 새로 생기는 동적 키워드)는 추상 낙서로 자동 대체 — 절대 깨지지 않는 폴백.
     스토리 페이지에서는 "다시 그리기"로 매번 다르게, 카드에서는 항상 시드 0(고정)으로 공유 결과물이
     안정적이게 한다. */
  function mulberry32(seed) {
    return function () {
      seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
      let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };

  function hashStr(s) {
    let h = 2166136261;
    for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
    return h >>> 0;
  }
  function ditJitter(rand, amt) { return (rand() - 0.5) * amt; }
  function circlePts(cx, cy, r, segs) {
    segs = segs || 16; const pts = [];
    for (let i = 0; i <= segs; i++) { const a = (i / segs) * Math.PI * 2; pts.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r]); }
    return pts;
  }
  function spiralPts(cx, cy, turns, maxR) {
    const pts = []; const steps = 40;
    for (let i = 0; i <= steps; i++) { const t = i / steps; const a = t * Math.PI * 2 * turns; const r = t * maxR; pts.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r]); }
    return pts;
  }
  function archPts(cx, cy, r, a0, a1) {
    const pts = []; const n = 14;
    for (let i = 0; i <= n; i++) { const a = a0 + (a1 - a0) * (i / n); pts.push([cx + Math.cos(Math.PI - a) * r, cy - Math.sin(a) * r]); }
    return pts;
  }
  function wavePts(x0, x1, y, amp, phase, freq) {
    const pts = [];
    for (let x = x0; x <= x1; x += 6) pts.push([x, y + Math.sin(x / freq + phase) * amp]);
    return pts;
  }
  function starPts(cx, cy) {
    const pts = [];
    for (let i = 0; i < 10; i++) { const a = -Math.PI / 2 + (i * Math.PI) / 5; const r = i % 2 === 0 ? 46 : 19; pts.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r]); }
    pts.push(pts[0]);
    return pts;
  }

  const DOODLE_MOTIFS = {

  function doodleAbstractScribble(rand) {
    const cx = 75, cy = 68, pts = [];
    const n = 7 + Math.floor(rand() * 3);
    for (let i = 0; i <= n; i++) { const a = (i / n) * Math.PI * 2.4; const r = 16 + rand() * 28; pts.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r * 0.75]); }
    return [pts];
  }
  function doodleHandTremor(pts, rand, wobbleAmt, bowAmt) {
    const bowDirX = ditJitter(rand, 1), bowDirY = ditJitter(rand, 1);
    const n = pts.length;
    return pts.map((p, i) => {
      const t = n > 1 ? i / (n - 1) : 0;
      const bow = Math.sin(t * Math.PI) * bowAmt;
      return [p[0] + ditJitter(rand, wobbleAmt) + bowDirX * bow, p[1] + ditJitter(rand, wobbleAmt) + bowDirY * bow];
    });
  }
  function doodleSmoothPathD(pts) {
    if (pts.length < 3) return 'M ' + pts.map(p => p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' L ');
    let d = 'M ' + pts[0][0].toFixed(1) + ' ' + pts[0][1].toFixed(1);
    for (let i = 0; i < pts.length - 1; i++) {
      const p0 = pts[i - 1] || pts[i], p1 = pts[i], p2 = pts[i + 1], p3 = pts[i + 2] || p2;
      const c1 = [p1[0] + (p2[0] - p0[0]) / 6, p1[1] + (p2[1] - p0[1]) / 6];
      const c2 = [p2[0] - (p3[0] - p1[0]) / 6, p2[1] - (p3[1] - p1[1]) / 6];
      d += ' C ' + c1[0].toFixed(1) + ' ' + c1[1].toFixed(1) + ', ' + c2[0].toFixed(1) + ' ' + c2[1].toFixed(1) + ', ' + p2[0].toFixed(1) + ' ' + p2[1].toFixed(1);
    }
    return d;
  }
  const DOODLE_PASSES = [
    { wobble: 4.2, bow: 9, width: 4.2, opacity: 0.22 },
    { wobble: 3.6, bow: 7.5, width: 2.7, opacity: 0.48 },
    { wobble: 3.0, bow: 6, width: 1.8, opacity: 0.93 },
  ];
  // 노드 id 하나 또는 여러 개(조합 카드용)로 뼈대(있으면)와 랜덤 시드를 정해, 3겹 손떨림 경로(d) 목록을 만든다 — SVG/캔버스 공용.
  // 여러 개면 각자의 모티프를 살짝 어긋나게 겹쳐 그려서 조합 스토리에도 항상 그림이 생기게 한다.
  function doodlePathsFor(nodeIds, seedOffset) {
    const idsArr = Array.isArray(nodeIds) ? nodeIds : [nodeIds];
    const rand = mulberry32(hashStr(idsArr.join('|')) + (seedOffset || 0));
    let allStrokes = [];
    idsArr.forEach((id, i) => {
      const motifKey = NODE_MOTIF[id];
      const fn = motifKey && DOODLE_MOTIFS[motifKey];
      const strokes = fn ? fn() : doodleAbstractScribble(rand);
      const off = i === 0 ? [0, 0] : [(i % 2 === 0 ? 1 : -1) * 16, i * 9];
      allStrokes = allStrokes.concat(strokes.map(s => s.map(p => [p[0] + off[0], p[1] + off[1]])));
    });
    return DOODLE_PASSES.map(pass => ({
      d: allStrokes.map(s => doodleSmoothPathD(doodleHandTremor(s, rand, pass.wobble, pass.bow))).join(' '),
      width: pass.width, opacity: pass.opacity,
    }));
  }
  function doodleSvg(nodeIds, seedOffset) {
    const paths = doodlePathsFor(nodeIds, seedOffset);
    const body = paths.map(p => '<path d="' + p.d + '" fill="none" stroke="currentColor" stroke-width="' + p.width +
      '" stroke-linecap="round" stroke-linejoin="round" opacity="' + p.opacity + '"/>').join('');
    return '<svg viewBox="0 0 150 150" role="img" aria-hidden="true">' + body + '</svg>';
  }
  function drawDoodleOnCanvas(ctx, nodeIds, x, y, size, color, seedOffset) {
    const paths = doodlePathsFor(nodeIds, seedOffset || 0);
    const scale = size / 150;
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.strokeStyle = color;
    paths.forEach(p => {
      ctx.globalAlpha = p.opacity;
      ctx.lineWidth = p.width; // 150 기준 좌표계 그대로 두면 위의 scale transform이 실제 픽셀 굵기에 반영됨
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.stroke(new Path2D(p.d));
    });
    ctx.restore();
  }

  function findCombo(ids) {
    const set = [...ids].sort().join('|');
    return (D.combos || []).find(c => [...c.ids].sort().join('|') === set) || null;
  }

  // "다른 스토리로 만들어보기"로 만든 대체 글이 지금 선택된 단어(들)과 정확히 일치할 때만 유효.
  function activeStoryFor(ids) {
    const o = state.storyOverride;
    return (o && JSON.stringify(o.ids) === JSON.stringify(ids)) ? o : null;
  }
  function storyRemakeBtnHtml() {
    return '<button class="story-remake-btn" id="story-remake-btn" type="button">' + UI[LANG].storyRemakeBtn + '</button>';
  }
  function bindStoryRemake(el) {
    const btn = el.querySelector('#story-remake-btn');
    if (btn) btn.addEventListener('click', remakeStory);
  }

  // 단일 단어라도 항상 같은 글 대신, 사실은 유지하되 에세이답게 다시 쓴 버전을 만든다.
  // 클릭할 때마다 상상력 비중(light/medium/heavy)을 직전과 다르게 순환해서 매번 다른 느낌이 나오게 함.
  // 카드로 만들기는 이 결과(state.storyOverride)를 그대로 가져다 쓰고, 카드의 "스타일 다시 만들기"는
  // 이후 글을 더 건드리지 않는다 — 글은 여기서 한 번 정해지면 카드 패널을 새로 열기 전까지 고정.
  async function remakeStory() {
    const ids = state.selected.slice();
    if (!ids.length) return;
    const el = document.getElementById('synthesis');
    const btn = el.querySelector('#story-remake-btn');
    if (btn) { btn.disabled = true; btn.textContent = UI[LANG].storyRemaking; }

    const levels = ['light', 'medium', 'heavy'];
    state.remakeLevel = pickRandomDifferent(levels, state.remakeLevel);

    const results = await Promise.all(['ko', 'en', 'zh'].map(async l => {
      const nodesForLang = ids.map(id => nodesFor(l).find(x => x.id === id)).filter(Boolean);
      if (!nodesForLang.length) return null;
      try {
        const r = await fetch('/api/synthesize-combo', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode: 'story-remake', lang: l, level: state.remakeLevel, nodes: nodesForLang.map(n => ({ id: n.id, label: n.label, story: n.story })) }),
        });
        const d = await r.json();
        return d.synthesis || null;
      } catch (e) { return null; }
    }));
    if (JSON.stringify(state.selected) !== JSON.stringify(ids)) return; // 그 사이 선택이 바뀌었으면 버림
    if (!results.every(Boolean)) {
      const btn2 = document.getElementById('story-remake-btn');
      if (btn2) { btn2.disabled = false; btn2.textContent = UI[LANG].storyRemakeBtn; }
      return;
    }

    const sel = ids.map(nodeById).filter(Boolean);
    const baseAvg = sel.reduce((s, n) => s + factScoreOf(n), 0) / (sel.length || 1);
    const levelMul = { light: 0.85, medium: 0.6, heavy: 0.35 }[state.remakeLevel];
    const factPct = Math.max(15, Math.round(baseAvg * levelMul));
    const titleFor = l => ids.length === 1
      ? ((nodesFor(l).find(x => x.id === ids[0]) || {}).label || ids[0])
      : ids.map(id => (nodesFor(l).find(x => x.id === id) || {}).label || id).join(' · ');

    state.storyOverride = {
      ids: ids.slice(), factPct, level: state.remakeLevel,
      text: {
        ko: { title: titleFor('ko'), story: results[0], era: '' },
        en: { title: titleFor('en'), story: results[1], era: '' },
        zh: { title: titleFor('zh'), story: results[2], era: '' },
      },
    };
    renderSynthesis();
  }

  function renderSynthesis() {
    const el = document.getElementById('synthesis');
    document.getElementById('sky-hint').style.opacity = state.selected.length ? '0' : '1';
    document.getElementById('sky-deselect').style.display = state.selected.length ? 'inline-block' : 'none';
    closeCardMaker();

    if (!state.selected.length) {
      state.activeCombo = null;
      el.innerHTML = '<div class="synth-empty">' + UI[LANG].emptyState + '</div>';
      return;
    }
    if (state.selected.length === 1) {
      state.activeCombo = null;
      el.innerHTML = renderSingle(nodeById(state.selected[0])); bindChips(el); bindDoodle(el); bindStoryRemake(el);
      attachPhoto(el, state.selected.slice());
      return;
    }
    const combo = findCombo(state.selected);
    state.activeCombo = combo;
    if (combo) {
      el.innerHTML = renderComboStory(combo);
      bindChips(el); bindStoryRemake(el);
      attachPhoto(el, state.selected.slice());
    } else {
      renderComboSynthesis(el, state.selected.slice());
    }
  }

  async function renderComboSynthesis(el, ids) {
    const sel = ids.map(nodeById).filter(Boolean);
    const title = sel.map(n => n.label).join('<span class="x">×</span>');

    const override = activeStoryFor(ids);
    if (override) {
      el.innerHTML = '<div class="synth-title">' + title + '</div>' +
        factBarHtml(override.factPct) +
        '<div class="prose" style="margin-top:20px;">' + override.text[LANG].story + '</div>' +
        '<div class="related-row"><span class="lbl">' + UI[LANG].relatedComboWordsSynth + '</span>' +
        sel.map(n => '<span class="chip" data-id="' + n.id + '">' + n.label + '</span>').join('') + '</div>' +
        storyRemakeBtnHtml() + cardMakeBtnHtml();
      bindChips(el); bindStoryRemake(el);
      attachPhoto(el, ids);
      return;
    }

    el.innerHTML = '<div class="synth-title">' + title + '</div>' +
      '<div class="prose" style="margin-top:20px; color:var(--muted);">' + UI[LANG].comboLoading + '</div>';

    let paragraph = null;
    try {
      const r = await fetch('/api/synthesize-combo', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lang: LANG, nodes: sel.map(n => ({ id: n.id, label: n.label, type: n.type, story: n.story })) }),
      });
      const d = await r.json();
      paragraph = d.synthesis;
    } catch (e) { /* 조용히 폴백으로 */ }

    if (JSON.stringify(state.selected) !== JSON.stringify(ids)) return; // 그 사이 선택이 바뀌었으면 버림
    const usedAI = !!paragraph;
    if (!paragraph) paragraph = fallbackSynthesis(ids, sel);
    else state.activeSynthText = { ids: ids.slice(), lang: LANG, text: paragraph };
    const avgScore = sel.reduce((s, n) => s + factScoreOf(n), 0) / (sel.length || 1);
    // AI 합성은 각 단어의 사실 조각을 새로 엮어 쓴 글이라 원본보다 살짝 낮게, 폴백(문장 이어붙이기)은 원문 그대로라 원래 점수 유지.
    const shownScore = usedAI ? avgScore * 0.85 : avgScore;

    el.innerHTML = '<div class="synth-title">' + title + '</div>' +
      factBarHtml(shownScore) +
      '<div class="prose" style="margin-top:20px;">' + paragraph + '</div>' +
      '<div class="related-row"><span class="lbl">' + UI[LANG].relatedComboWordsSynth + '</span>' +
      sel.map(n => '<span class="chip" data-id="' + n.id + '">' + n.label + '</span>').join('') + '</div>' +
      storyRemakeBtnHtml() + cardMakeBtnHtml();
    bindChips(el); bindStoryRemake(el);
    attachPhoto(el, ids);
  }

  function fallbackSynthesis(ids, sel) {
    const best = state.thoughts
      .map(t => ({ t, s: t.tags.filter(tag => ids.includes(tag)).length }))
      .filter(o => o.s >= 2)
      .sort((a, b) => b.s - a.s || b.t.addedAt - a.t.addedAt)[0];
    if (best) return thoughtText(best.t);
    const frags = sel.map(n => (n.story.match(/^.*?[.!?…。！？]/) || [n.story])[0].trim());
    return frags.join(' ');
  }

  async function attachPhoto(el, ids) {
    try {
      const r = await fetch('/api/photos-random?tags=' + encodeURIComponent(ids.join(',')));
      const d = await r.json();
      if (!d.photo) return;
      if (JSON.stringify(state.selected) !== JSON.stringify(ids)) return; // selection changed while fetching
      const holder = el.querySelector('.story-single, .synth-title');
      if (!holder) return;
      const fig = document.createElement('div');
      fig.style.cssText = 'margin-top:26px;';
      fig.innerHTML = '<img src="' + d.photo.url + '" style="width:100%;border-radius:12px;display:block;" />' +
        (d.photo.caption ? '<div style="margin-top:10px;font-size:13px;color:var(--muted);">' + d.photo.caption + '</div>' : '');
      const anchor = el.querySelector('.related-row, .synth-thoughts, .synth-lede');
      if (anchor) anchor.insertAdjacentElement('beforebegin', fig); else el.appendChild(fig);
    } catch (e) { /* 사진 서비스 준비 전이면 조용히 무시 */ }
  }

  const STATUS_FACT_SCORE = { told: 92, seed: 40, ask: 0 };
  function factScoreOf(n) { return STATUS_FACT_SCORE[n.status] != null ? STATUS_FACT_SCORE[n.status] : 40; }
  function factBarHtml(score) {
    const u = UI[LANG];

      '<div class="fact-bar-label"><span>' + u.factBarLabel + '</span><span class="fact-bar-pct">' + pct + '%</span></div>' +
      '<div class="fact-bar-track"><div class="fact-bar-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="fact-bar-note">' + u.factBarNote + '</div>' +
      '</div>';
  }

  function renderComboStory(combo) {
    const sel = combo.ids.map(nodeById).filter(Boolean);
    const override = activeStoryFor(combo.ids);
    const avgScore = sel.reduce((s, n) => s + factScoreOf(n), 0) / (sel.length || 1);
    const shownScore = override ? override.factPct : avgScore;
    const storyText = override ? override.text[LANG].story : combo.story;
    let h = '<div class="story-single">';
    h += '<div><span class="badge t-place">' + UI[LANG].badgeComboStory + '</span></div>';
    h += '<div class="headword">' + combo.title + '</div>';
    h += factBarHtml(shownScore);
    h += '<div class="prose">' + storyText + '</div>';

  function thoughtCard(t) {

  function formatDate(ts) {
    const u = UI[LANG];
    const d = Math.floor((NOW - ts) / 86400000);
    if (d <= 0) return u.dateToday; if (d === 1) return u.dateYesterday;
    if (d < 7) return u.dateDaysAgo(d); if (d < 30) return u.dateWeeksAgo(Math.floor(d / 7));
    return u.dateMonthsAgo(Math.floor(d / 30));
  }

  function renderFeed() {
    // 서버에서 발행된 최신 생각을 먼저(최신순), 그 다음 로컬/기본 생각으로 채운다 — 최근 인터뷰 내용이 항상 앞에 오도록.
    const remote = [...remoteThoughts].sort((a, b) => b.addedAt - a.addedAt);
    const rest = [...saved.thoughts, ...buildBaseThoughts()].sort((a, b) => b.addedAt - a.addedAt);
    const feed = [...remote, ...rest].slice(0, 3);
    document.getElementById('feed-list').innerHTML = feed.map(thoughtCard).join('');

  async function fetchRemoteThoughts() {
    try {
      const r = await fetch('/api/thoughts');
      if (!r.ok) return;
      const d = await r.json();
      if (!Array.isArray(d.thoughts) || !d.thoughts.length) return;
      remoteThoughts = d.thoughts.map(t => ({
        id: t.id, text: t.text, tags: Array.isArray(t.tags) ? t.tags : [],
        tagLabels: (t.tagLabels && typeof t.tagLabels === 'object') ? t.tagLabels : {},
        source: t.source, addedAt: t.createdAt || Date.now(), remote: true,
      }));
      buildDynamicNodes();
      state.nodes = nodesFor(LANG);
      state.thoughts = composeThoughts();
      surfaceRecentTags();
      renderFeed();
    } catch (e) { /* 서버 준비 전이면 조용히 기본 콘텐츠만 보여줌 */ }
  }

  // 최근 발행된 생각들의 태그 중 성좌 노드로 존재하는 것들 — 최신순, 중복 없이.
  function recentTagIds(sourceLimit, maxTags) {
    const out = [];
    remoteThoughts.slice(0, sourceLimit).forEach(t => (t.tags || []).forEach(tag => {
      if (nodeById(tag) && !out.includes(tag)) out.push(tag);
    }));
    return out.slice(0, maxTags);
  }

  // 최근 발행된 생각에 달린 태그를, 아직 아무것도 안 골랐을 때 우선 노출시킨다.
  function surfaceRecentTags() {
    if (state.selected.length) return;
    const recentTags = recentTagIds(15, 6);
    if (!recentTags.length) return;
    state.visibleIds = pickVisibleSubset(VISIBLE_COUNT, recentTags);
    initParticles();
  }

    return String(s == null ? '' : s).replace(/[&<>"']/g, c => (

  async function gbPost(payload) {
    const r = await fetch('/api/comments', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),

  function findComboIn(ids, dataset) {
    const set = [...ids].sort().join('|');
    return ((dataset && dataset.combos) || []).find(c => [...c.ids].sort().join('|') === set) || null;
  }

  async function getTrilingualCardText(ids) {
    const langs = ['ko', 'en', 'zh'];
    // 스토리 페이지에서 "다른 스토리로 만들어보기"로 이미 확정된 글이 있으면 그걸 그대로 카드에 쓴다 —
    // 카드의 "스타일 다시 만들기"는 이제 글을 건드리지 않고 이 결과를 계속 재사용.
    const override = activeStoryFor(ids);
    if (override) return override.text;
    if (ids.length === 1) {
      const id = ids[0];
      const out = {};
      langs.forEach(l => {
        const n = nodesFor(l).find(x => x.id === id);
        out[l] = { title: n ? n.label : id, story: n ? n.story : '', era: n ? (n.era || '') : '' };
      });
      return out;
    }
    const curated = findComboIn(ids, DATASETS.ko);
    if (curated) {
      const out = {};
      langs.forEach(l => {
        const c = findComboIn(ids, DATASETS[l]) || curated;
        out[l] = { title: c.title, story: c.story, era: '' };
      });
      return out;
    }
    const cached = state.activeSynthText;
    const results = await Promise.all(langs.map(async l => {
      const nodes = ids.map(id => nodesFor(l).find(x => x.id === id)).filter(Boolean);
      const title = nodes.map(n => n.label).join(' · ');
      if (l === LANG && cached && cached.lang === LANG && JSON.stringify(cached.ids) === JSON.stringify(ids)) {
        return { title, story: cached.text, era: '' };
      }
      try {
        const r = await fetch('/api/synthesize-combo', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lang: l, nodes: nodes.map(n => ({ id: n.id, label: n.label, type: n.type, story: n.story })) }),
        });
        const d = await r.json();
        return { title, story: d.synthesis || nodes.map(n => n.story).join(' '), era: '' };
      } catch (e) {
        return { title, story: nodes.map(n => n.story).join(' '), era: '' };
      }
    }));
    return { ko: results[0], en: results[1], zh: results[2] };
  }

  function wrapText(ctx, text, maxWidth) {
    const lines = [];
    text.split('\n').forEach(para => {
      let line = '';
      for (const ch of para) {
        const test = line + ch;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = ch;
        } else {
          line = test;
        }
      }
      lines.push(line);
    });
    return lines;
  }

  function loadImage(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  const CARD_PALETTES = [
    { id: 'archive-indigo', name: '아카이브 인디고', mode: 'dark', bg: '#0B0F1F', bg2: '#050818', text: '#E8E5DD', muted: '#B0ACA1', faint: '#7C786D', accent: '#D4A24E', headFont: '"Archivo Black", sans-serif', bodyFont: '"Space Mono", monospace' },

    { id: 'citrus-warmth', name: '시트러스 웜스', mode: 'light', bg: '#F6EFDD', bg2: '#EEDFB8', text: '#33291A', muted: '#6B5C3E', faint: '#978763', accent: '#D9A429', headFont: '-apple-system, sans-serif', bodyFont: '-apple-system, sans-serif' },
    { id: 'pastel-dream', name: '소프트 파스텔 드림', mode: 'light', bg: '#EDEBF5', bg2: '#DFDBEE', text: '#332F42', muted: '#615C77', faint: '#8B85A3', accent: '#7FBFA3', headFont: '-apple-system, sans-serif', bodyFont: '-apple-system, sans-serif' },
    { id: 'vintage-sepia', name: '빈티지 필름 세피아', mode: 'light', bg: '#E8DCC4', bg2: '#DCC9A3', text: '#4A3B26', muted: '#7A6748', faint: '#A59270', accent: '#8C5A3C', headFont: 'Georgia, serif', bodyFont: 'Georgia, serif' },
  ];
  const CARD_LAYOUTS = ['watermark', 'break-top', 'break-mid', 'poster'];
  const DEFAULT_CARD_PALETTE = 'archive-indigo';
  const DEFAULT_CARD_LAYOUT = 'watermark';

  function hexToRgba(hex, alpha) {
    const h = hex.replace('#', '');
    const r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }
  function pickRandomDifferent(list, current) {
    const pool = list.filter(x => x !== current);
    return pool[Math.floor(Math.random() * pool.length)] || list[0];
  }

  async function drawCard(lang, content) {
    const u = UI[lang] || UI.ko;
    const W = 1080, H = 1920, marginX = 96;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    const palette = CARD_PALETTES.find(p => p.id === content.paletteId) || CARD_PALETTES.find(p => p.id === DEFAULT_CARD_PALETTE);
    const layout = CARD_LAYOUTS.includes(content.layout) ? content.layout : DEFAULT_CARD_LAYOUT;
    const isPoster = layout === 'poster';

    const bg = ctx.createLinearGradient(0, 0, W, H);
    bg.addColorStop(0, palette.bg); bg.addColorStop(0.55, palette.bg); bg.addColorStop(1, palette.bg2);
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    const noiseIsLight = palette.mode === 'light';
    for (let i = 0; i < 2400; i++) {
      const x = Math.random() * W, y = Math.random() * H, a = Math.random() * 0.05;
      ctx.fillStyle = (Math.random() > 0.5) === noiseIsLight ? 'rgba(255,255,255,' + a + ')' : 'rgba(0,0,0,' + (a * 1.3) + ')';
      ctx.fillRect(x, y, 1.6, 1.6);
    }
    const vg = ctx.createRadialGradient(W * 0.5, H * 0.4, W * 0.25, W * 0.5, H * 0.5, W * 0.95);
    vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, palette.mode === 'light' ? 'rgba(0,0,0,0.08)' : 'rgba(0,0,0,0.4)');
    ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);

    const doodleIds = content.doodleIds && content.doodleIds.length ? content.doodleIds : null;
    // 배경 워터마크/포스터 배치는 텍스트보다 먼저(뒤에) 그린다.
    if (doodleIds && layout === 'watermark') {
      drawDoodleOnCanvas(ctx, doodleIds, W * 0.06, H * 0.24, W * 0.88, palette.text, content.doodleSeed);
      ctx.globalAlpha = 1;
    }
    if (doodleIds && isPoster) {
      const size = W * 1.15;
      drawDoodleOnCanvas(ctx, doodleIds, (W - size) / 2, H * 0.18, size, palette.accent, content.doodleSeed);
      ctx.globalAlpha = 1;
    }
    // watermark/poster는 opacity를 그림 자체 stroke opacity로 이미 낮게 그리지만, 배경으로 더 죽이고 싶으면 여기서 한 번 더 덮는다.
    if (doodleIds && (layout === 'watermark' || isPoster)) {
      ctx.fillStyle = hexToRgba(palette.bg, isPoster ? 0.35 : 0.55);
      ctx.fillRect(0, 0, W, H);
    }

    ctx.textBaseline = 'alphabetic';
    let y = 150;

    ctx.fillStyle = palette.accent;
    ctx.font = '600 26px ' + palette.bodyFont;
    ctx.fillText('FRAGMENTS OF THOUGHT', marginX, y);
    if (content.era) {
      ctx.fillStyle = hexToRgba(palette.text, 0.55);
      ctx.font = '400 24px ' + palette.bodyFont;
      const eraW = ctx.measureText(content.era).width;
      ctx.fillText(content.era, W - marginX - eraW, y);
    }

    y += 70;
    ctx.strokeStyle = hexToRgba(palette.text, 0.15); ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(marginX, y); ctx.lineTo(W - marginX, y); ctx.stroke();
    y += 50;

    // 본문 위 삽화(break-top) — 제목보다 먼저, 읽는 흐름 속 그림처럼.
    // drawDoodleOnCanvas는 정사각형(150x150 기준)으로 그리므로, 띠 높이를 기준 크기로 삼아 가운데 정렬한다.
    if (doodleIds && layout === 'break-top') {
      const bandH = 260;
      const dx = marginX + (W - marginX * 2 - bandH) / 2;
      drawDoodleOnCanvas(ctx, doodleIds, dx, y, bandH, palette.accent, content.doodleSeed);
      y += bandH + 20;
    }

    ctx.fillStyle = palette.text;
    ctx.font = (isPoster ? '900 96px ' : '700 62px ') + palette.headFont;
    const titleMaxLines = isPoster ? 4 : 3;
    wrapText(ctx, content.title, W - marginX * 2).slice(0, titleMaxLines).forEach(l => { ctx.fillText(l, marginX, y); y += (isPoster ? 100 : 72); });

    // 본문 중간 삽화(break-mid) — 제목과 본문 사이 여백에.
    if (doodleIds && layout === 'break-mid') {
      y += 20;
      const bandH = 210;
      const dx = marginX + (W - marginX * 2 - bandH) / 2;
      drawDoodleOnCanvas(ctx, doodleIds, dx, y, bandH, palette.accent, content.doodleSeed);
      y += bandH + 20;
    } else {
      y += 36;
    }

    let fontSize = isPoster ? 32 : 40, storyLines;
    const maxStoryHeight = H - y - 460;
    do {
      ctx.font = '400 ' + fontSize + 'px ' + palette.bodyFont;
      storyLines = wrapText(ctx, content.story, W - marginX * 2);
      if (storyLines.length * (fontSize * 1.65) <= maxStoryHeight || fontSize <= 22) break;
      fontSize -= 2;
    } while (true);
    const lineHeight = fontSize * 1.65;
    ctx.fillStyle = hexToRgba(palette.text, 0.85);
    storyLines.forEach(l => { ctx.fillText(l, marginX, y); y += lineHeight; });

    // ---- 푸터: 배치가 바뀌어도 항상 고정 — 사실기반 %, AI 해석 표시, 서명, QR+주소 ----
    const footerY = H - 400;
    ctx.strokeStyle = hexToRgba(palette.text, 0.15);
    ctx.beginPath(); ctx.moveTo(marginX, footerY); ctx.lineTo(W - marginX, footerY); ctx.stroke();

    const factPct = Math.max(0, Math.min(100, Math.round(content.factPct != null ? content.factPct : 100)));
    ctx.font = '400 20px ' + palette.bodyFont;
    ctx.fillStyle = hexToRgba(palette.text, 0.55);
    ctx.fillText(u.factBarLabel, marginX, footerY + 40);
    ctx.fillStyle = palette.accent;
    const pctText = factPct + '%';
    const pctW = ctx.measureText(pctText).width;
    ctx.fillText(pctText, W - marginX - pctW, footerY + 40);
    const barY = footerY + 54, barW = W - marginX * 2;
    ctx.fillStyle = hexToRgba(palette.text, 0.12);
    ctx.fillRect(marginX, barY, barW, 6);
    ctx.fillStyle = palette.accent;
    ctx.fillRect(marginX, barY, barW * (factPct / 100), 6);

    ctx.fillStyle = hexToRgba(palette.text, 0.6);
    ctx.font = '400 19px ' + palette.bodyFont;
    wrapText(ctx, u.cardAiNote, barW).slice(0, 2).forEach((l, i) => ctx.fillText(l, marginX, barY + 44 + i * 26));

    ctx.fillStyle = hexToRgba(palette.text, 0.5);
    ctx.font = '400 18px ' + palette.bodyFont;
    ctx.fillText(u.cardAsOf + ' ' + content.asOfDate, marginX, barY + 108);
    ctx.fillText(u.cardMadeOn + ' ' + content.madeDate, marginX, barY + 134);

    ctx.fillStyle = palette.accent;
    ctx.font = '700 50px "Caveat", cursive';
    ctx.fillText('Paul Bhang', marginX, barY + 200);

    ctx.fillStyle = hexToRgba(palette.text, 0.7);
    ctx.font = '400 22px ' + palette.bodyFont;
    ctx.fillText('wensonjabi.com', marginX, barY + 234);

    if (content.qrImg) {
      const qrSize = 128;
      const qx = W - marginX - qrSize, qy = barY + 92;
      if (palette.mode === 'dark') {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(qx - 8, qy - 8, qrSize + 16, qrSize + 16);
      }
      ctx.drawImage(content.qrImg, qx, qy, qrSize, qrSize);
      ctx.fillStyle = hexToRgba(palette.text, 0.55);
      ctx.font = '400 16px ' + palette.bodyFont;
      const capW = ctx.measureText(u.cardQrCaption).width;
      ctx.fillText(u.cardQrCaption, qx + qrSize / 2 - capW / 2, qy + qrSize + 26);
    }

    return canvas;
  }

  function downloadCanvas(canvas, lang, slug) {
    try {
      const url = canvas.toDataURL('image/png');
      const a = document.createElement('a');
      a.href = url; a.download = 'fragments-of-thought-' + (slug ? slug + '-' : '') + lang + '.png';
      document.body.appendChild(a); a.click(); a.remove();
    } catch (e) { alert(UI[LANG].cardGenError); }
  }

  function canvasToBlob(canvas) {
    return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
  }

  async function shareCanvas(canvas, lang, btn, slug) {
    try {
      const blob = await canvasToBlob(canvas);
      if (!blob) throw new Error('no-blob');
      const file = new File([blob], 'fragments-of-thought-' + (slug ? slug + '-' : '') + lang + '.png', { type: 'image/png' });
      if (navigator.canShare && !navigator.canShare({ files: [file] })) {
        downloadCanvas(canvas, lang, slug);
        return;
      }
      await navigator.share({ files: [file], title: 'Fragments of Thought', url: SHARE_URL });
      const prev = btn.textContent;
      btn.textContent = UI[LANG].cardShared;
      setTimeout(() => { btn.textContent = prev; }, 1600);
    } catch (e) {
      if (e && e.name !== 'AbortError') downloadCanvas(canvas, lang, slug);
    }
  }

  function computeFactPct(ids) {
    const override = activeStoryFor(ids);
    if (override) return override.factPct;
    const sel = ids.map(nodeById).filter(Boolean);
    if (!sel.length) return 100;
    const avgScore = sel.reduce((s, n) => s + factScoreOf(n), 0) / sel.length;
    // 큐레이션 안 된 조합(AI 합성)은 살짝 낮게 — renderComboSynthesis의 기존 0.85 배 규칙과 동일.
    if (ids.length > 1 && !findComboIn(ids, DATASETS.ko)) return Math.round(avgScore * 0.85);
    return Math.round(avgScore);
  }

  async function buildCardCanvases(ids, content, style, factPct) {
    const today = new Date();
    const dateStr = today.getFullYear() + '.' + String(today.getMonth() + 1).padStart(2, '0') + '.' + String(today.getDate()).padStart(2, '0');
    const asOfDate = (D.profile && D.profile.contentAsOf) || dateStr;
    try {
      await Promise.all([
        document.fonts.load('700 62px "Archivo Black"'),
        document.fonts.load('400 40px "Space Mono"'),
        document.fonts.load('700 56px "Caveat"'),
      ]);
    } catch (e) {}
    let qrImg = null;
    // QR은 이제 세 언어 카드 모두에 표시 — "더 알고 싶으면 사이트로" 도선을 항상 열어둔다.
    try { qrImg = await loadImage('https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(SHARE_URL)); } catch (e) {}
    const canvases = {};
    for (const l of ['ko', 'en', 'zh']) {
      canvases[l] = await drawCard(l, Object.assign({}, content[l], {
        asOfDate, madeDate: dateStr, qrImg, doodleIds: ids, factPct,
        paletteId: style.paletteId, layout: style.layout, doodleSeed: style.doodleSeed,
      }));
    }
    return canvases;
  }

  // 글(content/factPct)은 카드 패널이 열려있는 동안 고정 — "스타일 다시 만들기"는 새 스타일의 카드 세트를
  // cardSets 배열에 계속 쌓기만 하고, 기존에 만든 세트는 지우지 않는다(패널을 닫기 전까지 전부 남아있음).
  async function addCardSet(style) {
    if (!currentCardState) return;
    const myToken = cmToken;
    const canvases = await buildCardCanvases(currentCardState.ids, currentCardState.content, style, currentCardState.factPct);
    if (myToken !== cmToken || !currentCardState) return; // 그 사이 패널이 닫혔거나 새로 열렸으면 버림
    currentCardState.cardSets.push({ setId: 'set-' + Date.now() + '-' + Math.floor(Math.random() * 1000), style, canvases });
    renderCardGallery();
  }

  function renderCardGallery() {
    if (!currentCardState) return;
    const panel = document.getElementById('card-maker');
    const { cardSets, fileSlugBase } = currentCardState;
    panel.innerHTML =
      '<div class="cm-head"><span class="cm-title">' + UI[LANG].cardMakerTitle + '</span>' +
      '<div class="cm-head-btns">' +
      '<button class="cm-restyle" type="button" id="cm-restyle-btn">' + UI[LANG].cardRestyleBtn + '</button>' +
      '<button class="cm-dl-selected" type="button" id="cm-dl-selected-btn">' + UI[LANG].cardDownloadSelected + '</button>' +
      '<button class="cm-close" type="button" id="cm-close-btn">✕ ' + UI[LANG].cardClose + '</button>' +
      '</div></div>' +
      '<div class="cm-sets" id="cm-sets"></div>';
    const setsWrap = document.getElementById('cm-sets');
    cardSets.forEach((set, si) => {
      const setEl = document.createElement('div');
      setEl.className = 'cm-set';
      const paletteName = (CARD_PALETTES.find(p => p.id === set.style.paletteId) || {}).name || set.style.paletteId;
      const label = document.createElement('div');
      label.className = 'cm-set-label';
      label.textContent = UI[LANG].cardStyleLabel(si + 1) + ' · ' + paletteName;
      setEl.appendChild(label);
      const row = document.createElement('div');
      row.className = 'cm-row';
      ['ko', 'en', 'zh'].forEach(l => {
        const wrap = document.createElement('div');
        wrap.className = 'cm-card';
        wrap.appendChild(set.canvases[l]);
        const langLabel = document.createElement('div');
        langLabel.className = 'cm-lang';
        langLabel.textContent = UI[LANG].cardLangLabel[l];
        wrap.appendChild(langLabel);
        const checkLabel = document.createElement('label');
        checkLabel.className = 'cm-check';
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.dataset.setId = set.setId;
        checkbox.dataset.lang = l;
        checkLabel.appendChild(checkbox);
        checkLabel.appendChild(document.createTextNode(UI[LANG].cardSelectForDownload));
        wrap.appendChild(checkLabel);
        const btns = document.createElement('div');
        btns.className = 'cm-btns';
        const dlBtn = document.createElement('button');
        dlBtn.type = 'button'; dlBtn.textContent = UI[LANG].cardDownload;
        dlBtn.addEventListener('click', () => downloadCanvas(set.canvases[l], l, fileSlugBase + '-' + set.style.paletteId));
        btns.appendChild(dlBtn);
        if (navigator.share) {
          const shBtn = document.createElement('button');
          shBtn.type = 'button'; shBtn.textContent = UI[LANG].cardShare;
          shBtn.addEventListener('click', () => shareCanvas(set.canvases[l], l, shBtn, fileSlugBase + '-' + set.style.paletteId));
          btns.appendChild(shBtn);
        }
        wrap.appendChild(btns);
        row.appendChild(wrap);
      });
      setEl.appendChild(row);
      setsWrap.appendChild(setEl);
    });
    document.getElementById('cm-close-btn').addEventListener('click', closeCardMaker);
    document.getElementById('cm-restyle-btn').addEventListener('click', restyleCurrentCard);
    document.getElementById('cm-dl-selected-btn').addEventListener('click', downloadSelectedCards);
    const last = setsWrap.lastElementChild;
    if (last) last.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function downloadSelectedCards() {
    if (!currentCardState) return;
    const checks = document.querySelectorAll('#cm-sets input[type=checkbox]:checked');
    if (!checks.length) return;
    Array.from(checks).forEach((cb, i) => {
      const set = currentCardState.cardSets.find(s => s.setId === cb.dataset.setId);
      if (!set) return;
      const l = cb.dataset.lang;
      // 여러 개를 한꺼번에 트리거하면 브라우저가 일부를 막을 수 있어 살짝 간격을 둔다.
      setTimeout(() => downloadCanvas(set.canvases[l], l, currentCardState.fileSlugBase + '-' + set.style.paletteId), i * 260);
    });
  }

  // "스타일 다시 만들기" — 글은 절대 건드리지 않고(카드 패널을 여는 시점에 이미 고정됨),
  // 팔레트/배치/그림 시드만 미리 정해둔 조합 안에서 새로 골라 카드 세트를 하나 더 쌓는다.
  async function restyleCurrentCard() {
    if (!currentCardState) return;
    const restyleBtn = document.getElementById('cm-restyle-btn');
    if (restyleBtn) { restyleBtn.disabled = true; restyleBtn.textContent = UI[LANG].cardRestyling; }

    const usedPalettes = currentCardState.cardSets.map(s => s.style.paletteId);
    const lastSet = currentCardState.cardSets[currentCardState.cardSets.length - 1];
    const lastStyle = lastSet ? lastSet.style : { paletteId: DEFAULT_CARD_PALETTE, layout: DEFAULT_CARD_LAYOUT, doodleSeed: 0 };
    const unusedPalettes = CARD_PALETTES.map(p => p.id).filter(id => !usedPalettes.includes(id));
    const paletteId = unusedPalettes.length
      ? unusedPalettes[Math.floor(Math.random() * unusedPalettes.length)]
      : pickRandomDifferent(CARD_PALETTES.map(p => p.id), lastStyle.paletteId);
    const layout = pickRandomDifferent(CARD_LAYOUTS, lastStyle.layout);
    const doodleSeed = (lastStyle.doodleSeed || 0) + 97 + Math.floor(Math.random() * 900);

    try {
      await addCardSet({ paletteId, layout, doodleSeed });
    } finally {
      const btn2 = document.getElementById('cm-restyle-btn');
      if (btn2) { btn2.disabled = false; btn2.textContent = UI[LANG].cardRestyleBtn; }
    }
  }

  async function openCardMaker(ids) {
    if (!ids.length) return;
    const panel = document.getElementById('card-maker');
    const myToken = ++cmToken;
    panel.style.display = 'block';
    panel.innerHTML = '<div class="cm-status">' + UI[LANG].cardGenerating + '</div>';
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    try {
      const content = await getTrilingualCardText(ids);
      if (myToken !== cmToken) return;

      const today = new Date();
      // 카드마다 다른 파일명으로 저장되도록 — 고른 단어(들) + 날짜를 파일명에 반영.
      const fileSlugBase = ids.join('-').replace(/[^a-zA-Z0-9-]/g, '').slice(0, 60) + '-' +
        today.getFullYear() + String(today.getMonth() + 1).padStart(2, '0') + String(today.getDate()).padStart(2, '0');
      const factPct = computeFactPct(ids);
      // 글은 이제부터 이 패널이 열려있는 동안 고정. 처음 세트는 항상 기존 브랜드 톤(archive-indigo+watermark, 시드 0).
      currentCardState = { ids, content, factPct, fileSlugBase, cardSets: [] };
      await addCardSet({ paletteId: DEFAULT_CARD_PALETTE, layout: DEFAULT_CARD_LAYOUT, doodleSeed: 0 });
    } catch (e) {
      if (myToken !== cmToken) return;
      panel.innerHTML = '<div class="cm-status">' + UI[LANG].cardGenError + '</div>';
    }
  }

  document.getElementById('synthesis').addEventListener('click', e => {
    if (e.target.closest('#card-make-btn')) openCardMaker(state.selected.slice());
  });

  window.__pb = { state, toggleSelect, nodeById, setLanguage };

  // 설치된 폰 앱(standalone)으로 열었을 때만 "앱으로 돌아가기" 링크 노출 — 일반 방문자에게는 안 보임
  if (window.matchMedia('(display-mode: standalone)').matches) {
    document.getElementById('p-app-back').style.display = 'inline-block';
  }

  window.addEventListener('resize', resize);
  renderStaticText();
  resize(); initParticles(); renderSynthesis(); renderFeed(); stepLoop();
  fetchRemoteThoughts();
  loadGuestbook();
})();
</script>
