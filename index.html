<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paul Bhang — 생각의 성좌</title>
<style>
  :root {
    --bg: #050419;
    --bg-soft: #0b0a26;
    --ink: #edebe6;
    --muted: #8a879c;
    --faint: #4a4860;
    --accent: #d4a24e;
    --accent-dim: rgba(212, 162, 78, 0.5);
    --place: #e8c37a;
    --line: rgba(237, 235, 230, 0.09);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
    line-height: 1.7;
    overflow-x: hidden;
  }
  ::selection { background: var(--accent); color: var(--bg); }

  /* ---------- HERO ---------- */
  .hero { min-height: 100vh; display: flex; flex-direction: column; position: relative; }
  .hero-top {
    display: flex; justify-content: space-between; align-items: center;
    padding: 28px 5vw; font-size: 13px; letter-spacing: 0.12em; color: var(--muted);
  }
  .hero-top .brand { color: var(--ink); font-weight: 600; letter-spacing: 0.18em; }
  .hero-head { padding: 4vh 5vw 0; max-width: 1100px; }
  .hero-head .eyebrow {
    font-size: 13px; letter-spacing: 0.25em; color: var(--accent);
    text-transform: uppercase; margin-bottom: 18px;
  }
  .hero-head h1 {
    font-size: clamp(34px, 6.2vw, 76px); font-weight: 700; line-height: 1.15; letter-spacing: -0.02em;
  }
  .hero-head h1 .dim { color: var(--faint); }
  .hero-head .sub {
    margin-top: 22px; font-size: clamp(14px, 1.6vw, 17px); color: var(--muted); max-width: 600px;
  }
  .hero-head .sub b { color: var(--ink); font-weight: 600; }
  .identity-line {
    margin-top: 16px; font-size: 12px; letter-spacing: 0.22em; color: var(--faint); text-transform: uppercase;
  }

  /* ---------- LEGEND ---------- */
  .legend {
    display: flex; flex-wrap: wrap; gap: 16px; padding: 20px 5vw 0; font-size: 12px; color: var(--muted);
  }
  .legend .item { display: flex; align-items: center; gap: 7px; letter-spacing: 0.04em; }
  .legend .swatch { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .sw-core { background: var(--accent); }
  .sw-place { background: var(--place); box-shadow: 0 0 0 3px rgba(232,195,122,0.22); }
  .sw-assoc { background: rgba(237,235,230,0.5); }
  .sw-wild { background: rgba(237,235,230,0.28); }

  /* ---------- CONSTELLATION ---------- */
  .constellation-wrap { position: relative; margin-top: 2vh; flex: 1; }
  #sky { display: block; width: 100%; height: 54vh; min-height: 400px; cursor: default; }
  .sky-hint {
    position: absolute; top: 14px; left: 5vw; font-size: 12.5px; color: var(--muted);
    letter-spacing: 0.08em; pointer-events: none; transition: opacity 0.6s;
  }
  .sky-hint .k { color: var(--accent); }
  .sky-reset {
    position: absolute; top: 10px; right: 5vw; background: none; border: 1px solid var(--line);
    color: var(--muted); font-size: 12px; padding: 6px 14px; border-radius: 20px; cursor: pointer;
    letter-spacing: 0.08em; transition: all 0.25s;
  }
  .sky-reset:hover { border-color: var(--accent); color: var(--accent); }

  /* ---------- SYNTHESIS ---------- */
  .synthesis { padding: 0 5vw 8vh; max-width: 1100px; }
  .synth-empty { color: var(--faint); font-size: 14px; border-top: 1px solid var(--line); padding-top: 28px; }

  .story-single { border-top: 1px solid var(--line); padding-top: 30px; }
  .story-single .badge {
    display: inline-block; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    padding: 4px 12px; border-radius: 14px; margin-bottom: 16px;
  }
  .badge.t-core { background: rgba(212,162,78,0.15); color: var(--accent); }
  .badge.t-place { background: rgba(232,195,122,0.16); color: var(--place); }
  .badge.t-associative { background: rgba(237,235,230,0.08); color: var(--muted); }
  .badge.t-wildcard { background: rgba(237,235,230,0.06); color: var(--muted); }
  .story-single .era { font-size: 13px; color: var(--faint); letter-spacing: 0.06em; margin-left: 12px; }
  .story-single .headword {
    font-size: clamp(30px, 5vw, 52px); font-weight: 700; line-height: 1.15; letter-spacing: -0.01em;
  }
  .story-single .prose {
    margin-top: 20px; font-size: clamp(16px, 2vw, 20px); line-height: 1.85; color: var(--ink); max-width: 720px;
  }
  .ask-ribbon {
    margin-top: 22px; display: inline-flex; align-items: center; gap: 10px;
    background: rgba(212,162,78,0.1); border: 1px solid var(--accent-dim); border-radius: 8px;
    padding: 12px 18px; font-size: 13.5px; color: var(--accent); max-width: 640px; line-height: 1.6;
  }
  .related-row { margin-top: 30px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .related-row .lbl { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--faint); margin-right: 6px; }
  .chip {
    font-size: 13px; color: var(--muted); border: 1px solid var(--line); padding: 5px 13px;
    border-radius: 16px; cursor: pointer; transition: all 0.25s; letter-spacing: 0.03em;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  .synth-title {
    font-size: clamp(22px, 3.2vw, 34px); font-weight: 700; line-height: 1.3;
    border-top: 1px solid var(--line); padding-top: 30px;
  }
  .synth-title .x { color: var(--accent); font-weight: 400; padding: 0 6px; }
  .synth-lede { margin-top: 12px; color: var(--muted); font-size: 14.5px; max-width: 680px; }
  .synth-grid {
    margin-top: 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px;
  }
  .story-card {
    border: 1px solid var(--line); border-radius: 10px; padding: 20px 22px; background: var(--bg-soft);
    transition: border-color 0.25s;
  }
  .story-card:hover { border-color: var(--accent-dim); }
  .story-card .cap { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 8px; }
  .story-card.t-core .cap { color: var(--accent); }
  .story-card.t-place .cap { color: var(--place); }
  .story-card.t-associative .cap, .story-card.t-wildcard .cap { color: var(--muted); }
  .story-card .hw { font-size: 17px; font-weight: 600; }
  .story-card .tx { font-size: 13.5px; color: var(--muted); margin-top: 10px; line-height: 1.7; }

  .synth-thoughts { margin-top: 34px; }
  .synth-thoughts h4 {
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--faint); margin-bottom: 16px;
  }
  .thought-card { border-left: 2px solid var(--accent); padding: 4px 0 4px 20px; margin-bottom: 20px; }
  .thought-card .txt { font-size: 15px; line-height: 1.75; color: var(--ink); max-width: 720px; }
  .thought-card .meta { font-size: 12px; color: var(--faint); margin-top: 8px; letter-spacing: 0.05em; }

  /* ---------- FEED + ADD ---------- */
  .feed { padding: 10vh 5vw 12vh; max-width: 1100px; margin: 0 auto; border-top: 1px solid var(--line); }
  .feed .eyebrow {
    font-size: 13px; letter-spacing: 0.25em; color: var(--accent); text-transform: uppercase; margin-bottom: 16px;
  }
  .feed h2 { font-size: clamp(26px, 4vw, 44px); font-weight: 700; }
  .feed .lede { margin-top: 14px; color: var(--muted); max-width: 620px; font-size: 15px; }
  .feed-list { margin-top: 6vh; }

  .add-box {
    margin-top: 7vh; border: 1px solid var(--line); border-radius: 12px; padding: 30px;
    background: var(--bg-soft); max-width: 720px;
  }
  .add-box h4 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .add-box .hint { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
  .add-box label {
    display: block; font-size: 12px; letter-spacing: 0.1em; color: var(--muted);
    margin: 16px 0 6px; text-transform: uppercase;
  }
  .add-box textarea, .add-box input {
    width: 100%; background: var(--bg); border: 1px solid var(--line); border-radius: 8px;
    color: var(--ink); font-family: inherit; font-size: 14px; padding: 12px 14px; transition: border-color 0.25s;
  }
  .add-box textarea { min-height: 90px; resize: vertical; }
  .add-box textarea:focus, .add-box input:focus { outline: none; border-color: var(--accent); }
  .add-box .btns { margin-top: 24px; display: flex; gap: 10px; }
  .btn-gold {
    background: var(--accent); color: var(--bg); border: none; font-weight: 700; font-size: 14px;
    padding: 12px 26px; border-radius: 8px; cursor: pointer; letter-spacing: 0.04em; transition: opacity 0.25s;
  }
  .btn-gold:hover { opacity: 0.85; }
  .btn-ghost {
    background: none; color: var(--muted); border: 1px solid var(--line); font-size: 14px;
    padding: 12px 22px; border-radius: 8px; cursor: pointer; transition: all 0.25s;
  }
  .btn-ghost:hover { color: var(--ink); border-color: var(--muted); }

  /* ---------- FOOTER ---------- */
  .footer {
    border-top: 1px solid var(--line); padding: 10vh 5vw; max-width: 1100px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center;
  }
  .footer h2 { font-size: clamp(24px, 3.5vw, 40px); font-weight: 700; line-height: 1.3; }
  .footer .contact { margin-top: 20px; font-size: 15px; color: var(--muted); }
  .footer .contact a { color: var(--accent); text-decoration: none; }
  .footer .contact a:hover { text-decoration: underline; }
  .placeholder {
    border: 1px dashed var(--faint); border-radius: 12px; min-height: 240px; display: flex;
    align-items: center; justify-content: center; color: var(--faint); font-size: 13px;
    letter-spacing: 0.1em; text-align: center; padding: 20px;
  }
  .credit { padding: 30px 5vw 40px; font-size: 12px; color: var(--faint); letter-spacing: 0.1em; text-align: center; }

  @media (max-width: 720px) {
    .footer { grid-template-columns: 1fr; }
    #sky { height: 60vh; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-top">
    <div class="brand" id="p-brand"></div>
    <div id="p-places"></div>
  </div>

  <div class="hero-head">
    <div class="eyebrow" id="p-tagline"></div>
    <h1 id="p-hero"></h1>
    <p class="sub" id="p-sub"></p>
    <div class="identity-line" id="p-faces"></div>
  </div>

  <div class="legend">
    <span class="item"><span class="swatch sw-core"></span>나</span>
    <span class="item"><span class="swatch sw-place"></span>나를 바꾼 장소</span>
    <span class="item"><span class="swatch sw-assoc"></span>관심어</span>
    <span class="item"><span class="swatch sw-wild"></span>엉뚱한 갈고리</span>
  </div>

  <div class="constellation-wrap">
    <div class="sky-hint" id="sky-hint">단어를 클릭하세요 <span class="k">(하나면 이야기, 두셋이면 그 조합)</span></div>
    <button class="sky-reset" id="sky-reset">초기화</button>
    <canvas id="sky"></canvas>
  </div>

  <div class="synthesis" id="synthesis"></div>
</section>

<section class="feed">
  <div class="eyebrow">Living Document</div>
  <h2>최근의 생각들</h2>
  <p class="lede" id="feed-lede"></p>
  <div class="feed-list" id="feed-list"></div>

  <div class="add-box">
    <h4>새로운 생각 추가</h4>
    <div class="hint">떠오른 생각을 적고, 관련 단어를 붙이면 성좌에서 그 단어를 골랐을 때 나타납니다. 브라우저에 저장됩니다.<br>더 깊은 이야기는 Claude와 대화하면 성좌 자체가 자랍니다.</div>
    <label>관련 단어 (쉼표 구분 — 예: 이방인, 파키스탄)</label>
    <input type="text" id="add-tags" placeholder="이방인, 파키스탄" />
    <label>생각</label>
    <textarea id="add-content" placeholder="지금 떠오른 생각을 자유롭게…"></textarea>
    <div class="btns">
      <button class="btn-gold" id="add-btn">추가하기</button>
      <button class="btn-ghost" id="clear-form-btn">지우기</button>
    </div>
  </div>
</section>

<section class="footer">
  <div>
    <h2>다음 챕터를<br>함께 쓸 사람을 찾습니다.</h2>
    <div class="contact" id="p-contact"></div>
  </div>
  <div class="placeholder">[PLACEHOLDER: 프로필 사진 또는<br>여정 지도 일러스트]</div>
</section>

<div class="credit" id="p-credit"></div>

<script src="data.js"></script>
<script>
(function () {
  const D = window.DATA;
  const P = D.profile;

  document.getElementById('p-brand').textContent = P.name.toUpperCase();
  document.getElementById('p-places').textContent = P.places;
  document.getElementById('p-tagline').textContent = P.tagline;
  document.getElementById('p-hero').innerHTML = P.hero1 + '<br><span class="dim">' + P.hero2 + '</span>';
  document.getElementById('p-sub').innerHTML = P.heroSub;
  document.getElementById('p-faces').textContent = P.faces;
  document.getElementById('p-contact').innerHTML =
    '<a href="mailto:' + P.email + '">' + P.email + '</a><br>' + P.location;
  document.getElementById('p-credit').textContent = P.name.toUpperCase() + ' · THOUGHT CONSTELLATION · 2026';
  document.getElementById('feed-lede').textContent =
    '이 페이지는 완성본이 아닙니다. 생각이 생길 때마다, 대화할 때마다 성좌는 조금씩 커집니다.';

  const LS_KEY = 'paul-intro-user-v2';
  const saved = (() => {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || { thoughts: [] }; }
    catch (e) { return { thoughts: [] }; }
  })();

  const NOW = Date.now();
  const baseThoughts = D.thoughts.map(t => ({ id: t.id, text: t.text, tags: t.tags, addedAt: NOW - t.daysAgo * 86400000 }));
  const state = {
    nodes: D.nodes,
    thoughts: [...saved.thoughts, ...baseThoughts],
    selected: [],
    activeCombo: null,
  };
  const nodeById = id => state.nodes.find(n => n.id === id);
  const labelOf = id => (nodeById(id) || {}).label || id;

  function persist() {
    localStorage.setItem(LS_KEY, JSON.stringify({ thoughts: state.thoughts.filter(t => t.user) }));
  }

  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
  let particles = [];
  let hovered = null;

  const TYPE = {
    core:        { size: 16, alpha: 0.72, color: '212,162,78',  drift: 0.05 },
    place:       { size: 18, alpha: 0.95, color: '232,195,122', drift: 0.035 },
    associative: { size: 14, alpha: 0.5,  color: '237,235,230', drift: 0.07 },
    wildcard:    { size: 12, alpha: 0.3,  color: '237,235,230', drift: 0.11 },
  };

  function initParticles() {
    const prev = particles;
    particles = state.nodes.map(n => {
      const ex = prev.find(p => p.id === n.id);
      if (ex) return ex;
      const t = TYPE[n.type] || TYPE.core;
      return {
        id: n.id, label: n.label, type: n.type,
        x: 60 + Math.random() * (W - 120),
        y: 44 + Math.random() * (H - 88),
        vx: (Math.random() - 0.5) * t.drift,
        vy: (Math.random() - 0.5) * t.drift,
        w: 0,
        freshMul: n.fresh ? 1.55 : 1,
      };
    });
  }

  function scatter(p) {
    const t = TYPE[p.type] || TYPE.core;
    p.x = 60 + Math.random() * (W - 120);
    p.y = 44 + Math.random() * (H - 88);
    p.vx = (Math.random() - 0.5) * t.drift;
    p.vy = (Math.random() - 0.5) * t.drift;
  }

  function resize() {
    const rect = canvas.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width = W * DPR; canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    if (!particles.length) initParticles();
    particles.forEach(p => {
      p.x = Math.min(Math.max(p.x, 44), W - 44);
      p.y = Math.min(Math.max(p.y, 28), H - 18);
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(237,235,230,0.05)';
    for (let i = 0; i < 46; i++) ctx.fillRect((i * 97.3) % W, (i * 53.7) % H, 1.1, 1.1);

    const sel = particles.filter(p => state.selected.includes(p.id));
    if (sel.length > 1) {
      ctx.strokeStyle = 'rgba(212,162,78,0.55)'; ctx.lineWidth = 1;
      for (let i = 0; i < sel.length; i++)
        for (let j = i + 1; j < sel.length; j++) {
          ctx.beginPath(); ctx.moveTo(sel[i].x, sel[i].y); ctx.lineTo(sel[j].x, sel[j].y); ctx.stroke();
        }
    }

    particles.forEach(p => {
      const t = TYPE[p.type] || TYPE.core;
      const isSel = state.selected.includes(p.id);
      const isHov = hovered === p.id;
      const comboW = isSel && state.activeCombo && state.activeCombo.weights[p.id];
      const selMul = isSel ? (comboW || 1.25) : 1;
      const fs = t.size * selMul * p.freshMul;
      ctx.font = (isSel ? '700 ' : '400 ') + fs + 'px Pretendard, "Malgun Gothic", sans-serif';
      ctx.textAlign = 'center';
      p.w = ctx.measureText(p.label).width;

      if (p.type === 'place') {
        ctx.beginPath();
        ctx.arc(p.x, p.y - fs * 0.35, 2.4, 0, Math.PI * 2);
        ctx.fillStyle = isSel ? '#e8c37a' : 'rgba(232,195,122,0.7)';
        ctx.fill();
      }

      let a = isSel ? 1 : (isHov ? Math.min(t.alpha + 0.4, 1) : t.alpha);
      ctx.fillStyle = isSel ? '#d4a24e' : 'rgba(' + t.color + ',' + a + ')';
      ctx.fillText(p.label, p.x, p.y);

      if (isSel) {
        ctx.beginPath();
        ctx.arc(p.x, p.y + fs * 0.55, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = '#d4a24e'; ctx.fill();
      }
    });
  }

  function stepLoop() {
    particles.forEach(p => {
      p.freshMul += (1 - p.freshMul) * 0.003;
      if (state.selected.includes(p.id)) return;
      p.x += p.vx; p.y += p.vy;
      const hw = p.w / 2 + 14;
      if (p.x < hw || p.x > W - hw) p.vx *= -1;
      if (p.y < 32 || p.y > H - 16) p.vy *= -1;
    });
    draw();
    requestAnimationFrame(stepLoop);
  }

  function hitTest(mx, my) {
    for (const p of particles) {
      const hw = Math.max(p.w / 2 + 10, 28);
      if (mx > p.x - hw && mx < p.x + hw && my > p.y - 20 && my < p.y + 12) return p;
    }
    return null;
  }

  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    const p = hitTest(e.clientX - r.left, e.clientY - r.top);
    hovered = p ? p.id : null;
    canvas.style.cursor = p ? 'pointer' : 'default';
  });

  let downPos = null;
  canvas.addEventListener('pointerdown', e => { downPos = { x: e.clientX, y: e.clientY }; });
  canvas.addEventListener('click', e => {
    if (downPos && Math.hypot(e.clientX - downPos.x, e.clientY - downPos.y) > 6) return;
    const r = canvas.getBoundingClientRect();
    const p = hitTest(e.clientX - r.left, e.clientY - r.top);
    if (p) toggleSelect(p.id);
  });

  function toggleSelect(id) {
    const i = state.selected.indexOf(id);
    if (i >= 0) state.selected.splice(i, 1);
    else { if (state.selected.length >= 3) state.selected.shift(); state.selected.push(id); }
    renderSynthesis();
  }

  document.getElementById('sky-reset').addEventListener('click', () => {
    state.selected = [];
    state.activeCombo = null;
    particles.forEach(p => {
      scatter(p);
      p.freshMul = 1 + (p.freshMul - 1) * 0.4;
    });
    renderSynthesis();
  });

  const TYPE_LABEL = { core: '나', place: '나를 바꾼 장소', associative: '관심어', wildcard: '엉뚱한 갈고리' };

  function findCombo(ids) {
    const set = [...ids].sort().join('|');
    return (D.combos || []).find(c => [...c.ids].sort().join('|') === set) || null;
  }

  function renderSynthesis() {
    const el = document.getElementById('synthesis');
    document.getElementById('sky-hint').style.opacity = state.selected.length ? '0' : '1';

    if (!state.selected.length) {
      state.activeCombo = null;
      el.innerHTML = '<div class="synth-empty">아직 선택된 단어가 없습니다. 위 성좌에서 궁금한 단어를 하나 골라보세요 — 이야기가 열립니다.</div>';
      return;
    }
    if (state.selected.length === 1) {
      state.activeCombo = null;
      el.innerHTML = renderSingle(nodeById(state.selected[0])); bindChips(el); return;
    }
    const combo = findCombo(state.selected);
    state.activeCombo = combo;
    el.innerHTML = combo ? renderComboStory(combo) : renderComboFallback();
    bindChips(el);
  }

  function renderComboStory(combo) {
    const sel = combo.ids.map(nodeById).filter(Boolean);
    let h = '<div class="story-single">';
    h += '<div><span class="badge t-place">엮인 이야기</span></div>';
    h += '<div class="headword">' + combo.title + '</div>';
    h += '<div class="prose">' + combo.story + '</div>';
    h += '<div class="related-row"><span class="lbl">이 이야기를 이루는 단어</span>' +
      sel.map(n => '<span class="chip" data-id="' + n.id + '">' + n.label + '</span>').join('') + '</div>';
    h += '</div>';

    const ids = combo.ids;
    const shared = state.thoughts
      .map(t => ({ t, s: t.tags.filter(tag => ids.includes(tag)).length }))
      .filter(o => o.s > 0)
      .sort((a, b) => b.s - a.s || b.t.addedAt - a.t.addedAt).slice(0, 3);
    if (shared.length) {
      h += '<div class="synth-thoughts"><h4>이 이야기에 걸린 생각</h4>' +
        shared.map(o => thoughtCard(o.t)).join('') + '</div>';
    }
    return h;
  }

  function renderSingle(n) {
    if (!n) return '';
    let h = '<div class="story-single">';
    h += '<div><span class="badge t-' + n.type + '">' + TYPE_LABEL[n.type] + '</span>';
    if (n.era) h += '<span class="era">' + n.era + '</span>';
    h += '</div>';
    h += '<div class="headword">' + n.label + '</div>';
    h += '<div class="prose">' + n.story + '</div>';
    if (n.status === 'ask') {
      const oq = D.openQuestions.find(q => q.node === n.id);
      h += '<div class="ask-ribbon">✦ 이 이야기는 아직 Paul에게 듣는 중입니다' + (oq ? ' — “' + oq.q + '”' : '') + '</div>';
    }
    const links = (n.links || []).filter(nodeById);
    if (links.length) {
      h += '<div class="related-row"><span class="lbl">이어지는 단어</span>' +
        links.map(id => '<span class="chip" data-id="' + id + '">' + labelOf(id) + '</span>').join('') + '</div>';
    }
    h += '</div>';
    return h;
  }

  function renderComboFallback() {
    const sel = state.selected.map(nodeById).filter(Boolean);
    const title = sel.map(n => n.label).join('<span class="x">×</span>');
    let h = '<div class="synth-title">' + title + '</div>';
    h += '<div class="synth-lede">이 단어들이 한 사람 안에서 만나는 지점입니다. 아직 하나로 엮인 이야기는 없지만, 각자의 조각은 이렇습니다.</div>';
    h += '<div class="synth-grid">' + sel.map(n =>
      '<div class="story-card t-' + n.type + '"><div class="cap">' + TYPE_LABEL[n.type] +
      (n.era ? ' · ' + n.era : '') + '</div><div class="hw">' + n.label +
      '</div><div class="tx">' + n.story + '</div></div>').join('') + '</div>';

    const ids = state.selected;
    const shared = state.thoughts
      .map(t => ({ t, s: t.tags.filter(tag => ids.includes(tag)).length }))
      .filter(o => o.s > 0)
      .sort((a, b) => b.s - a.s || b.t.addedAt - a.t.addedAt).slice(0, 3);
    if (shared.length) {
      h += '<div class="synth-thoughts"><h4>이 조합에 걸린 생각</h4>' +
        shared.map(o => thoughtCard(o.t)).join('') + '</div>';
    }
    return h;
  }

  function bindChips(el) {
    el.querySelectorAll('.chip').forEach(c =>
      c.addEventListener('click', () => toggleSelect(c.dataset.id)));
  }

  function thoughtCard(t) {
    return '<div class="thought-card"><div class="txt">' + t.text +
      '</div><div class="meta">' + formatDate(t.addedAt) + ' · ' +
      t.tags.map(labelOf).join(' · ') + '</div></div>';
  }
  function formatDate(ts) {
    const d = Math.floor((NOW - ts) / 86400000);
    if (d <= 0) return '오늘'; if (d === 1) return '어제';
    if (d < 7) return d + '일 전'; if (d < 30) return Math.floor(d / 7) + '주 전';
    return Math.floor(d / 30) + '개월 전';
  }

  function renderFeed() {
    document.getElementById('feed-list').innerHTML =
      [...state.thoughts].sort((a, b) => b.addedAt - a.addedAt).slice(0, 3).map(thoughtCard).join('');
  }

  document.getElementById('add-btn').addEventListener('click', () => {
    const content = document.getElementById('add-content').value.trim();
    const tagsRaw = document.getElementById('add-tags').value.trim();
    if (!content) { alert('생각을 입력해주세요.'); return; }
    const tags = tagsRaw.split(',').map(s => s.trim()).filter(Boolean).map(lbl => {
      const f = state.nodes.find(n => n.label === lbl || n.id === lbl); return f ? f.id : null;
    }).filter(Boolean);
    state.thoughts.unshift({ id: 't' + NOW + Math.floor(state.thoughts.length), text: content, tags, addedAt: Date.now(), user: true });
    persist();
    document.getElementById('add-content').value = '';
    document.getElementById('add-tags').value = '';
    renderFeed(); renderSynthesis();
  });
  document.getElementById('clear-form-btn').addEventListener('click', () => {
    document.getElementById('add-content').value = '';
    document.getElementById('add-tags').value = '';
  });

  window.__pb = { state, toggleSelect, nodeById };

  window.addEventListener('resize', resize);
  resize(); initParticles(); renderSynthesis(); renderFeed(); stepLoop();
})();
</script>
</body>
</html>
