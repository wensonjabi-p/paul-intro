<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paul Bhang — 생각의 파편들</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #201f1d;
    --bg-soft: #2b2926;
    --ink: #e8e5dd;
    --muted: #b0aca1;
    --faint: #7c786d;
    --accent: #c9a45c;
    --accent-dim: rgba(201, 164, 92, 0.5);
    --place: #cdbe9e;
    --line: rgba(232, 229, 221, 0.09);
    --font-display: 'Archivo Black', 'Pretendard', -apple-system, sans-serif;
    --font-mono: 'Space Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
    line-height: 1.7;
    overflow-x: hidden;
  }
  ::selection { background: var(--accent); color: var(--bg); }

  #bgTexture { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: -1; }

  /* ---------- HERO ---------- */
  .hero { min-height: 100vh; display: flex; flex-direction: column; position: relative; }
  .hero-top {
    display: flex; justify-content: space-between; align-items: center;
    padding: 28px 5vw; font-size: 13px; letter-spacing: 0.12em; color: var(--muted);
    max-width: 1100px; margin: 0 auto; width: 100%;
  }
  .hero-top .brand { color: var(--ink); font-weight: 600; letter-spacing: 0.18em; }
  .lang-toggle { display: flex; gap: 4px; }
  .lang-btn {
    background: none; border: 1px solid var(--line); color: var(--muted);
    font-family: inherit; font-size: 11px; letter-spacing: 0.08em; padding: 4px 10px;
    border-radius: 12px; cursor: pointer; transition: all 0.2s;
  }
  .lang-btn:hover { border-color: var(--accent-dim); color: var(--ink); }
  .lang-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 600; }
  .hero-head { padding: 4vh 5vw 0; max-width: 1100px; margin: 0 auto; width: 100%; }
  .hero-head .eyebrow {
    font-size: 13px; letter-spacing: 0.25em; color: var(--accent);
    text-transform: uppercase; margin-bottom: 18px;
  }
  .hero-head h1 {
    font-family: var(--font-display); font-size: clamp(34px, 6.2vw, 76px); font-weight: 700; line-height: 1.15; letter-spacing: -0.02em;
    text-shadow: 0 3px 26px rgba(0,0,0,0.55);
  }
  .hero-head h1 .dim { color: var(--faint); }
  .hero-head .sub {
    margin-top: 22px; font-size: clamp(14px, 1.6vw, 17px); color: var(--muted); max-width: 600px;
    text-shadow: 0 1px 10px rgba(0,0,0,0.4);
  }
  .hero-head .sub b { color: var(--ink); font-weight: 600; }
  .identity-line {
    margin-top: 16px; font-size: 12px; letter-spacing: 0.22em; color: var(--faint); text-transform: uppercase;
  }

  /* ---------- LEGEND ---------- */
  .legend {
    display: flex; flex-wrap: wrap; gap: 16px; padding: 20px 5vw 0; font-size: 12px; color: var(--muted);
    max-width: 1100px; margin: 0 auto; width: 100%;
  }
  .legend .item { display: flex; align-items: center; gap: 7px; letter-spacing: 0.04em; }
  .legend .swatch { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .sw-core { background: var(--accent); }
  .sw-place { background: var(--place); box-shadow: 0 0 0 3px rgba(205,190,158,0.22); }
  .sw-assoc { background: rgba(237,235,230,0.5); }
  .sw-wild { background: rgba(237,235,230,0.28); }

  /* ---------- CONSTELLATION ---------- */
  .sky-toolbar {
    display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
    gap: 10px 16px; padding: 3vh 5vw 0; margin-top: 2vh;
  }
  .constellation-wrap { position: relative; flex: 1; }
  #sky { display: block; width: 100%; height: 54vh; min-height: 400px; cursor: default; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  .sky-hint {
    font-size: 12.5px; color: var(--muted);
    letter-spacing: 0.08em; pointer-events: none; transition: opacity 0.6s;
  }
  .sky-hint .k { color: var(--accent); }
  .sky-btns { display: flex; gap: 8px; flex-shrink: 0; }
  .sky-btn {
    font-size: 13px; font-weight: 600; padding: 8px 18px; border-radius: 20px; cursor: pointer;
    letter-spacing: 0.04em; transition: all 0.25s; font-family: inherit;
  }
  .sky-btn-gold {
    background: rgba(201,164,92,0.1); border: 1px solid var(--accent-dim); color: var(--accent);
  }
  .sky-btn-gold:hover { background: rgba(201,164,92,0.2); border-color: var(--accent); }
  .sky-btn-ghost {
    background: rgba(232,229,221,0.05); border: 1px solid var(--line); color: var(--ink);
  }
  .sky-btn-ghost:hover { background: rgba(232,229,221,0.1); border-color: var(--muted); }

  /* ---------- SYNTHESIS ---------- */
  .synthesis { padding: 0 5vw 8vh; max-width: 1100px; margin: 0 auto; width: 100%; }
  .synth-empty { color: var(--faint); font-size: 14px; border-top: 1px solid var(--line); padding-top: 28px; }

  .story-single { border-top: 1px solid var(--line); padding-top: 30px; }
  .story-single .badge {
    display: inline-block; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 4px 12px; border-radius: 3px; margin-bottom: 16px;
  }
  .badge.t-core { background: rgba(201,164,92,0.15); color: var(--accent); }
  .badge.t-place { background: rgba(205,190,158,0.16); color: var(--place); }
  .badge.t-associative { background: rgba(237,235,230,0.08); color: var(--muted); }
  .badge.t-wildcard { background: rgba(237,235,230,0.06); color: var(--muted); }
  .story-single .era { font-family: var(--font-mono); font-size: 13px; color: var(--faint); letter-spacing: 0.02em; margin-left: 12px; }
  .story-single .headword {
    font-family: var(--font-display); font-size: clamp(30px, 5vw, 52px); font-weight: 700; line-height: 1.15; letter-spacing: -0.01em;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  .story-single .prose {
    margin-top: 20px; font-size: clamp(16px, 2vw, 20px); line-height: 1.85; color: var(--ink); max-width: 720px;
  }
  .fact-bar { margin-top: 18px; max-width: 420px; }
  .fact-bar-label { display: flex; justify-content: space-between; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .fact-bar-pct { color: var(--accent); font-weight: 600; }
  .fact-bar-track { height: 6px; border-radius: 3px; background: rgba(237,235,230,0.08); overflow: hidden; }
  .fact-bar-fill { height: 100%; background: linear-gradient(90deg, var(--place), var(--accent)); border-radius: 3px; }
  .fact-bar-note { font-size: 11px; color: var(--faint); margin-top: 6px; line-height: 1.5; }
  .ask-ribbon {
    margin-top: 22px; display: inline-flex; align-items: center; gap: 10px;
    background: rgba(201,164,92,0.1); border: 1px solid var(--accent-dim); border-radius: 8px;
    padding: 12px 18px; font-size: 13.5px; color: var(--accent); max-width: 640px; line-height: 1.6;
  }
  .related-row { margin-top: 30px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .related-row .lbl { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--faint); margin-right: 6px; }
  .chip {
    font-size: 13px; color: var(--muted); border: 1px solid var(--line); padding: 5px 13px;
    border-radius: 16px; cursor: pointer; transition: all 0.25s; letter-spacing: 0.03em;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  .card-make-btn {
    margin-top: 22px; background: none; border: 1px solid var(--accent-dim); color: var(--accent);
    font-family: inherit; font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 20px;
    cursor: pointer; letter-spacing: 0.03em; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
  }
  .card-make-btn:hover { background: rgba(201,164,92,0.1); }
  .card-maker {
    margin-top: 26px; border-top: 1px solid var(--line); padding-top: 26px;
  }
  .card-maker .cm-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .card-maker .cm-title { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--faint); }
  .card-maker .cm-close {
    background: none; border: none; color: var(--faint); font-size: 13px; cursor: pointer; padding: 4px 8px;
  }
  .card-maker .cm-close:hover { color: var(--ink); }
  .cm-status { color: var(--muted); font-size: 14px; padding: 20px 0; }
  .cm-row { display: flex; gap: 18px; overflow-x: auto; padding-bottom: 10px; }
  .cm-card { flex: 0 0 auto; text-align: center; }
  .cm-card canvas {
    width: 220px; height: auto; border-radius: 10px; border: 1px solid var(--line); display: block;
    box-shadow: 0 12px 34px rgba(0,0,0,0.35);
  }
  .cm-card .cm-lang { margin-top: 10px; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--faint); }
  .cm-card .cm-btns { margin-top: 8px; display: flex; gap: 6px; justify-content: center; }
  .cm-card .cm-btns button {
    background: none; border: 1px solid var(--line); color: var(--muted); font-family: inherit;
    font-size: 11.5px; padding: 6px 11px; border-radius: 14px; cursor: pointer; transition: all 0.2s;
  }
  .cm-card .cm-btns button:hover { border-color: var(--accent-dim); color: var(--accent); }

  .synth-title {
    font-family: var(--font-display); font-size: clamp(22px, 3.2vw, 34px); font-weight: 700; line-height: 1.3;
    border-top: 1px solid var(--line); padding-top: 30px; text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  .synth-title .x { color: var(--accent); font-weight: 400; padding: 0 6px; }
  .synth-lede { margin-top: 12px; color: var(--muted); font-size: 14.5px; max-width: 680px; }
  .synth-grid {
    margin-top: 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px;
  }
  .story-card {
    border: 1px solid var(--line); border-radius: 10px; padding: 20px 22px; background: var(--bg-soft);
    transition: border-color 0.25s;
  }
  .story-card:hover { border-color: var(--accent-dim); }
  .story-card .cap { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 8px; }
  .story-card.t-core .cap { color: var(--accent); }
  .story-card.t-place .cap { color: var(--place); }
  .story-card.t-associative .cap, .story-card.t-wildcard .cap { color: var(--muted); }
  .story-card .hw { font-size: 17px; font-weight: 600; }
  .story-card .tx { font-size: 13.5px; color: var(--muted); margin-top: 10px; line-height: 1.7; }

  .synth-thoughts { margin-top: 34px; }
  .synth-thoughts h4 {
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--faint); margin-bottom: 16px;
  }
  .thought-card { border-left: 2px solid var(--accent); padding: 4px 0 4px 20px; margin-bottom: 20px; }
  .thought-card .txt { font-size: 15px; line-height: 1.75; color: var(--ink); max-width: 720px; }
  .thought-card .meta { font-family: var(--font-mono); font-size: 12px; color: var(--faint); margin-top: 8px; letter-spacing: 0.02em; }

  /* ---------- FEED + ADD ---------- */
  .feed { padding: 10vh 5vw 12vh; max-width: 1100px; margin: 0 auto; border-top: 1px solid var(--line); }
  .feed .eyebrow {
    font-size: 13px; letter-spacing: 0.25em; color: var(--accent); text-transform: uppercase; margin-bottom: 16px;
  }
  .feed h2 { font-family: var(--font-display); font-size: clamp(26px, 4vw, 44px); font-weight: 700; }
  .feed .lede { margin-top: 14px; color: var(--muted); max-width: 620px; font-size: 15px; }
  .feed-list { margin-top: 6vh; }

  .form-box {
    margin-top: 7vh; border: 1px solid var(--line); border-radius: 12px; padding: 30px;
    background: var(--bg-soft); max-width: 720px;
  }
  .form-box h4 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .form-box .hint { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
  .form-box label {
    display: block; font-size: 12px; letter-spacing: 0.1em; color: var(--muted);
    margin: 16px 0 6px; text-transform: uppercase;
  }
  .form-box textarea, .form-box input {
    width: 100%; background: var(--bg); border: 1px solid var(--line); border-radius: 8px;
    color: var(--ink); font-family: inherit; font-size: 14px; padding: 12px 14px; transition: border-color 0.25s;
  }
  .form-box textarea { min-height: 90px; resize: vertical; }
  .form-box textarea:focus, .form-box input:focus { outline: none; border-color: var(--accent); }
  .form-box .btns { margin-top: 24px; display: flex; gap: 10px; }
  .btn-gold {
    background: var(--accent); color: var(--bg); border: none; font-weight: 700; font-size: 14px;
    padding: 12px 26px; border-radius: 8px; cursor: pointer; letter-spacing: 0.04em; transition: opacity 0.25s;
  }
  .btn-gold:hover { opacity: 0.85; }
  .btn-ghost {
    background: none; color: var(--muted); border: 1px solid var(--line); font-size: 14px;
    padding: 12px 22px; border-radius: 8px; cursor: pointer; transition: all 0.25s;
  }
  .btn-ghost:hover { color: var(--ink); border-color: var(--muted); }

  /* ---------- FOOTER ---------- */
  .footer {
    border-top: 1px solid var(--line); padding: 10vh 5vw; max-width: 1100px; margin: 0 auto;
  }
  .footer h2 { font-family: var(--font-display); font-size: clamp(24px, 3.5vw, 40px); font-weight: 700; line-height: 1.3; text-shadow: 0 2px 18px rgba(0,0,0,0.4); }
  .footer .contact { margin-top: 20px; font-size: 15px; color: var(--muted); }
  .footer .contact a { color: var(--accent); text-decoration: none; }
  .footer .contact a:hover { text-decoration: underline; }
  .credit { padding: 30px 5vw 10px; font-size: 12px; color: var(--faint); letter-spacing: 0.1em; text-align: center; }

  /* ---------- SHARE ---------- */
  .share-section { max-width: 1100px; margin: 0 auto; padding: 4vh 5vw 6vh; text-align: center; position: relative; }
  .share-btn {
    background: none; border: 1px solid var(--line); color: var(--ink); font-family: inherit;
    font-size: 13px; font-weight: 600; padding: 10px 24px; border-radius: 20px; cursor: pointer;
    letter-spacing: 0.04em; transition: all 0.2s;
  }
  .share-btn:hover { border-color: var(--accent-dim); color: var(--accent); }
  .share-menu {
    position: absolute; left: 50%; bottom: calc(100% + 10px); transform: translateX(-50%);
    background: var(--bg-soft); border: 1px solid var(--line); border-radius: 12px; padding: 8px;
    display: flex; flex-direction: column; gap: 2px; min-width: 200px; box-shadow: 0 12px 40px rgba(0,0,0,0.4); z-index: 5;
  }
  .share-opt {
    display: flex; align-items: center; gap: 10px; background: none; border: none; color: var(--ink);
    font-family: inherit; font-size: 13.5px; padding: 10px 12px; border-radius: 8px; cursor: pointer; text-align: left; width: 100%;
  }
  .share-opt:hover { background: rgba(232,229,221,0.06); }
  .share-opt .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  #share-qr {
    position: absolute; left: 50%; bottom: calc(100% + 10px); transform: translateX(-50%);
    background: #f2ede1; border-radius: 12px; padding: 18px; box-shadow: 0 12px 40px rgba(0,0,0,0.4); z-index: 5;
  }
  #share-qr img { display: block; width: 160px; height: 160px; }
  #share-qr .qr-cap { margin-top: 10px; font-size: 11.5px; color: #4a473f; text-align: center; }

  @media (max-width: 720px) {
    #sky { height: 60vh; }
  }
</style>
</head>
<body>

<canvas id="bgTexture"></canvas>
<script>
(function () {
  // 콘크리트 질감 + 촘촘한 격자 빛 — 한 번만 그리는 정적 배경 (매 프레임 다시 그리지 않음, 리사이즈에만 반응)
  var canvas = document.getElementById('bgTexture');
  var ctx = canvas.getContext('2d');
  var resizeTimer;

  function draw() {
    var DPR = Math.min(window.devicePixelRatio || 1, 2);
    var W = window.innerWidth, H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    var base = ctx.createLinearGradient(0, 0, W, H);
    base.addColorStop(0, '#26241f');
    base.addColorStop(0.55, '#302e29');
    base.addColorStop(1, '#201f1c');
    ctx.fillStyle = base;
    ctx.fillRect(0, 0, W, H);

    var i, x, y, a;
    for (i = 0; i < (W * H) / 900; i++) {
      x = Math.random() * W; y = Math.random() * H; a = Math.random() * 0.045;
      ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,' + a + ')' : 'rgba(0,0,0,' + (a * 1.3) + ')';
      ctx.fillRect(x, y, 1.1, 1.1);
    }

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    var cell = 22, pad = cell * 3, gx, gy;
    for (gx = -pad; gx < W + pad; gx += cell) {
      for (gy = -pad; gy < H + pad; gy += cell) {
        if (Math.random() > 0.68) {
          a = (0.04 + Math.random() * 0.07);
          ctx.fillStyle = 'rgba(232,218,196,' + a + ')';
          ctx.fillRect(gx, gy, cell * 0.6, cell * 0.6);
        }
      }
    }
    ctx.restore();

    [[W * 0.14, H * 0.22, W * 0.32], [W * 0.85, H * 0.68, W * 0.4], [W * 0.5, H * 1.05, W * 0.5]].forEach(function (s) {
      var glow = ctx.createRadialGradient(s[0], s[1], 0, s[0], s[1], s[2]);
      glow.addColorStop(0, 'rgba(232,218,196,0.09)');
      glow.addColorStop(1, 'rgba(232,218,196,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, W, H);
    });

    var vg = ctx.createRadialGradient(W * 0.5, H * 0.35, W * 0.2, W * 0.5, H * 0.5, W * 0.85);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.3)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(draw, 200);
  });
  draw();
})();
</script>

<section class="hero">
  <div class="hero-top">
    <div class="brand" id="p-brand"></div>
    <div style="display:flex; align-items:center; gap:16px;">
      <div id="p-places"></div>
      <div class="lang-toggle" id="lang-toggle">
        <button data-lang="ko" class="lang-btn">KO</button>
        <button data-lang="en" class="lang-btn">EN</button>
        <button data-lang="zh" class="lang-btn">中</button>
      </div>
      <a href="interview.html" id="p-app-back" style="display:none; color:var(--faint); font-size:11px; letter-spacing:0.06em; text-decoration:none; border:1px solid var(--line); padding:4px 10px; border-radius:12px;">← 앱으로</a>
    </div>
  </div>

  <div class="hero-head">
    <div class="eyebrow" id="p-tagline"></div>
    <h1 id="p-hero"></h1>
    <p class="sub" id="p-sub"></p>
    <div class="identity-line" id="p-faces"></div>
  </div>

  <div class="legend">
    <span class="item"><span class="swatch sw-core"></span><span id="p-leg-core"></span></span>
    <span class="item"><span class="swatch sw-place"></span><span id="p-leg-place"></span></span>
    <span class="item"><span class="swatch sw-assoc"></span><span id="p-leg-assoc"></span></span>
    <span class="item"><span class="swatch sw-wild"></span><span id="p-leg-wild"></span></span>
  </div>

  <div class="sky-toolbar">
    <div class="sky-hint" id="sky-hint"></div>
    <div class="sky-btns">
      <button class="sky-btn sky-btn-ghost" id="sky-deselect" style="display:none;"></button>
      <button class="sky-btn sky-btn-gold" id="sky-reset"></button>
    </div>
  </div>
  <div class="constellation-wrap">
    <canvas id="sky"></canvas>
  </div>

  <div class="synthesis" id="synthesis"></div>
  <div class="card-maker" id="card-maker" style="display:none;"></div>
</section>

<section class="feed">
  <div class="eyebrow">Living Document</div>
  <h2 id="p-feed-h2"></h2>
  <p class="lede" id="feed-lede"></p>
  <div class="feed-list" id="feed-list"></div>
</section>

<section class="footer footer-single">
  <div style="max-width:480px;">
    <h2 id="p-footer-h2"></h2>
    <div id="p-footer-location" style="margin-top:14px; font-size:12px; letter-spacing:0.08em; color:var(--faint);"></div>
    <form id="contact-form" class="form-box" style="margin-top:28px; max-width:100%;">
      <label id="p-contact-namelabel"></label>

  const LS_KEY = 'paul-intro-user-v2';
  const saved = (() => {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || { thoughts: [] }; }
    catch (e) { return { thoughts: [] }; }
  })();

  const NOW = Date.now();
  function buildBaseThoughts() {
    return D.thoughts.map(t => ({ id: t.id, text: t.text, tags: t.tags, addedAt: NOW - t.daysAgo * 86400000 }));
  }
  // 서버에서 라이브로 받아오는 발행된 생각들 — 인터뷰/기록에서 올라온 최신 콘텐츠. data.js를 손대지 않아도 여기서 갱신됨.
  let remoteThoughts = [];
  function composeThoughts() {
    return [...remoteThoughts, ...saved.thoughts, ...buildBaseThoughts()];
  }
  const VISIBLE_COUNT = 13; // 한 번에 보이는 단어 수 (10~15 사이)
  function pickVisibleSubset(count, keepIds) {
    const pool = state.nodes.map(n => n.id).filter(id => !keepIds.includes(id));
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const need = Math.max(0, count - keepIds.length);
    return [...keepIds, ...pool.slice(0, need)];
  }

  const state = {
    nodes: D.nodes,
    thoughts: composeThoughts(),
    selected: [],
    visibleIds: [],
    activeCombo: null,
  };

  // 생각의 text는 예전 항목처럼 단순 문자열이거나, 새로 다듬어진 항목처럼 {ko,en,zh}일 수 있다 —
  // 현재 사이트 언어에 맞는 버전을 고른다.
  function thoughtText(t) {
    const v = t && t.text;
    if (v && typeof v === 'object') return v[LANG] || v.ko || v.en || v.zh || '';

  // 새로 발행된 생각들 중 기존 성좌 노드에 없는 태그는, 그 자체로 클릭 가능한 단어(엉뚱한 갈고리 부류)로

  // 성좌에는 영원히 안 나타나게 된다.
  let dynamicByLang = { ko: [], en: [], zh: [] };
  function buildDynamicNodes() {
    const byTag = {};
    remoteThoughts.forEach(t => {
      if (t.source !== 'interview') return; // AI가 다듬고 라벨까지 붙인 인터뷰 답변만 — 빠른 기록의 자유 태그는 제외(품질 관리)
      (t.tags || []).forEach(tag => {
        if (!tag || (DATASETS.ko.nodes || []).some(n => n.id === tag)) return; // 이미 curated 노드로 존재
        if (!byTag[tag]) byTag[tag] = { labels: null, storiesByLang: { ko: [], en: [], zh: [] } };
        const entry = byTag[tag];
        if (!entry.labels && t.tagLabels && t.tagLabels[tag]) entry.labels = t.tagLabels[tag];
        const rawText = t.text;
        ['ko', 'en', 'zh'].forEach(l => {
          const txt = (rawText && typeof rawText === 'object') ? rawText[l] : (l === 'ko' ? rawText : null);
          if (txt && entry.storiesByLang[l].length < 3) entry.storiesByLang[l].push(txt);
        });
      });
    });
    const out = { ko: [], en: [], zh: [] };
    Object.keys(byTag).forEach(tag => {
      const entry = byTag[tag];
      ['ko', 'en', 'zh'].forEach(l => {
        const label = (entry.labels && entry.labels[l]) || tag;
        const story = entry.storiesByLang[l].join(' ') || entry.storiesByLang.ko.join(' ') || tag;
        out[l].push({ id: tag, label, type: 'wildcard', status: 'told', fresh: true, story, links: [] });
      });
    });
    dynamicByLang = out;
  }
  function nodesFor(lang) {
    return ((DATASETS[lang] && DATASETS[lang].nodes) || []).concat(dynamicByLang[lang] || []);
  }

  function persist() {
    localStorage.setItem(LS_KEY, JSON.stringify({ thoughts: state.thoughts.filter(t => t.user) }));
  }

    if (!DATASETS[lang] || lang === LANG) return;

    renderStaticText();
    initParticles();
    renderSynthesis();
    renderFeed();

  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
  let particles = [];
  let hovered = null;

  const TYPE = {
    core:        { size: 19, alpha: 0.88, color: '224,187,117', drift: 0.05 },
    place:       { size: 21, alpha: 1,    color: '224,211,180', drift: 0.035 },
    associative: { size: 17, alpha: 0.72, color: '237,235,230', drift: 0.07 },
    wildcard:    { size: 15, alpha: 0.55, color: '237,235,230', drift: 0.11 },
  };

  function initParticles() {
    const prev = particles;
    const visible = state.visibleIds.map(nodeById).filter(Boolean);
    particles = visible.map(n => {
      const ex = prev.find(p => p.id === n.id);
      if (ex) { ex.label = n.label; ex.type = n.type; return ex; }
      const t = TYPE[n.type] || TYPE.core;
      return {
        id: n.id, label: n.label, type: n.type,
        x: 60 + Math.random() * (W - 120),
        y: 44 + Math.random() * (H - 88),
        vx: (Math.random() - 0.5) * t.drift,
        vy: (Math.random() - 0.5) * t.drift,
        w: 0,
        freshMul: n.fresh ? 1.55 : 1,
      };
    });
  }

  function scatter(p) {
    const t = TYPE[p.type] || TYPE.core;
    p.x = 60 + Math.random() * (W - 120);
    p.y = 44 + Math.random() * (H - 88);
    p.vx = (Math.random() - 0.5) * t.drift;
    p.vy = (Math.random() - 0.5) * t.drift;
  }

  let prevW = 0, prevH = 0;
  function resize() {
    const rect = canvas.getBoundingClientRect();
    const newW = rect.width, newH = rect.height;
    // 화면 폭이 바뀌면(모바일↔데스크톱 등) 기존 단어 위치를 새 캔버스 크기에 맞춰 비율대로 다시 펼침 — 안 그러면 좁은 화면 때 위치가 넓은 화면에서 한쪽에 뭉쳐 보임
    if (prevW && prevH && particles.length && (prevW !== newW || prevH !== newH)) {
      const rx = newW / prevW, ry = newH / prevH;
      particles.forEach(p => { p.x *= rx; p.y *= ry; });
    }
    W = newW; H = newH;
    canvas.width = W * DPR; canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    if (!particles.length) initParticles();
    particles.forEach(p => {
      p.x = Math.min(Math.max(p.x, 44), W - 44);
      p.y = Math.min(Math.max(p.y, 28), H - 18);
    });
    prevW = W; prevH = H;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(237,235,230,0.05)';
    for (let i = 0; i < 46; i++) ctx.fillRect((i * 97.3) % W, (i * 53.7) % H, 1.1, 1.1);

    const sel = particles.filter(p => state.selected.includes(p.id));
    if (sel.length > 1) {
      ctx.strokeStyle = 'rgba(201,164,92,0.55)'; ctx.lineWidth = 1;
      for (let i = 0; i < sel.length; i++)
        for (let j = i + 1; j < sel.length; j++) {
          ctx.beginPath(); ctx.moveTo(sel[i].x, sel[i].y); ctx.lineTo(sel[j].x, sel[j].y); ctx.stroke();
        }
    }

    // 넓은 화면일수록 단어를 비례해서 키움(모바일 크기를 기준선으로, 최대 1.6배까지)
    const sizeScale = Math.min(1.6, Math.max(1, W / 800));

    particles.forEach(p => {
      const t = TYPE[p.type] || TYPE.core;
      const isSel = state.selected.includes(p.id);
      const isHov = hovered === p.id;
      const comboW = isSel && state.activeCombo && state.activeCombo.weights[p.id];
      const selMul = isSel ? (comboW || 1.25) : 1;
      const fs = t.size * selMul * p.freshMul * sizeScale;
      ctx.font = (isSel ? '700 ' : '400 ') + fs + 'px Pretendard, "Malgun Gothic", sans-serif';
      ctx.textAlign = 'center';
      p.w = ctx.measureText(p.label).width;
      p.fs = fs;

      if (p.type === 'place') {
        ctx.beginPath();
        ctx.arc(p.x, p.y - fs * 0.35, 2.4, 0, Math.PI * 2);
        ctx.fillStyle = isSel ? '#cdbe9e' : 'rgba(205,190,158,0.7)';
        ctx.fill();
      }

      let a = isSel ? 1 : (isHov ? Math.min(t.alpha + 0.4, 1) : t.alpha);
      ctx.shadowColor = 'rgba(0,0,0,0.65)';
      ctx.shadowBlur = 6;
      ctx.fillStyle = isSel ? '#c9a45c' : 'rgba(' + t.color + ',' + a + ')';
      ctx.fillText(p.label, p.x, p.y);
      ctx.shadowBlur = 0;

      if (isSel) {
        ctx.beginPath();
        ctx.arc(p.x, p.y + fs * 0.55, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = '#c9a45c'; ctx.fill();
      }
    });
  }

  function stepLoop() {
    particles.forEach(p => {
      p.freshMul += (1 - p.freshMul) * 0.003;
      if (state.selected.includes(p.id)) return;
      p.x += p.vx; p.y += p.vy;
      const hw = p.w / 2 + 14;
      if (p.x < hw || p.x > W - hw) p.vx *= -1;
      if (p.y < 32 || p.y > H - 16) p.vy *= -1;
    });
    draw();
    requestAnimationFrame(stepLoop);
  }

  function hitTest(mx, my) {
    for (const p of particles) {
      const hw = Math.max(p.w / 2 + 16, 34);
      const hv = Math.max((p.fs || 16) * 0.9, 28);
      if (mx > p.x - hw && mx < p.x + hw && my > p.y - hv - 8 && my < p.y + hv * 0.6) return p;
    }
    return null;
  }

  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    const p = hitTest(e.clientX - r.left, e.clientY - r.top);
    hovered = p ? p.id : null;
    canvas.style.cursor = p ? 'pointer' : 'default';
  });

  let downPos = null;
  canvas.addEventListener('pointerdown', e => { downPos = { x: e.clientX, y: e.clientY }; });
  canvas.addEventListener('click', e => {
    if (downPos && Math.hypot(e.clientX - downPos.x, e.clientY - downPos.y) > 12) return;
    const r = canvas.getBoundingClientRect();
    const p = hitTest(e.clientX - r.left, e.clientY - r.top);
    if (p) toggleSelect(p.id);
  });

  function toggleSelect(id) {
    const i = state.selected.indexOf(id);
    if (i >= 0) {
      state.selected.splice(i, 1);
    } else {
      if (state.selected.length >= 3) state.selected.shift();
      state.selected.push(id);
      if (!state.visibleIds.includes(id)) {
        state.visibleIds.push(id);
        initParticles();
      }
    }
    renderSynthesis();
  }

  document.getElementById('sky-reset').addEventListener('click', () => {
    // 선택된 단어는 항상 유지하고, 최근 인터뷰에서 나온 키워드도 몇 개는 계속 섞어 보여준다 —
    // 안 그러면 처음 한 번만 반영되고 그다음 "다른 단어 보기"부터는 다시 완전 무작위로 돌아가 버린다.
    const keep = [...new Set([...state.selected, ...recentTagIds(15, 4)])];
    state.visibleIds = pickVisibleSubset(VISIBLE_COUNT, keep);
    initParticles();
    particles.forEach(p => {
      if (keep.includes(p.id)) return;
      scatter(p);
      p.freshMul = 1 + (p.freshMul - 1) * 0.4;
    });
    renderSynthesis();
  });

  document.getElementById('sky-deselect').addEventListener('click', () => {
    state.selected = [];
    state.activeCombo = null;
    renderSynthesis();
  });

  function findCombo(ids) {
    const set = [...ids].sort().join('|');
    return (D.combos || []).find(c => [...c.ids].sort().join('|') === set) || null;
  }

  function renderSynthesis() {
    const el = document.getElementById('synthesis');
    document.getElementById('sky-hint').style.opacity = state.selected.length ? '0' : '1';
    document.getElementById('sky-deselect').style.display = state.selected.length ? 'inline-block' : 'none';
    closeCardMaker();

    if (!state.selected.length) {
      state.activeCombo = null;
      el.innerHTML = '<div class="synth-empty">' + UI[LANG].emptyState + '</div>';
      return;
    }
    if (state.selected.length === 1) {
      state.activeCombo = null;
      el.innerHTML = renderSingle(nodeById(state.selected[0])); bindChips(el);
      attachPhoto(el, state.selected.slice());
      return;
    }
    const combo = findCombo(state.selected);
    state.activeCombo = combo;
    if (combo) {
      el.innerHTML = renderComboStory(combo);
      bindChips(el);
      attachPhoto(el, state.selected.slice());
    } else {
      renderComboSynthesis(el, state.selected.slice());
    }
  }

  async function renderComboSynthesis(el, ids) {
    const sel = ids.map(nodeById).filter(Boolean);
    const title = sel.map(n => n.label).join('<span class="x">×</span>');
    el.innerHTML = '<div class="synth-title">' + title + '</div>' +
      '<div class="prose" style="margin-top:20px; color:var(--muted);">' + UI[LANG].comboLoading + '</div>';

    let paragraph = null;
    try {
      const r = await fetch('/api/synthesize-combo', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lang: LANG, nodes: sel.map(n => ({ id: n.id, label: n.label, type: n.type, story: n.story })) }),
      });
      const d = await r.json();
      paragraph = d.synthesis;
    } catch (e) { /* 조용히 폴백으로 */ }

    if (JSON.stringify(state.selected) !== JSON.stringify(ids)) return; // 그 사이 선택이 바뀌었으면 버림
    const usedAI = !!paragraph;
    if (!paragraph) paragraph = fallbackSynthesis(ids, sel);
    else state.activeSynthText = { ids: ids.slice(), lang: LANG, text: paragraph };
    const avgScore = sel.reduce((s, n) => s + factScoreOf(n), 0) / (sel.length || 1);
    // AI 합성은 각 단어의 사실 조각을 새로 엮어 쓴 글이라 원본보다 살짝 낮게, 폴백(문장 이어붙이기)은 원문 그대로라 원래 점수 유지.
    const shownScore = usedAI ? avgScore * 0.85 : avgScore;

    el.innerHTML = '<div class="synth-title">' + title + '</div>' +
      factBarHtml(shownScore) +
      '<div class="prose" style="margin-top:20px;">' + paragraph + '</div>' +
      '<div class="related-row"><span class="lbl">' + UI[LANG].relatedComboWordsSynth + '</span>' +
      sel.map(n => '<span class="chip" data-id="' + n.id + '">' + n.label + '</span>').join('') + '</div>' +
      cardMakeBtnHtml();
    bindChips(el);
    attachPhoto(el, ids);
  }

  function fallbackSynthesis(ids, sel) {
    const best = state.thoughts
      .map(t => ({ t, s: t.tags.filter(tag => ids.includes(tag)).length }))
      .filter(o => o.s >= 2)
      .sort((a, b) => b.s - a.s || b.t.addedAt - a.t.addedAt)[0];
    if (best) return thoughtText(best.t);
    const frags = sel.map(n => (n.story.match(/^.*?[.!?…。！？]/) || [n.story])[0].trim());
    return frags.join(' ');
  }

  async function attachPhoto(el, ids) {
    try {
      const r = await fetch('/api/photos-random?tags=' + encodeURIComponent(ids.join(',')));
      const d = await r.json();
      if (!d.photo) return;
      if (JSON.stringify(state.selected) !== JSON.stringify(ids)) return; // selection changed while fetching
      const holder = el.querySelector('.story-single, .synth-title');
      if (!holder) return;
      const fig = document.createElement('div');
      fig.style.cssText = 'margin-top:26px;';
      fig.innerHTML = '<img src="' + d.photo.url + '" style="width:100%;border-radius:12px;display:block;" />' +
        (d.photo.caption ? '<div style="margin-top:10px;font-size:13px;color:var(--muted);">' + d.photo.caption + '</div>' : '');
      const anchor = el.querySelector('.related-row, .synth-thoughts, .synth-lede');
      if (anchor) anchor.insertAdjacentElement('beforebegin', fig); else el.appendChild(fig);
    } catch (e) { /* 사진 서비스 준비 전이면 조용히 무시 */ }
  }

  const STATUS_FACT_SCORE = { told: 92, seed: 40, ask: 0 };
  function factScoreOf(n) { return STATUS_FACT_SCORE[n.status] != null ? STATUS_FACT_SCORE[n.status] : 40; }
  function factBarHtml(score) {
    const u = UI[LANG];
    const pct = Math.round(score);
    return '<div class="fact-bar">' +
      '<div class="fact-bar-label"><span>' + u.factBarLabel + '</span><span class="fact-bar-pct">' + pct + '%</span></div>' +
      '<div class="fact-bar-track"><div class="fact-bar-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="fact-bar-note">' + u.factBarNote + '</div>' +
      '</div>';
  }

  function renderComboStory(combo) {
    const sel = combo.ids.map(nodeById).filter(Boolean);
    const avgScore = sel.reduce((s, n) => s + factScoreOf(n), 0) / (sel.length || 1);
    let h = '<div class="story-single">';
    h += '<div><span class="badge t-place">' + UI[LANG].badgeComboStory + '</span></div>';
    h += '<div class="headword">' + combo.title + '</div>';

    h += '<div class="prose">' + combo.story + '</div>';
    h += '<div class="related-row"><span class="lbl">' + UI[LANG].relatedComboWordsCurated + '</span>' +
      sel.map(n => '<span class="chip" data-id="' + n.id + '">' + n.label + '</span>').join('') + '</div>';
    h += cardMakeBtnHtml();
    h += '</div>';
    return h;
  }

  function cardMakeBtnHtml() {
    return '<button class="card-make-btn" id="card-make-btn" type="button">' + UI[LANG].cardMakeBtn + '</button>';
  }

  function renderSingle(n) {
    if (!n) return '';
    let h = '<div class="story-single">';
    h += '<div><span class="badge t-' + n.type + '">' + UI[LANG].legend[n.type] + '</span>';
    if (n.era) h += '<span class="era">' + n.era + '</span>';
    h += '</div>';
    h += '<div class="headword">' + n.label + '</div>';
    h += factBarHtml(factScoreOf(n));

      h += '<div class="ask-ribbon">' + UI[LANG].askRibbonPrefix + (oq ? ' — "' + oq.q + '"' : '') + '</div>';
    }

    if (links.length) {
      h += '<div class="related-row"><span class="lbl">' + UI[LANG].relatedLinked + '</span>' +
        links.map(id => '<span class="chip" data-id="' + id + '">' + labelOf(id) + '</span>').join('') + '</div>';
    }

    h += '</div>';
    return h;

  function bindChips(el) {
    el.querySelectorAll('.chip').forEach(c =>
      c.addEventListener('click', () => toggleSelect(c.dataset.id)));
  }

  function thoughtCard(t) {
    return '<div class="thought-card"><div class="txt">' + thoughtText(t) +
      '</div><div class="meta">' + formatDate(t.addedAt) + ' · ' +
      t.tags.map(labelOf).join(' · ') + '</div></div>';
  }
  function formatDate(ts) {
    const u = UI[LANG];
    const d = Math.floor((NOW - ts) / 86400000);
    if (d <= 0) return u.dateToday; if (d === 1) return u.dateYesterday;
    if (d < 7) return u.dateDaysAgo(d); if (d < 30) return u.dateWeeksAgo(Math.floor(d / 7));
    return u.dateMonthsAgo(Math.floor(d / 30));
  }

  function renderFeed() {
    // 서버에서 발행된 최신 생각을 먼저(최신순), 그 다음 로컬/기본 생각으로 채운다 — 최근 인터뷰 내용이 항상 앞에 오도록.
    const remote = [...remoteThoughts].sort((a, b) => b.addedAt - a.addedAt);
    const rest = [...saved.thoughts, ...buildBaseThoughts()].sort((a, b) => b.addedAt - a.addedAt);
    const feed = [...remote, ...rest].slice(0, 3);
    document.getElementById('feed-list').innerHTML = feed.map(thoughtCard).join('');
  }

  async function fetchRemoteThoughts() {
    try {
      const r = await fetch('/api/thoughts');
      if (!r.ok) return;
      const d = await r.json();
      if (!Array.isArray(d.thoughts) || !d.thoughts.length) return;
      remoteThoughts = d.thoughts.map(t => ({
        id: t.id, text: t.text, tags: Array.isArray(t.tags) ? t.tags : [],
        tagLabels: (t.tagLabels && typeof t.tagLabels === 'object') ? t.tagLabels : {},
        source: t.source, addedAt: t.createdAt || Date.now(), remote: true,
      }));
      buildDynamicNodes();
      state.nodes = nodesFor(LANG);
      state.thoughts = composeThoughts();
      surfaceRecentTags();
      renderFeed();
    } catch (e) { /* 서버 준비 전이면 조용히 기본 콘텐츠만 보여줌 */ }
  }

  // 최근 발행된 생각들의 태그 중 성좌 노드로 존재하는 것들 — 최신순, 중복 없이.
  function recentTagIds(sourceLimit, maxTags) {
    const out = [];
    remoteThoughts.slice(0, sourceLimit).forEach(t => (t.tags || []).forEach(tag => {
      if (nodeById(tag) && !out.includes(tag)) out.push(tag);
    }));
    return out.slice(0, maxTags);
  }

  // 최근 발행된 생각에 달린 태그를, 아직 아무것도 안 골랐을 때 우선 노출시킨다.
  function surfaceRecentTags() {
    if (state.selected.length) return;
    const recentTags = recentTagIds(15, 6);
    if (!recentTags.length) return;
    state.visibleIds = pickVisibleSubset(VISIBLE_COUNT, recentTags);
    initParticles();
  }

  // ---- 카드 만들기 ----
  let cmToken = 0;

  function closeCardMaker() {
    cmToken++;
    const panel = document.getElementById('card-maker');
    panel.style.display = 'none';
    panel.innerHTML = '';
  }

  function findComboIn(ids, dataset) {
    const set = [...ids].sort().join('|');
    return ((dataset && dataset.combos) || []).find(c => [...c.ids].sort().join('|') === set) || null;
  }

  async function getTrilingualCardText(ids) {
    const langs = ['ko', 'en', 'zh'];
    if (ids.length === 1) {
      const id = ids[0];
      const out = {};
      langs.forEach(l => {
        const n = nodesFor(l).find(x => x.id === id);
        out[l] = { title: n ? n.label : id, story: n ? n.story : '', era: n ? (n.era || '') : '' };
      });
      return out;
    }
    const curated = findComboIn(ids, DATASETS.ko);
    if (curated) {
      const out = {};
      langs.forEach(l => {
        const c = findComboIn(ids, DATASETS[l]) || curated;
        out[l] = { title: c.title, story: c.story, era: '' };
      });
      return out;
    }
    const cached = state.activeSynthText;
    const results = await Promise.all(langs.map(async l => {
      const nodes = ids.map(id => nodesFor(l).find(x => x.id === id)).filter(Boolean);
      const title = nodes.map(n => n.label).join(' · ');
      if (l === LANG && cached && cached.lang === LANG && JSON.stringify(cached.ids) === JSON.stringify(ids)) {
        return { title, story: cached.text, era: '' };
      }
      try {
        const r = await fetch('/api/synthesize-combo', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lang: l, nodes: nodes.map(n => ({ id: n.id, label: n.label, type: n.type, story: n.story })) }),
        });
        const d = await r.json();
        return { title, story: d.synthesis || nodes.map(n => n.story).join(' '), era: '' };
      } catch (e) {
        return { title, story: nodes.map(n => n.story).join(' '), era: '' };
      }
    }));
    return { ko: results[0], en: results[1], zh: results[2] };
  }

  function wrapText(ctx, text, maxWidth) {
    const lines = [];
    text.split('\n').forEach(para => {
      let line = '';
      for (const ch of para) {
        const test = line + ch;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = ch;
        } else {
          line = test;
        }
      }
      lines.push(line);
    });
    return lines;
  }

  function loadImage(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  async function drawCard(lang, content) {
    const u = UI[lang] || UI.ko;
    const W = 1080, H = 1920, marginX = 96;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    const bg = ctx.createLinearGradient(0, 0, W, H);
    bg.addColorStop(0, '#26241f'); bg.addColorStop(0.55, '#302e29'); bg.addColorStop(1, '#1c1b19');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    for (let i = 0; i < 2400; i++) {
      const x = Math.random() * W, y = Math.random() * H, a = Math.random() * 0.05;
      ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,' + a + ')' : 'rgba(0,0,0,' + (a * 1.3) + ')';
      ctx.fillRect(x, y, 1.6, 1.6);
    }
    const vg = ctx.createRadialGradient(W * 0.5, H * 0.4, W * 0.25, W * 0.5, H * 0.5, W * 0.95);
    vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);

    ctx.textBaseline = 'alphabetic';
    let y = 150;

    ctx.fillStyle = '#c9a45c';
    ctx.font = '600 26px "Space Mono", monospace';
    ctx.fillText('FRAGMENTS OF THOUGHT', marginX, y);
    if (content.era) {
      ctx.fillStyle = 'rgba(232,229,221,0.55)';
      ctx.font = '400 24px "Space Mono", monospace';
      const eraW = ctx.measureText(content.era).width;
      ctx.fillText(content.era, W - marginX - eraW, y);
    }

    y += 70;
    ctx.strokeStyle = 'rgba(232,229,221,0.15)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(marginX, y); ctx.lineTo(W - marginX, y); ctx.stroke();

    y += 78;
    ctx.fillStyle = '#e8e5dd';
    ctx.font = '700 62px "Archivo Black", sans-serif';
    wrapText(ctx, content.title, W - marginX * 2).slice(0, 3).forEach(l => { ctx.fillText(l, marginX, y); y += 72; });

    y += 36;
    let fontSize = 40, storyLines;
    const maxStoryHeight = H - y - 380;
    do {
      ctx.font = '400 ' + fontSize + 'px "Space Mono", monospace';
      storyLines = wrapText(ctx, content.story, W - marginX * 2);
      if (storyLines.length * (fontSize * 1.65) <= maxStoryHeight || fontSize <= 24) break;
      fontSize -= 2;
    } while (true);
    const lineHeight = fontSize * 1.65;
    ctx.fillStyle = '#d8d4c9';
    storyLines.forEach(l => { ctx.fillText(l, marginX, y); y += lineHeight; });

    const footerY = H - 260;
    ctx.strokeStyle = 'rgba(232,229,221,0.15)';
    ctx.beginPath(); ctx.moveTo(marginX, footerY); ctx.lineTo(W - marginX, footerY); ctx.stroke();

    ctx.fillStyle = 'rgba(232,229,221,0.55)';
    ctx.font = '400 22px "Space Mono", monospace';
    ctx.fillText(u.cardAsOf + ' ' + content.asOfDate, marginX, footerY + 46);
    ctx.fillText(u.cardMadeOn + ' ' + content.madeDate, marginX, footerY + 80);

    ctx.fillStyle = '#c9a45c';
    ctx.font = '700 56px "Caveat", cursive';
    ctx.fillText('Paul Bhang', marginX, footerY + 162);

    ctx.fillStyle = 'rgba(232,229,221,0.7)';
    ctx.font = '400 24px "Space Mono", monospace';
    ctx.fillText('wensonjabi.com', marginX, footerY + 202);

    if (lang === 'zh' && content.qrImg) {
      const qrSize = 150;
      ctx.drawImage(content.qrImg, W - marginX - qrSize, footerY + 20, qrSize, qrSize);
      ctx.fillStyle = 'rgba(232,229,221,0.55)';
      ctx.font = '400 18px "Space Mono", monospace';
      const capW = ctx.measureText(u.cardQrCaption).width;
      ctx.fillText(u.cardQrCaption, W - marginX - Math.max(capW, qrSize) / 2 - Math.min(capW, qrSize) / 2, footerY + 195);
    }

    return canvas;
  }

  function downloadCanvas(canvas, lang) {
    try {
      const url = canvas.toDataURL('image/png');
      const a = document.createElement('a');
      a.href = url; a.download = 'fragments-of-thought-' + lang + '.png';
      document.body.appendChild(a); a.click(); a.remove();
    } catch (e) { alert(UI[LANG].cardGenError); }
  }

  function canvasToBlob(canvas) {
    return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
  }

  async function shareCanvas(canvas, lang, btn) {
    try {
      const blob = await canvasToBlob(canvas);
      if (!blob) throw new Error('no-blob');
      const file = new File([blob], 'fragments-of-thought-' + lang + '.png', { type: 'image/png' });
      if (navigator.canShare && !navigator.canShare({ files: [file] })) {
        downloadCanvas(canvas, lang);
        return;
      }
      await navigator.share({ files: [file], title: 'Fragments of Thought', url: SHARE_URL });
      const prev = btn.textContent;
      btn.textContent = UI[LANG].cardShared;
      setTimeout(() => { btn.textContent = prev; }, 1600);
    } catch (e) {
      if (e && e.name !== 'AbortError') downloadCanvas(canvas, lang);
    }
  }

  async function openCardMaker(ids) {
    if (!ids.length) return;
    const panel = document.getElementById('card-maker');
    const myToken = ++cmToken;
    panel.style.display = 'block';
    panel.innerHTML = '<div class="cm-status">' + UI[LANG].cardGenerating + '</div>';
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    try {
      const content = await getTrilingualCardText(ids);
      if (myToken !== cmToken) return;

      const today = new Date();
      const dateStr = today.getFullYear() + '.' + String(today.getMonth() + 1).padStart(2, '0') + '.' + String(today.getDate()).padStart(2, '0');
      const asOfDate = (D.profile && D.profile.contentAsOf) || dateStr;

      try {
        await Promise.all([
          document.fonts.load('700 62px "Archivo Black"'),
          document.fonts.load('400 40px "Space Mono"'),
          document.fonts.load('700 56px "Caveat"'),
        ]);
      } catch (e) {}

      let qrImg = null;
      try { qrImg = await loadImage('https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(SHARE_URL)); } catch (e) {}
      if (myToken !== cmToken) return;

      const langs = ['ko', 'en', 'zh'];
      const canvases = {};
      for (const l of langs) {
        canvases[l] = await drawCard(l, Object.assign({}, content[l], { asOfDate, madeDate: dateStr, qrImg: l === 'zh' ? qrImg : null }));
      }
      if (myToken !== cmToken) return;

      panel.innerHTML =
        '<div class="cm-head"><span class="cm-title">' + UI[LANG].cardMakerTitle + '</span>' +
        '<button class="cm-close" type="button" id="cm-close-btn">✕ ' + UI[LANG].cardClose + '</button></div>' +
        '<div class="cm-row" id="cm-row"></div>';
      const row = document.getElementById('cm-row');
      langs.forEach(l => {
        const wrap = document.createElement('div');
        wrap.className = 'cm-card';
        wrap.appendChild(canvases[l]);
        const langLabel = document.createElement('div');
        langLabel.className = 'cm-lang';
        langLabel.textContent = UI[LANG].cardLangLabel[l];
        wrap.appendChild(langLabel);
        const btns = document.createElement('div');
        btns.className = 'cm-btns';
        const dlBtn = document.createElement('button');
        dlBtn.type = 'button'; dlBtn.textContent = UI[LANG].cardDownload;
        dlBtn.addEventListener('click', () => downloadCanvas(canvases[l], l));
        btns.appendChild(dlBtn);
        if (navigator.share) {
          const shBtn = document.createElement('button');
          shBtn.type = 'button'; shBtn.textContent = UI[LANG].cardShare;
          shBtn.addEventListener('click', () => shareCanvas(canvases[l], l, shBtn));
          btns.appendChild(shBtn);
        }
        wrap.appendChild(btns);
        row.appendChild(wrap);
      });
      document.getElementById('cm-close-btn').addEventListener('click', closeCardMaker);
    } catch (e) {
      if (myToken !== cmToken) return;
      panel.innerHTML = '<div class="cm-status">' + UI[LANG].cardGenError + '</div>';
    }
  }

  document.getElementById('synthesis').addEventListener('click', e => {
    if (e.target.closest('#card-make-btn')) openCardMaker(state.selected.slice());
  });

  window.__pb = { state, toggleSelect, nodeById, setLanguage };

  // 설치된 폰 앱(standalone)으로 열었을 때만 "앱으로 돌아가기" 링크 노출 — 일반 방문자에게는 안 보임
  if (window.matchMedia('(display-mode: standalone)').matches) {
    document.getElementById('p-app-back').style.display = 'inline-block';
  }

  window.addEventListener('resize', resize);
  renderStaticText();
  resize(); initParticles(); renderSynthesis(); renderFeed(); stepLoop();
  fetchRemoteThoughts();
})();
</script>
