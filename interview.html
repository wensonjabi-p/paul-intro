<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>Paul 인터뷰 노트</title>
<meta name="theme-color" content="#050419">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="인터뷰">
<style>
  :root {
    --bg: #050419; --ink: #edebe6; --accent: #d4a24e;
    --bg-soft: color-mix(in srgb, var(--ink) 8%, var(--bg));
    --muted: color-mix(in srgb, var(--ink) 55%, var(--bg));
    --faint: color-mix(in srgb, var(--ink) 32%, var(--bg));
    --line: color-mix(in srgb, var(--ink) 9%, transparent);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); height: 100%; overflow: hidden; }
  body {
    color: var(--ink); font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
    line-height: 1.6; -webkit-font-smoothing: antialiased;
  }

  .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 640px; margin: 0 auto; }

  header { flex-shrink: 0; padding: 14px 16px 10px; border-bottom: 1px solid var(--line); }
  .header-row { display: flex; justify-content: space-between; align-items: center; }
  .brand { font-size: 12px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; font-weight: 600; }
  .header-links { display: flex; gap: 8px; }
  .header-links a { color: var(--muted); font-size: 11.5px; text-decoration: none; padding: 5px 10px; border-radius: 12px; background: var(--bg-soft); border: 1px solid var(--line); }
  .status-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 11.5px; color: var(--muted); }

  .chip {
    background: none; border: 1px solid var(--line); color: var(--muted); font-family: inherit;
    font-size: 12px; padding: 6px 12px; border-radius: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
  }
  .chip.ghost:active { background: rgba(237,235,230,0.06); }
  .chip.sel { border-color: var(--accent); color: var(--accent); background: rgba(212,162,78,0.1); }
  .chip.primary { border-color: var(--accent); color: var(--accent); background: rgba(212,162,78,0.1); font-weight: 600; }

  .thread { flex: 1; overflow-y: auto; padding: 14px 16px 10px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
  .empty-hint { align-self: center; color: var(--faint); font-size: 12.5px; text-align: center; margin: 30px 20px; line-height: 1.6; }
  .divider { align-self: center; font-size: 10.5px; color: var(--faint); letter-spacing: 0.03em; margin: 4px 0; }

  .msg-row { display: flex; align-items: flex-end; gap: 7px; max-width: 86%; }
  .msg-row.ai { align-self: flex-start; flex-direction: row; }
  .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
  .avatar {
    flex-shrink: 0; width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
  }
  .avatar.ai { background: var(--bg-soft); color: var(--accent); border: 1px solid var(--line); }
  .avatar.user { background: var(--accent); color: var(--bg); }

  .msg { min-width: 0; padding: 10px 13px; border-radius: 16px; font-size: 14px; line-height: 1.55; word-break: break-word; }
  .msg.ai { background: var(--bg-soft); border-bottom-left-radius: 5px; }
  .msg.user { background: rgba(212,162,78,0.14); border: 1px solid rgba(212,162,78,0.4); border-bottom-right-radius: 5px; }
  .msg.confirm { border-left: 2px solid var(--accent); }
  .msg-tag { font-size: 10px; color: var(--faint); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 4px; }
  .msg-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
  .voice-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; font-size: 11px; color: var(--muted); }
  .wave { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
  .wave span { width: 2px; background: var(--accent); display: block; }
  .photo-thumb { width: 150px; max-height: 110px; object-fit: cover; border-radius: 10px; margin-bottom: 6px; display: block; }

  .later-wrap { flex-shrink: 0; padding: 0 16px; }
  .later-toggle { background: none; border: none; color: var(--faint); font-size: 11.5px; text-decoration: underline; cursor: pointer; font-family: inherit; padding: 6px 0; }
  .later-item { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 8px 0; border-top: 1px solid var(--line); font-size: 12.5px; }
  .later-item .lt { color: var(--muted); flex: 1; }
  .later-item button { background: none; border: 1px solid var(--line); color: var(--muted); font-family: inherit; font-size: 10.5px; padding: 5px 9px; border-radius: 7px; cursor: pointer; white-space: nowrap; }

  .composer { flex-shrink: 0; display: flex; align-items: flex-end; gap: 10px; padding: 14px 14px calc(14px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); background: var(--bg); }
  .composer textarea {
    flex: 1; background: var(--bg-soft); border: 1px solid var(--line); border-radius: 20px; color: var(--ink);
    font-family: inherit; font-size: 15.5px; padding: 13px 17px; resize: none; min-height: 48px; max-height: 140px; overflow-y: auto;
  }
  .composer textarea:focus { outline: none; border-color: var(--accent); }
  .round-btn {
    flex-shrink: 0; width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--line); background: var(--bg-soft);
    color: var(--muted); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .round-btn.mic.rec { border-color: var(--accent); color: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
  .round-btn.send { background: var(--accent); color: var(--bg); border: none; }

  .theme-panel { flex-shrink: 0; padding: 12px 16px; border-bottom: 1px solid var(--line); background: var(--bg-soft); display: flex; flex-direction: column; gap: 10px; }
  .theme-swatches { display: flex; flex-wrap: wrap; gap: 8px; }
  .theme-swatch { border-radius: 12px; padding: 8px 12px; font-family: inherit; font-size: 11.5px; cursor: pointer; }
  .theme-custom { display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--muted); }
  .theme-custom label { display: flex; align-items: center; gap: 6px; }
  .theme-custom input[type=color] { width: 30px; height: 30px; border: 1px solid var(--line); border-radius: 8px; background: none; padding: 0; cursor: pointer; }

  .toast {
    position: fixed; left: 50%; bottom: 100px; transform: translateX(-50%) translateY(10px);
    background: var(--ink); color: var(--bg); font-size: 13px; font-weight: 600; padding: 11px 18px;
    border-radius: 22px; opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 20;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #offlineBar {
    display: none; flex-shrink: 0; background: #3a2a10; color: #e8c37a;
    font-size: 12px; font-weight: 600; text-align: center; padding: 8px 14px; letter-spacing: 0.02em;
  }
  #offlineBar.show { display: block; }
  #offlineBar .n { background: rgba(232,195,122,0.18); border-radius: 10px; padding: 1px 8px; margin-left: 6px; }
</style>
</head>
<body>
<div class="app">
  <div id="offlineBar">📡 오프라인 — 답변은 계속 저장되고, 연결되면 자동으로 동기화돼요<span class="n" id="pendingN" style="display:none"></span></div>
  <header>
    <div class="header-row">
      <div class="brand">Fragments of Thought</div>
      <div class="header-links">
        <a href="index.html">공개 페이지</a>
        <a href="admin.html">관리자</a>
      </div>
    </div>
    <div class="status-row">
      <span id="queueInfo"></span>
      <div style="display:flex; gap:6px;">
        <button class="chip ghost" id="themeBtn" title="배경·글자색">🎨</button>
        <button class="chip ghost" id="pauseBtn"></button>
      </div>
    </div>
  </header>

  <div class="theme-panel" id="themePanel" style="display:none">
    <div class="theme-swatches" id="themeSwatches"></div>
    <div class="theme-custom">
      <label>배경 <input type="color" id="bgPicker"></label>
      <label>글자 <input type="color" id="inkPicker"></label>
      <button class="chip ghost" id="themeReset">기본값으로</button>
    </div>
  </div>

  <div class="thread" id="thread"></div>

  <div class="later-wrap">
    <button class="later-toggle" id="laterToggle" style="display:none"></button>
    <div id="laterList" style="display:none"></div>
  </div>

  <div class="composer">
    <button class="round-btn" id="photoBtn" title="사진 첨부">📷</button>
    <textarea id="composerInput" rows="2" placeholder="편하게 답해보세요…"></textarea>
    <button class="round-btn mic" id="micBtn" title="음성으로 말하기">🎤</button>
    <button class="round-btn send" id="sendMsgBtn" style="display:none" title="보내기">➤</button>
    <input type="file" id="photoFile" accept="image/*" style="display:none" />
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="interview-questions.js"></script>
<script>
(function () {
  const DATA = window.INTERVIEW || { questions: [], pool: [], updated: '' };
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const TIER_LABEL = { light: '가볍게', deep: '더 깊이', fact: '사실·맥락' };
  const REACT_LINES = [
    '좋은 순간이네요. 그냥 기록해둘까요, 짧게 이야기로 남겨볼까요?',
    '기록해두면 나중에 좋은 조각이 될 것 같아요. 어떻게 남길까요?',
    '이 느낌, 그냥 담아둘까요 아니면 조금 더 풀어볼까요?',
  ];
  const STOP_PHRASES = ['그만할', '그만 할', '그만하고 싶', '여기까지', '오늘은 이만', '오늘은 여기까지', '끝낼', '종료할', '다음에 할게', '나중에 할게'];
  const SKIP_PHRASES = ['다른 질문', '다른거 물어', '다른 거 물어', '패스할', '스킵', '건너뛸', '건너뛰어', '그냥 넘어가', '그냥 다음'];
  const META_YES = /올리|업로드|보내|전송|이어서|계속|맞아|좋아|그래|^응[.,!]?$|^네[.,!]?$/;
  const META_NO = /아직|나중에|새로운|새로\s?(이야기|얘기)|다른\s?(이야기|얘기)|말고|괜찮|안\s?할래/;
  const FRESH_RETURN_MS = 30 * 60 * 1000;

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2400);
  }

  /* ---------- 연결 상태 표시 ---------- */
  let isOnline = navigator.onLine;
  function setOnlineState(ok) {
    if (ok === isOnline) { updatePendingBadgeSafe(); return; }
    isOnline = ok;
    document.getElementById('offlineBar').classList.toggle('show', !ok);
    updatePendingBadgeSafe();
    if (ok) flushPending();
  }
  function updatePendingBadgeSafe() { if (typeof updatePendingBadge === 'function') updatePendingBadge(); }
  window.addEventListener('online', () => setOnlineState(true));
  window.addEventListener('offline', () => setOnlineState(false));

  const LS = {
    get(k) { try { return localStorage.getItem(k); } catch (e) { return null; } },
    set(k, v) { try { localStorage.setItem(k, v); } catch (e) {} },
    del(k) { try { localStorage.removeItem(k); } catch (e) {} },
  };
  function loadArr(k) { try { return JSON.parse(LS.get(k)) || []; } catch (e) { return []; } }
  function saveArr(k, a) { LS.set(k, JSON.stringify(a)); }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  /* ---------- 배경·글자색 테마 (눈이 편한 색으로 직접 고를 수 있게) ---------- */
  const DEFAULT_THEME = { bg: '#050419', ink: '#edebe6' };
  const THEMES = [
    { name: '다크', bg: '#050419', ink: '#edebe6' },
    { name: '세피아', bg: '#1a1512', ink: '#e8dcc8' },
    { name: '화이트', bg: '#ffffff', ink: '#1a1a1a' },
    { name: '그레이', bg: '#1c1c1e', ink: '#d6d6db' },
    { name: '라이트', bg: '#f5f0e6', ink: '#2a2620' },
  ];
  function applyTheme(bg, ink) {
    document.documentElement.style.setProperty('--bg', bg);
    document.documentElement.style.setProperty('--ink', ink);
  }
  function loadTheme() { try { return JSON.parse(LS.get('iv-theme')); } catch (e) { return null; } }
  function saveTheme(bg, ink) { LS.set('iv-theme', JSON.stringify({ bg, ink })); }
  const savedTheme = loadTheme();
  if (savedTheme) applyTheme(savedTheme.bg, savedTheme.ink);

  /* ---------- dynamic question pool (followups + pool rotations, persisted) ---------- */
  function dynPool() { return loadArr('iv-dyn'); }
  function addDyn(qs) { const d = dynPool(); qs.forEach(q => d.push(q)); saveArr('iv-dyn', d); }
  function qById(id) { return DATA.questions.find(q => q.id === id) || dynPool().find(q => q.id === id); }

  function freshPoolQuestion(preferTokens) {
    const used = new Set([...DATA.questions.map(q => q.q), ...dynPool().map(q => q.q)]);
    const avail = (DATA.pool || []).filter(p => !used.has(p.q));
    let cand = null;
    if (preferTokens && preferTokens.length) {
      cand = avail.find(p => nodeTokens(p.node).some(t => preferTokens.includes(t)));
    }
    if (!cand) cand = avail[0];
    if (!cand) return null;
    const q = Object.assign({}, cand, { id: 'pool-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6) });
    addDyn([q]);
    return q;
  }

  function nodeTokens(nodeStr) { return (nodeStr || '').split('·').map(s => s.trim()).filter(Boolean); }

  function pullRelated(nodeStr) {
    const tokens = nodeTokens(nodeStr);
    if (!tokens.length) return null;
    for (let i = 0; i < queue.length; i++) {
      const q = qById(queue[i]);
      if (q && nodeTokens(q.node).some(t => tokens.includes(t))) return queue.splice(i, 1)[0];
    }
    const p = freshPoolQuestion(tokens);
    return p ? p.id : null;
  }

  /* 자유롭게 말한 "오늘 하고 싶은 이야기"에서 관련 질문을 찾는다 — AI 호출 없이 태그/문장 매칭만 사용. */
  function findQuestionByHint(hint) {
    const h = (hint || '').trim();
    if (!h) return null;
    const words = h.split(/[\s,·]+/).filter(Boolean).map(w => w.toLowerCase());
    function matches(q) {
      if ((q.q || '').includes(h)) return true;
      const toks = nodeTokens(q.node).map(t => t.toLowerCase());
      return toks.some(t => words.some(w => t.includes(w) || w.includes(t)));
    }
    let hit = DATA.questions.find(matches);
    if (hit) return hit.id;
    hit = dynPool().find(matches);
    if (hit) return hit.id;
    hit = (DATA.pool || []).find(matches);
    if (hit) {
      const used = new Set([...DATA.questions.map(q => q.q), ...dynPool().map(q => q.q)]);
      if (used.has(hit.q)) return null;
      const withId = Object.assign({}, hit, { id: 'pool-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6) });
      addDyn([withId]);
      return withId.id;
    }
    return null;
  }

  /* ---------- state ---------- */
  let current = LS.get('iv-current') || null;
  let queue = loadArr('iv-queue');
  let later = loadArr('iv-later');
  let paused = LS.get('iv-paused') === '1';
  let thread = loadArr('iv-thread');
  let pendingChoiceSelections = [];
  let awaitingTopicHint = false;
  const THREAD_RECENT_WINDOW = 24; // 열 때마다 매번 스크롤해서 내리는 게 귀찮다고 해서, 최근 것만 먼저 보여줌
  let threadRevealAll = false; // "이전 대화 보기"를 누르면 이번 세션 동안은 계속 전체 표시

  /* 마지막 메시지가 아직 답 안 한 continue-prompt/upload-prompt면, 다음에 자유롭게 타이핑한 답을
     엉뚱한 인터뷰 질문의 답으로 잘못 채워넣지 않고 이 프롬프트에 대한 답으로 해석한다. */
  let pendingMeta = null;
  (function restorePendingMeta() {
    const last = thread[thread.length - 1];
    if (last && !last.resolved && (last.kind === 'continue-prompt' || last.kind === 'upload-prompt')) {
      pendingMeta = { id: last.id, type: last.kind === 'continue-prompt' ? 'continue' : 'upload' };
    }
  })();

  // migrate from the old 3-slot card model if present
  const oldSlots = loadArr('iv-slots');
  if (!current && oldSlots.length) {
    current = oldSlots[0];
    queue = oldSlots.slice(1).concat(queue);
    LS.del('iv-slots');
  }

  function persist() { saveArr('iv-queue', queue); saveArr('iv-later', later); LS.set('iv-current', current || ''); }
  function persistThread() {
    if (thread.length > 300) thread = thread.slice(-200);
    saveArr('iv-thread', thread);
  }

  // first-run seed
  if (!current && !queue.length && !LS.get('iv-init')) {
    queue = DATA.questions.map(q => q.id);
    current = queue.shift() || null;
    LS.set('iv-init', '1');
    persist();
  }

  function pickNext() {
    if (paused) return null;
    for (let guard = 0; guard < 50; guard++) {
      let nextId = queue.shift();
      if (!nextId) {
        const p = freshPoolQuestion();
        if (!p) return null;
        nextId = p.id;
      }
      if (qById(nextId)) return nextId;
    }
    return null;
  }

  /* ---------- 하루치 답변 누적: 자연스럽게 "그만할게" 라고 말하면 그때 정리해서 물어본다 ---------- */
  function sessionList() { return loadArr('iv-session'); }
  function addToSession(item) { const s = sessionList(); s.push(item); saveArr('iv-session', s); }

  /* ---------- 오프라인 대비 ---------- */
  function pendingList() { return loadArr('iv-pending'); }
  function savePending(p) { saveArr('iv-pending', p); updatePendingBadge(); }
  function updatePendingBadge() {
    const n = pendingList().length;
    const el = document.getElementById('pendingN');
    if (!el) return;
    if (n > 0) { el.textContent = n + '개 대기'; el.style.display = 'inline'; }
    else el.style.display = 'none';
  }

  async function syncToServer(items) {
    try {
      const r = await fetch('/api/interview-save', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ savedAt: Date.now(), items }) });
      if (!r.ok) throw new Error('bad status');
      setOnlineState(true);
      return true;
    } catch (e) {
      setOnlineState(false);
      const p = pendingList();
      p.push({ type: 'interview', savedAt: Date.now(), items });
      savePending(p);
      return false;
    }
  }

  async function flushPending() {
    const p = pendingList();
    if (!p.length) return;
    const remain = [];
    for (const entry of p) {
      try {
        let r;
        if (entry.type === 'thought') {
          r = await fetch('/api/thoughts', { method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: entry.text, dataUrl: entry.dataUrl, tags: entry.tags }) });
        } else {
          r = await fetch('/api/interview-save', { method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ savedAt: entry.savedAt, items: entry.items }) });
        }
        if (!r.ok) throw new Error('bad status');
      } catch (e) { remain.push(entry); }
    }
    savePending(remain);
    setOnlineState(true);
    if (remain.length < p.length) toast('밀려있던 기록 ' + (p.length - remain.length) + '개 동기화했어요');
  }

  /* ---------- AI 의도 판단 + 후속 질문 ----------
     범용 문장("그거 말고 다른 얘기", "지금까지 정리해줘", "잠깐만", 잡담 등)이 엉뚱한 질문의 답으로
     잘못 저장되지 않도록, 먼저 이 메시지가 진짜 답변인지 다른 의도인지 판단한 뒤(answer가 아니면
     저장하지 않음), 답변일 때만 그 자리에서 후속 질문까지 같이 받아온다 — 왕복 한 번으로 처리.
     현재 질문+방금 답변만 봐서는 "아까 그거", "그것도 비슷했어" 같은 대명사·생략을 못 알아듣기 때문에,
     직전 대화 몇 턴을 함께 보내서 맥락을 반영하게 한다. */
  function recentHistoryForAI(limit) {
    const KEEP = { question: 1, answer: 1, confirm: 1 };
    return thread
      .filter(m => KEEP[m.kind])
      .slice(-limit)
      .map(m => ({ role: m.role === 'user' ? 'user' : 'ai', text: m.text }));
  }

  async function classifyReply(q, answerText) {
    try {
      const r = await fetch('/api/generate-followup', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q.q, answer: answerText, node: q.node, history: recentHistoryForAI(12) }),
      });
      if (!r.ok) return null;
      const d = await r.json();
      if (!d.intent) return null;
      if (d.intent === 'answer') {
        if (!d.followup) return null;
        return { intent: 'answer', followup: Object.assign({}, d.followup, { id: 'ai-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6) }) };
      }
      return { intent: d.intent, reply: d.reply || null, topicHint: d.topicHint || null };
    } catch (e) { return null; }
  }

  /* ---------- 스레드 ---------- */
  function grow(ta) { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 110) + 'px'; }
  function scrollThreadToBottom() {
    const el = document.getElementById('thread');
    requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
  }
  function appendMessage(msg) {
    msg.ts = msg.ts || Date.now();
    thread.push(msg);
    persistThread();
    renderThread();
    scrollThreadToBottom();
  }
  function appendMessageIfNew(msg) {
    const last = thread[thread.length - 1];
    if (last && last.id === msg.id) return;
    appendMessage(msg);
  }
  function removeGhost() {
    const last = thread[thread.length - 1];
    if (last && last.kind === 'ghost') { thread.pop(); persistThread(); renderThread(); }
  }
  function formatDivider(ts) {
    const d = new Date(ts), now = new Date();
    if (d.toDateString() === now.toDateString()) {
      return '오늘 ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    }
    return (d.getMonth() + 1) + '월 ' + d.getDate() + '일';
  }

  function toggleChoiceChip(ch) {
    const i = pendingChoiceSelections.indexOf(ch);
    if (i >= 0) pendingChoiceSelections.splice(i, 1); else pendingChoiceSelections.push(ch);
    composerInput.value = pendingChoiceSelections.join(', ');
    grow(composerInput); updateComposerButtons();
    renderThread();
  }

  function laterCurrent() {
    if (!current) return;
    later.unshift(current);
    current = null; pendingChoiceSelections = [];
    persist();
    ensureCurrent();
  }
  function skipCurrent() {
    if (!current) return;
    current = null; pendingChoiceSelections = [];
    persist();
    ensureCurrent();
  }

  async function resolveCapture(msg, mode) {
    const { text, photo } = msg.captureRef;
    if (mode === 'quick') {
      const payload = { text: text || '(사진)', dataUrl: photo, tags: [] };
      try {
        const r = await fetch('/api/thoughts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (!r.ok) throw new Error('bad status');
        setOnlineState(true);
        toast('기록했어요');
      } catch (e) {
        setOnlineState(false);
        const p = pendingList(); p.push(Object.assign({ type: 'thought' }, payload)); savePending(p);
        toast('오프라인 — 연결되면 자동으로 저장돼요');
      }
    } else {
      addToSession({ node: 'capture', question: '(사진과 함께 남긴 생각)', answer: text || '(사진)', mode: photo ? 'photo' : 'text' });
      toast('오늘 이야기에 담았어요');
    }
    msg.resolved = true; persistThread(); renderThread();
  }

  function clearPendingMeta(msgId) {
    if (pendingMeta && pendingMeta.id === msgId) pendingMeta = null;
  }

  async function resolveUpload(msg, doSend) {
    msg.resolved = true; persistThread(); renderThread();
    clearPendingMeta(msg.id);
    if (doSend) {
      const items = sessionList();
      const ok = await syncToServer(items);
      saveArr('iv-session', []);
      appendMessage({ id: 'sent-' + Date.now(), role: 'ai', kind: 'system', text: ok ? '정리해서 보냈어요. 고마워요.' : '오프라인이네요 — 연결되면 자동으로 보낼게요.' });
    } else {
      appendMessage({ id: 'keep-' + Date.now(), role: 'ai', kind: 'system', text: '네, 그대로 남겨둘게요.' });
    }
    if (msg.chainContinue) askContinueOrNew();
  }

  function resolveContinue(msg, doContinue) {
    msg.resolved = true; persistThread(); renderThread();
    clearPendingMeta(msg.id);
    if (!doContinue) {
      if (current) { later.unshift(current); current = null; persist(); }
      askTopic();
    } else {
      ensureCurrent();
    }
  }

  function offerWrapUp() {
    const items = sessionList();
    if (!items.length) {
      appendMessage({ id: 'stopnote-' + Date.now(), role: 'ai', kind: 'system', text: '오늘은 아직 정리할 이야기가 없어요. 언제든 다시 이야기해요.' });
    } else {
      const topics = [...new Set(items.map(i => i.node))].slice(0, 4).join(', ');
      const id = 'wrap-' + Date.now();
      appendMessage({ id, role: 'ai', kind: 'upload-prompt', text: '오늘은 ' + topics + ' 이야기를 나눴어요 (' + items.length + '개). 정리해서 보내드릴까요?', chainContinue: false });
      pendingMeta = { id, type: 'upload' };
    }
  }

  function offerRecap() {
    const items = sessionList();
    if (!items.length) {
      appendMessage({ id: 'recap-' + Date.now(), role: 'ai', kind: 'system', text: '오늘은 아직 정리할 만큼 나눈 이야기가 없어요.' });
      return;
    }
    const topics = [...new Set(items.map(i => i.node))].slice(0, 8).join(', ');
    appendMessage({ id: 'recap-' + Date.now(), role: 'ai', kind: 'system', text: '지금까지 오늘은 ' + topics + ' 이야기를 나눴어요 (' + items.length + '개). 계속 이어갈까요?' });
  }

  async function handleStopIntent(val, wasVoice) {
    appendMessage({ id: 'stop-' + Date.now() + '-' + Math.random().toString(36).slice(2, 5), role: 'user', kind: 'answer', text: val, voice: wasVoice });
    offerWrapUp();
  }

  function startSessionGreeting() {
    const items = sessionList();
    if (items.length) {
      const topics = [...new Set(items.map(i => i.node))].slice(0, 4).join(', ');
      const id = 'greet-upload-' + Date.now();
      appendMessage({ id, role: 'ai', kind: 'upload-prompt', text: '지난번엔 ' + topics + ' 이야기를 나눴었네요 (' + items.length + '개). 정리해서 올릴까요?', chainContinue: true });
      pendingMeta = { id, type: 'upload' };
    } else {
      askContinueOrNew();
    }
  }
  function askContinueOrNew() {
    if (!current) { askTopic(); return; }
    const q = qById(current);
    const label = q ? ('"' + q.q + '"') : '저번 이야기';
    const id = 'greet-continue-' + Date.now();
    appendMessage({ id, role: 'ai', kind: 'continue-prompt', text: label + '에 이어서 할까요, 새로운 이야기로 해볼까요?' });
    pendingMeta = { id, type: 'continue' };
  }
  function askTopic() {
    appendMessage({ id: 'greet-topic-' + Date.now(), role: 'ai', kind: 'system', text: '오늘은 어떤 이야기를 하고 싶으세요? 편하게 답해주세요 — 아니면 그냥 다음 질문으로 넘어가도 좋아요.' });
    awaitingTopicHint = true;
  }

  function renderMsg(msg) {
    if (msg.kind === 'system') {
      const s = document.createElement('div'); s.className = 'divider'; s.textContent = msg.text; return s;
    }
    const isAi = msg.role === 'ai';
    const msgRow = document.createElement('div');
    msgRow.className = 'msg-row ' + (isAi ? 'ai' : 'user');
    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + (isAi ? 'ai' : 'user');
    avatar.textContent = isAi ? '✦' : 'P';
    msgRow.appendChild(avatar);

    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (isAi ? 'ai' : 'user') + (msg.kind === 'confirm' ? ' confirm' : '');
    if (msg.kind === 'ghost') wrap.style.opacity = '0.55';

    if (msg.tierLabel) {
      const tag = document.createElement('div'); tag.className = 'msg-tag';
      tag.textContent = msg.tierLabel + (msg.node ? ' · ' + msg.node : '');
      wrap.appendChild(tag);
    }
    if (msg.kind === 'answer' && msg.voice) {
      const vm = document.createElement('div'); vm.className = 'voice-meta';
      const bars = Array.from({ length: 5 }).map(() => '<span style="height:' + (4 + Math.round(Math.random() * 8)) + 'px"></span>').join('');
      vm.innerHTML = '🎤 <span class="wave">' + bars + '</span>';
      wrap.appendChild(vm);
    }
    if (msg.photo) {
      const img = document.createElement('img'); img.className = 'photo-thumb'; img.src = msg.photo;
      wrap.appendChild(img);
    }
    if (msg.text) {
      const t = document.createElement('div'); t.textContent = msg.text; t.style.whiteSpace = 'pre-wrap';
      wrap.appendChild(t);
    }

    if (msg.kind === 'question' && msg.qid === current) {
      if (msg.choices && msg.choices.length) {
        const row = document.createElement('div'); row.className = 'msg-chips';
        msg.choices.forEach(ch => {
          const c = document.createElement('button'); c.type = 'button';
          c.className = 'chip' + (pendingChoiceSelections.includes(ch) ? ' sel' : ''); c.textContent = ch;
          c.addEventListener('click', () => toggleChoiceChip(ch));
          row.appendChild(c);
        });
        wrap.appendChild(row);
      }
      const actions = document.createElement('div'); actions.className = 'msg-chips';
      const laterBtn = document.createElement('button'); laterBtn.type = 'button'; laterBtn.className = 'chip ghost'; laterBtn.textContent = '⏰ 나중에';
      laterBtn.addEventListener('click', laterCurrent);
      const skipBtn = document.createElement('button'); skipBtn.type = 'button'; skipBtn.className = 'chip ghost'; skipBtn.textContent = '🗑 건너뛰기';
      skipBtn.addEventListener('click', skipCurrent);
      actions.appendChild(laterBtn); actions.appendChild(skipBtn);
      wrap.appendChild(actions);
    } else if (msg.kind === 'confirm' && !msg.resolved) {
      const row = document.createElement('div'); row.className = 'msg-chips';
      const yes = document.createElement('button'); yes.type = 'button'; yes.className = 'chip primary'; yes.textContent = '맞아요';
      yes.addEventListener('click', () => { msg.resolved = true; persistThread(); renderThread(); });
      const no = document.createElement('button'); no.type = 'button'; no.className = 'chip ghost'; no.textContent = '다르게 말할게요';
      no.addEventListener('click', () => { msg.resolved = true; persistThread(); renderThread(); composerInput.focus(); });
      row.appendChild(yes); row.appendChild(no);
      wrap.appendChild(row);
    } else if (msg.kind === 'react' && !msg.resolved) {
      const row = document.createElement('div'); row.className = 'msg-chips';
      const quick = document.createElement('button'); quick.type = 'button'; quick.className = 'chip primary'; quick.textContent = '그냥 기록';
      quick.addEventListener('click', () => resolveCapture(msg, 'quick'));
      const story = document.createElement('button'); story.type = 'button'; story.className = 'chip ghost'; story.textContent = '이야기로';
      story.addEventListener('click', () => resolveCapture(msg, 'story'));
      row.appendChild(quick); row.appendChild(story);
      wrap.appendChild(row);
    } else if (msg.kind === 'upload-prompt' && !msg.resolved) {
      const row = document.createElement('div'); row.className = 'msg-chips';
      const yes = document.createElement('button'); yes.type = 'button'; yes.className = 'chip primary'; yes.textContent = '올려주세요';
      yes.addEventListener('click', () => resolveUpload(msg, true));
      const no = document.createElement('button'); no.type = 'button'; no.className = 'chip ghost'; no.textContent = '아직이요';
      no.addEventListener('click', () => resolveUpload(msg, false));
      row.appendChild(yes); row.appendChild(no);
      wrap.appendChild(row);
    } else if (msg.kind === 'continue-prompt' && !msg.resolved) {
      const row = document.createElement('div'); row.className = 'msg-chips';
      const cont = document.createElement('button'); cont.type = 'button'; cont.className = 'chip primary'; cont.textContent = '이어서 할래요';
      cont.addEventListener('click', () => resolveContinue(msg, true));
      const fresh = document.createElement('button'); fresh.type = 'button'; fresh.className = 'chip ghost'; fresh.textContent = '새로운 이야기로';
      fresh.addEventListener('click', () => resolveContinue(msg, false));
      row.appendChild(cont); row.appendChild(fresh);
      wrap.appendChild(row);
    }
    msgRow.appendChild(wrap);
    return msgRow;
  }

  function renderThread() {
    const el = document.getElementById('thread');
    el.innerHTML = '';
    if (!thread.length) {
      const hint = document.createElement('div'); hint.className = 'empty-hint';
      hint.textContent = '인터뷰를 시작해볼까요? 아래에 답을 적거나, 마이크·카메라를 눌러보세요.';
      el.appendChild(hint);
      return;
    }

    const hiddenCount = thread.length - THREAD_RECENT_WINDOW;
    const collapsed = !threadRevealAll && hiddenCount > 0;
    const visibleThread = collapsed ? thread.slice(-THREAD_RECENT_WINDOW) : thread;

    if (collapsed) {
      const moreBtn = document.createElement('button');
      moreBtn.type = 'button';
      moreBtn.style.cssText = 'align-self:center; background:none; border:1px solid var(--line); color:var(--faint); font-family:inherit; font-size:11.5px; padding:6px 14px; border-radius:14px; cursor:pointer; margin-bottom:6px;';
      moreBtn.textContent = '↑ 이전 대화 보기 (' + hiddenCount + '개)';
      moreBtn.addEventListener('click', () => { threadRevealAll = true; renderThread(); });
      el.appendChild(moreBtn);
    }

    let lastDay = null;
    visibleThread.forEach((msg) => {
      const dayKey = new Date(msg.ts).toDateString();
      if (dayKey !== lastDay) {
        lastDay = dayKey;
        const d = document.createElement('div'); d.className = 'divider'; d.textContent = formatDivider(msg.ts);
        el.appendChild(d);
      }
      el.appendChild(renderMsg(msg));
    });
  }

  function renderStatusBar() {
    document.getElementById('queueInfo').textContent = paused ? '새 질문 안 받는 중 · 자유롭게 기록만' : ('다음 질문 대기 중 · ' + queue.length + '개');
    const pb = document.getElementById('pauseBtn');
    pb.textContent = paused ? '▶ 질문 다시 받기' : '⏸ 질문 그만 받기';
    pb.title = paused ? '눌러서 새 질문을 다시 받기 시작해요' : '눌러서 새 질문 받기를 멈춰요 — 사진·메모는 계속 남길 수 있어요';
    pb.classList.toggle('sel', paused);
  }

  function ensureCurrent() {
    if (!current && !paused) current = pickNext();
    persist();
    if (current) {
      const q = qById(current);
      if (q) {
        const qMsgId = 'q-' + q.id;
        if (!thread.some(m => m.id === qMsgId)) {
          appendMessage({ id: qMsgId, role: 'ai', kind: 'question', text: q.q, qid: q.id, node: q.node, choices: q.choices || null, tierLabel: TIER_LABEL[q.tier] || '' });
        } else {
          renderThread();
        }
      }
    } else if (paused) {
      appendMessageIfNew({ id: 'paused-note', role: 'ai', kind: 'system', text: '질문을 멈췄어요. 사진이나 생각은 언제든 남겨도 좋아요.' });
    } else {
      appendMessageIfNew({ id: 'empty-note', role: 'ai', kind: 'system', text: '질문이 바닥났어요 — 대단해요! 언제든 사진이나 생각을 남겨도 좋아요.' });
    }
    renderStatusBar();
  }

  function renderLater() {
    const toggle = document.getElementById('laterToggle');
    const list = document.getElementById('laterList');
    if (!later.length) { toggle.style.display = 'none'; list.style.display = 'none'; return; }
    toggle.style.display = 'block';
    toggle.textContent = '나중에 답할 질문 (' + later.length + ')' + (list.dataset.open === '1' ? ' 접기' : ' 펼치기');
    toggle.onclick = () => { list.dataset.open = list.dataset.open === '1' ? '0' : '1'; renderLater(); };
    list.style.display = list.dataset.open === '1' ? 'block' : 'none';
    if (list.dataset.open !== '1') return;
    list.innerHTML = '';
    later.forEach(id => {
      const q = qById(id); if (!q) return;
      const row = document.createElement('div'); row.className = 'later-item';
      row.innerHTML = '<span class="lt">' + escapeHtml(q.q) + '</span><button>다시 꺼내기</button>';
      row.querySelector('button').addEventListener('click', () => {
        later = later.filter(x => x !== id);
        queue.unshift(id);
        persist();
        if (!current) ensureCurrent(); else renderLater();
      });
      list.appendChild(row);
    });
  }

  /* ---------- 테마 패널 ---------- */
  const themePanel = document.getElementById('themePanel');
  const bgPicker = document.getElementById('bgPicker');
  const inkPicker = document.getElementById('inkPicker');
  bgPicker.value = savedTheme ? savedTheme.bg : DEFAULT_THEME.bg;
  inkPicker.value = savedTheme ? savedTheme.ink : DEFAULT_THEME.ink;

  const themeSwatchesEl = document.getElementById('themeSwatches');
  THEMES.forEach(t => {
    const b = document.createElement('button'); b.type = 'button'; b.className = 'theme-swatch';
    b.style.background = t.bg; b.style.color = t.ink; b.style.border = '1px solid ' + t.ink;
    b.textContent = t.name;
    b.addEventListener('click', () => {
      applyTheme(t.bg, t.ink); saveTheme(t.bg, t.ink);
      bgPicker.value = t.bg; inkPicker.value = t.ink;
    });
    themeSwatchesEl.appendChild(b);
  });

  function onCustomThemeChange() {
    applyTheme(bgPicker.value, inkPicker.value);
    saveTheme(bgPicker.value, inkPicker.value);
  }
  bgPicker.addEventListener('input', onCustomThemeChange);
  inkPicker.addEventListener('input', onCustomThemeChange);
  document.getElementById('themeReset').addEventListener('click', () => {
    applyTheme(DEFAULT_THEME.bg, DEFAULT_THEME.ink);
    saveTheme(DEFAULT_THEME.bg, DEFAULT_THEME.ink);
    bgPicker.value = DEFAULT_THEME.bg; inkPicker.value = DEFAULT_THEME.ink;
  });
  document.getElementById('themeBtn').addEventListener('click', () => {
    themePanel.style.display = themePanel.style.display === 'none' ? 'flex' : 'none';
  });

  document.getElementById('pauseBtn').addEventListener('click', () => {
    paused = !paused; LS.set('iv-paused', paused ? '1' : '0');
    ensureCurrent();
  });

  /* ---------- composer ---------- */
  const composerInput = document.getElementById('composerInput');
  const sendMsgBtn = document.getElementById('sendMsgBtn');
  const micBtn = document.getElementById('micBtn');
  const photoBtn = document.getElementById('photoBtn');
  const photoFile = document.getElementById('photoFile');

  function updateComposerButtons() {
    sendMsgBtn.style.display = composerInput.value.trim().length > 0 ? 'flex' : 'none';
  }
  composerInput.addEventListener('input', () => { grow(composerInput); updateComposerButtons(); });
  composerInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
      e.preventDefault();
      sendComposer();
    }
  });

  function resizeImage(file, maxDim, quality) {
    return new Promise((resolve, reject) => {
      const img = new Image(); const reader = new FileReader();
      reader.onload = e => { img.src = e.target.result; };
      reader.onerror = reject;
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
        else if (height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
        const c = document.createElement('canvas'); c.width = width; c.height = height;
        c.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  photoBtn.addEventListener('click', () => photoFile.click());
  photoFile.addEventListener('change', async e => {
    const f = e.target.files[0]; if (!f) return;
    photoFile.value = '';
    let dataUrl;
    try { dataUrl = await resizeImage(f, 1600, 0.82); } catch (err) { toast('사진을 불러오지 못했어요'); return; }
    const caption = composerInput.value.trim();
    composerInput.value = ''; grow(composerInput); updateComposerButtons();
    appendMessage({ id: 'photo-' + Date.now(), role: 'user', kind: 'capture', text: caption, photo: dataUrl });
    appendMessage({ id: 'react-' + Date.now(), role: 'ai', kind: 'react', text: REACT_LINES[Math.floor(Math.random() * REACT_LINES.length)], captureRef: { text: caption, photo: dataUrl } });
  });

  if (SR) {
    let rec = null, listening = false;
    micBtn.addEventListener('click', () => {
      if (listening) { rec && rec.stop(); return; }
      rec = new SR(); rec.lang = 'ko-KR'; rec.interimResults = true; rec.continuous = true;
      const base = composerInput.value ? composerInput.value + ' ' : '';
      rec.onresult = e => {
        let s = ''; for (let i = e.resultIndex; i < e.results.length; i++) s += e.results[i][0].transcript;
        composerInput.value = base + s; grow(composerInput);
      };
      rec.onend = () => { listening = false; micBtn.classList.remove('rec'); updateComposerButtons(); };
      rec.onerror = () => { listening = false; micBtn.classList.remove('rec'); updateComposerButtons(); };
      rec.start(); listening = true; micBtn.classList.add('rec');
    });
  } else {
    micBtn.addEventListener('click', () => { composerInput.focus(); toast('키보드의 🎤 마이크를 눌러 말하세요'); });
  }

  function isStopIntent(text) { return STOP_PHRASES.some(p => text.includes(p)); }
  function isSkipIntent(text) { return SKIP_PHRASES.some(p => text.includes(p)); }

  async function sendComposer() {
    const val = composerInput.value.trim();
    if (!val || sendMsgBtn.disabled) return;
    const wasVoice = micBtn.classList.contains('rec');
    sendMsgBtn.disabled = true;
    composerInput.value = ''; grow(composerInput); updateComposerButtons();

    if (isStopIntent(val)) {
      await handleStopIntent(val, wasVoice);
      sendMsgBtn.disabled = false;
      return;
    }

    if (pendingMeta) {
      const meta = pendingMeta;
      const metaMsg = thread.find(m => m.id === meta.id);
      appendMessage({ id: 'metareply-' + Date.now(), role: 'user', kind: 'answer', text: val, voice: wasVoice });
      const positive = META_YES.test(val) && !META_NO.test(val);
      if (metaMsg) {
        if (meta.type === 'upload') await resolveUpload(metaMsg, positive);
        else resolveContinue(metaMsg, positive);
      } else {
        pendingMeta = null;
      }
      sendMsgBtn.disabled = false;
      return;
    }

    if (current && isSkipIntent(val)) {
      appendMessage({ id: 'skipreply-' + Date.now(), role: 'user', kind: 'answer', text: val, voice: wasVoice });
      appendMessage({ id: 'skipnote-' + Date.now(), role: 'ai', kind: 'system', text: '네, 다른 질문으로 넘어갈게요.' });
      skipCurrent();
      sendMsgBtn.disabled = false;
      return;
    }

    if (awaitingTopicHint) {
      awaitingTopicHint = false;
      appendMessage({ id: 'topic-' + Date.now(), role: 'user', kind: 'answer', text: val, voice: wasVoice });
      const hintId = findQuestionByHint(val);
      if (hintId) {
        if (current) later.unshift(current);
        current = hintId;
        queue = queue.filter(id => id !== hintId);
        persist();
        appendMessage({ id: 'topic-ack-' + Date.now(), role: 'ai', kind: 'system', text: '좋아요, 그 이야기로 시작해볼게요.' });
      } else {
        appendMessage({ id: 'topic-ack-' + Date.now(), role: 'ai', kind: 'system', text: '알겠어요, 마침 물어보고 싶었던 게 있어요.' });
      }
      ensureCurrent();
      sendMsgBtn.disabled = false;
      return;
    }

    const q = current ? qById(current) : null;
    const usedChoices = pendingChoiceSelections.slice();
    pendingChoiceSelections = [];

    appendMessage({ id: 'a-' + Date.now() + '-' + Math.random().toString(36).slice(2, 5), role: 'user', kind: 'answer', text: val, voice: wasVoice });

    if (q) {
      let followUpQs = [];
      if (usedChoices.length && q.followUps) {
        usedChoices.forEach(ch => {
          const fus = q.followUps[ch];
          if (fus) fus.forEach(fu => followUpQs.push(Object.assign({}, fu, { id: 'fu-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6) })));
        });
      }

      let confirmText = null;
      let routedAway = false;

      if (!followUpQs.length) {
        // 선택지를 눌러 답한 게 아니라 자유 텍스트라면, 진짜 답변인지 다른 의도인지 먼저 판단한다 —
        // 그래야 "다른 얘기 하고 싶어" 같은 말이 엉뚱한 질문의 답으로 잘못 저장되지 않는다.
        appendMessage({ id: 'ghost-' + Date.now(), role: 'ai', kind: 'ghost', text: '✦ 생각하고 있어요…' });
        const handled = await classifyReply(q, val);
        removeGhost();

        if (handled && handled.intent && handled.intent !== 'answer') {
          routedAway = true;
          if (handled.intent === 'stop') {
            offerWrapUp();
          } else if (handled.intent === 'pause') {
            paused = true; LS.set('iv-paused', '1');
            current = null; persist();
            renderStatusBar();
            ensureCurrent(); // "질문을 멈췄어요" 안내는 ensureCurrent가 이미 보여준다
          } else if (handled.intent === 'topic_change') {
            const hintId = findQuestionByHint(handled.topicHint || val);
            if (hintId) {
              later.unshift(current);
              current = hintId;
              queue = queue.filter(id => id !== hintId);
              persist();
              appendMessage({ id: 'topic-ack-' + Date.now(), role: 'ai', kind: 'system', text: handled.reply || '네, 그 이야기로 넘어가볼게요.' });
              ensureCurrent();
            } else {
              appendMessage({ id: 'topic-ack-' + Date.now(), role: 'ai', kind: 'system', text: handled.reply || '어떤 이야기인지 조금 더 말해주시겠어요?' });
            }
          } else if (handled.intent === 'summarize_request') {
            offerRecap();
          } else {
            // chitchat 등 — 지금 질문은 그대로 두고, 자연스럽게 한 마디만 남긴다.
            appendMessage({ id: 'chitchat-' + Date.now(), role: 'ai', kind: 'system', text: handled.reply || '네!' });
          }
        } else if (handled && handled.intent === 'answer' && handled.followup) {
          followUpQs = [handled.followup];
          confirmText = handled.followup.confirm;
        }
        // handled === null(AI 실패) → 기존처럼 그냥 답변으로 처리하고 아래로 진행(폴백)
      }

      if (!routedAway) {
        addToSession({ node: q.node, question: q.q, answer: val, mode: usedChoices.length ? 'choice' : (wasVoice ? 'voice' : 'text') });
        current = null; persist();
        if (confirmText) appendMessage({ id: 'c-' + Date.now(), role: 'ai', kind: 'confirm', text: confirmText });

        if (followUpQs.length) {
          addDyn(followUpQs);
          queue = followUpQs.map(x => x.id).concat(queue);
          current = followUpQs[0].id;
        } else {
          current = pullRelated(q.node);
        }
        persist();
        ensureCurrent();
      }
    } else {
      appendMessage({ id: 'react-' + Date.now(), role: 'ai', kind: 'react', text: REACT_LINES[Math.floor(Math.random() * REACT_LINES.length)], captureRef: { text: val, photo: null } });
    }
    sendMsgBtn.disabled = false;
  }
  sendMsgBtn.addEventListener('click', sendComposer);

  renderThread();
  scrollThreadToBottom(); // 열 때마다 맨 아래(최근 대화)부터 보이게 — 매번 손으로 내릴 필요 없이
  const lastOpen = parseInt(LS.get('iv-last-open') || '0', 10);
  const freshReturn = (Date.now() - lastOpen) > FRESH_RETURN_MS;
  LS.set('iv-last-open', String(Date.now()));
  if (freshReturn) startSessionGreeting(); else ensureCurrent();
  renderLater();
  document.getElementById('offlineBar').classList.toggle('show', !navigator.onLine);
  updatePendingBadge();
  if (navigator.onLine) flushPending();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
})();
</script>
</body>
</html>
