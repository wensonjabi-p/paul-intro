<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>Paul 인터뷰 노트</title>
<meta name="theme-color" content="#050419">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="인터뷰">
<style>
  :root {
    --bg: #050419; --bg-soft: #0b0a26; --ink: #edebe6; --muted: #8a879c;
    --faint: #4a4860; --accent: #d4a24e; --line: rgba(237,235,230,0.09);
    --green: #9fd8b0; --blue: #9fc2e8; --gray: #b8b6c2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); }
  body {
    color: var(--ink); font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
    line-height: 1.65; padding: env(safe-area-inset-top) 0 0; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 22px 18px 160px; }

  header { padding: 8px 0 22px; border-bottom: 1px solid var(--line); margin-bottom: 22px; }
  .brand { font-size: 12px; letter-spacing: 0.22em; color: var(--accent); text-transform: uppercase; }
  h1 { font-size: 26px; font-weight: 700; margin-top: 8px; letter-spacing: -0.01em; }
  .lede { color: var(--muted); font-size: 13.5px; margin-top: 10px; }
  .progress { margin-top: 16px; display: flex; align-items: center; gap: 10px; }
  .bar { flex: 1; height: 5px; background: var(--line); border-radius: 3px; overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 0%; background: var(--accent); transition: width 0.4s; }
  .pcount { font-size: 12px; color: var(--muted); white-space: nowrap; }

  .tier { margin: 28px 0 12px; display: flex; align-items: center; gap: 8px; }
  .tier .dot { width: 9px; height: 9px; border-radius: 50%; }
  .tier.light .dot { background: var(--green); }
  .tier.deep .dot { background: var(--blue); }
  .tier.fact .dot { background: var(--gray); }
  .tier h2 { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; color: var(--muted); }

  .card {
    background: var(--bg-soft); border: 1px solid var(--line); border-radius: 14px;
    padding: 16px 16px 14px; margin-bottom: 12px; transition: border-color 0.25s;
  }
  .card.done { border-color: rgba(212,162,78,0.4); }
  .q { font-size: 15.5px; font-weight: 500; line-height: 1.55; }
  .q .num { color: var(--accent); font-weight: 700; margin-right: 6px; }
  textarea {
    width: 100%; margin-top: 12px; background: var(--bg); border: 1px solid var(--line);
    border-radius: 10px; color: var(--ink); font-family: inherit; font-size: 15px; line-height: 1.6;
    padding: 12px; min-height: 52px; resize: none; overflow: hidden; transition: border-color 0.2s;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .cardfoot { margin-top: 8px; display: flex; justify-content: space-between; align-items: center; min-height: 16px; }
  .tag { font-size: 11px; color: var(--faint); letter-spacing: 0.03em; }
  .saved { font-size: 11px; color: var(--accent); opacity: 0; transition: opacity 0.3s; }
  .saved.show { opacity: 1; }

  .dock {
    position: fixed; left: 0; right: 0; bottom: 0; background: #070620;
    border-top: 1px solid var(--line); padding: 14px 18px calc(14px + env(safe-area-inset-bottom));
  }
  .dock .inner { max-width: 640px; margin: 0 auto; display: flex; gap: 10px; align-items: center; }
  .send {
    flex: 1; background: var(--accent); color: var(--bg); border: none; border-radius: 12px;
    font-family: inherit; font-size: 15px; font-weight: 700; padding: 15px; cursor: pointer;
    letter-spacing: 0.02em; transition: opacity 0.2s;
  }
  .send:disabled { opacity: 0.4; }
  .send:active { opacity: 0.8; }
  .reset { background: none; border: 1px solid var(--line); color: var(--muted); border-radius: 12px; padding: 15px 16px; font-family: inherit; font-size: 13px; cursor: pointer; }

  .toast {
    position: fixed; left: 50%; bottom: 100px; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--bg); font-size: 13.5px; font-weight: 600; padding: 12px 20px;
    border-radius: 24px; opacity: 0; pointer-events: none; transition: all 0.35s; z-index: 20; max-width: 88vw; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .install-hint {
    background: rgba(212,162,78,0.09); border: 1px solid rgba(212,162,78,0.35); border-radius: 12px;
    padding: 13px 15px; font-size: 12.5px; color: var(--accent); line-height: 1.6; margin-bottom: 22px; position: relative;
  }
  .install-hint b { font-weight: 700; }
  .install-hint .x { position: absolute; top: 8px; right: 10px; color: var(--faint); font-size: 18px; cursor: pointer; padding: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">Thought Constellation</div>
    <h1>인터뷰 노트</h1>
    <div class="lede">이동 중에 편하게 답을 모으세요. 자동 저장돼요. 다 되면 아래 버튼으로 정리해서 Claude에게 보냅니다.</div>
    <div class="progress"><div class="bar"><i id="bar"></i></div><div class="pcount" id="pcount">0 / 0</div></div>
  </header>

  <div class="install-hint" id="installHint" style="display:none">
    <span class="x" id="hintX">×</span>
    <b>홈 화면에 추가</b>하면 앱처럼 열려요 — 공유/메뉴 버튼 → “홈 화면에 추가”.
  </div>

  <div id="list"></div>
</div>

<div class="dock"><div class="inner">
  <button class="reset" id="resetBtn" title="모든 답 지우기">비우기</button>
  <button class="send" id="sendBtn" disabled>답변 보내기</button>
</div></div>

<div class="toast" id="toast"></div>

<script src="interview-questions.js"></script>
<script>
(function () {
  const DATA = window.INTERVIEW || { questions: [], updated: '' };
  const Q = DATA.questions;
  const LS = id => 'paul-iv-' + id;
  const TIERS = [
    { key: 'light', label: '가볍게 — 짧게 답해도 좋아요' },
    { key: 'deep',  label: '더 깊이 — 시간 있을 때' },
    { key: 'fact',  label: '사실·맥락 — 한 줄이면 충분' },
  ];

  const list = document.getElementById('list');
  const bar = document.getElementById('bar');
  const pcount = document.getElementById('pcount');
  const sendBtn = document.getElementById('sendBtn');

  function grow(ta) { ta.style.height = 'auto'; ta.style.height = (ta.scrollHeight) + 'px'; }

  TIERS.forEach(tier => {
    const qs = Q.filter(q => q.tier === tier.key);
    if (!qs.length) return;
    const h = document.createElement('div');
    h.className = 'tier ' + tier.key;
    h.innerHTML = '<span class="dot"></span><h2>' + tier.label + '</h2>';
    list.appendChild(h);

    qs.forEach(q => {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = 'card-' + q.id;
      const n = q.id.replace('q', '');
      card.innerHTML =
        '<div class="q"><span class="num">Q' + n + '.</span>' + q.q + '</div>' +
        '<textarea id="ta-' + q.id + '" placeholder="여기에 편하게… (음성입력 OK)"></textarea>' +
        '<div class="cardfoot"><span class="tag">' + q.node + '</span><span class="saved" id="sv-' + q.id + '">저장됨 ✓</span></div>';
      list.appendChild(card);

      const ta = card.querySelector('textarea');
      ta.value = localStorage.getItem(LS(q.id)) || '';
      requestAnimationFrame(() => grow(ta));
      if (ta.value.trim()) card.classList.add('done');

      let t;
      ta.addEventListener('input', () => {
        grow(ta);
        localStorage.setItem(LS(q.id), ta.value);
        card.classList.toggle('done', !!ta.value.trim());
        const sv = document.getElementById('sv-' + q.id);
        sv.classList.add('show');
        clearTimeout(t); t = setTimeout(() => sv.classList.remove('show'), 1200);
        refresh();
      });
    });
  });

  function answered() { return Q.filter(q => (localStorage.getItem(LS(q.id)) || '').trim()); }
  function refresh() {
    const a = answered().length;
    bar.style.width = Q.length ? (a / Q.length * 100) + '%' : '0%';
    pcount.textContent = a + ' / ' + Q.length;
    sendBtn.disabled = a === 0;
    sendBtn.textContent = a ? ('답변 보내기 (' + a + ')') : '답변 보내기';
  }
  refresh();

  function digest() {
    const a = answered();
    let s = '[Paul 인터뷰 답변 · ' + (DATA.updated || '') + ']\n\n';
    a.forEach(q => {
      const n = q.id.replace('q', '');
      s += 'Q' + n + ' [' + q.node + '] ' + q.q + '\n답: ' + (localStorage.getItem(LS(q.id)) || '').trim() + '\n\n';
    });
    return s.trim();
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2600);
  }

  sendBtn.addEventListener('click', async () => {
    const text = digest();
    if (navigator.share) {
      try { await navigator.share({ title: 'Paul 인터뷰 답변', text }); return; } catch (e) {}
    }
    try {
      await navigator.clipboard.writeText(text);
      toast('복사됐어요 — Claude 대화에 붙여넣으세요');
    } catch (e) {
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); toast('복사됐어요 — 붙여넣으세요'); }
      catch (e2) { toast('복사 실패 — 길게 눌러 복사하세요'); }
      document.body.removeChild(ta);
    }
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!confirm('입력한 답변을 모두 지울까요?')) return;
    Q.forEach(q => localStorage.removeItem(LS(q.id)));
    document.querySelectorAll('textarea').forEach(ta => { ta.value = ''; grow(ta); });
    document.querySelectorAll('.card').forEach(c => c.classList.remove('done'));
    refresh();
  });

  // install hint (only if not already standalone)
  const standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (!standalone && !localStorage.getItem('paul-iv-hint-x')) {
    document.getElementById('installHint').style.display = 'block';
  }
  document.getElementById('hintX').addEventListener('click', () => {
    document.getElementById('installHint').style.display = 'none';
    localStorage.setItem('paul-iv-hint-x', '1');
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
